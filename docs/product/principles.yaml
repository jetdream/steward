kind: principles
prefix: [P, GR]
title: Product Principles and Platform Guardrails
status: approved

intent: >-
  Principles are tiebreakers: they describe how to decide when requirements
  conflict or when the spec is silent — they guide the hundred small choices
  no requirement document will ever enumerate. When implementation hits an
  unspecified case, derive the answer from a principle and record the
  derivation (`// per P-4`), or raise a spec amendment (change protocol,
  docs/CLAUDE.md). Precedence: GR (non-negotiable) > P > requirements > specs;
  lower layers may only tighten upper ones. Module-scoped principles may exist
  in module CLAUDE.md files; they must not conflict with these. Guardrails are
  enforced on every draft before it enters any queue (STR-3, STR-4); org-level
  rules can only tighten them.

items:
  P-1:
    v: 1
    title: We sell the process, never the leads
    statement: >-
      No promises of donation outcomes; the promise is professional, consistent
      execution of a process every nonprofit must run anyway.

  P-2:
    v: 1
    title: Build on what already works
    statement: >-
      The org's existing channels teach the system the org's real voice; the
      system amplifies before it invents.

  P-3:
    v: 1
    title: Nothing hidden
    statement: >-
      The strategy is explicit and editable; autonomy is earned and always
      revocable; everything auto-done is logged and visible.

  P-4:
    v: 1
    title: Real over synthetic
    statement: >-
      Org photos over generated images; the org's actual stories over generic
      content; cited sources on anything external.

  P-5:
    v: 1
    title: A colleague, never software
    statement: >-
      Product-wide voice requirement: "I drafted next week's posts" — not
      "Generation complete." Every system-initiated message or request carries
      a reason. Cited by CHT-4 and all user-facing surfaces.

  P-6:
    v: 1
    title: The system moves first
    statement: >-
      It proposes; the founder disposes. No empty states that ask the founder
      to create from scratch. The founder's job is two verbs: approve and
      redirect.

  GR-1:
    v: 1
    title: No outcome promises
    statement: Content never promises fundraising or program outcomes.

  GR-2:
    v: 1
    title: No tax or legal advice
    statement: >-
      The product and its content never give legal or tax advice.
      Charitable-solicitation registration remains the org's responsibility
      (ToS).

  GR-3:
    v: 1
    title: Sensitive-topic escalation
    statement: >-
      A sensitive-topic classifier forces human approval regardless of Trust
      Level.

  GR-4:
    v: 1
    title: AI-visual policy
    statement: >-
      AI image generation ships disabled behind a feature flag (Q-3 governs
      enabling). When enabled it produces branded graphics/illustrations only
      — never photorealistic depictions of beneficiaries, animals, staff, or
      impact scenes.

  GR-5:
    v: 1
    title: Mandatory citation of external content
    statement: >-
      Every external-content post carries a source citation and commentary
      framing (the org's perspective, not rehashed news).

  GR-6:
    v: 1
    title: Official platform APIs and permitted automation only
    statement: >-
      Meta/X/Threads developer-policy compliance; no scraping-based or
      policy-violating publishing paths.
