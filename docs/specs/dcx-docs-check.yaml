title: docs-check — Documentation Graph Lint
status: implemented
challenge:
  date: 2026-07-13
  by: architect-challenger
  verdict: pass
  record: docs/specs/challenges/dcx-docs-check-2026-07-13-r9.md
  summary: >-
    Seven rounds total; full history in docs/specs/challenges/. Rounds 1-4
    failed on real highs, each fixed and mutation-verified before
    re-challenge: unimplemented DCX-8 clause (spec-vs-implementation drift
    inside the lint itself); same-file duplicate YAML keys silently
    last-winning; swallowed frontmatter parse errors letting corrupted ADR
    status satisfy DCX-11; phantom ADRs via items entries bypassing the
    design gate. Round 5 passed (two non-blocking hardening fixes applied
    in-change). Round 6 — the maturity-increment delta review — failed on
    the harness missing six acceptance cases (the round-1 defect class
    recurring in DCX-15) plus three evidence-integrity mediums
    (location-unbound challenge-record exemption, unenforced record path,
    forgeable verdict body); all fixed, harness 34/34, lessons deposited as
    LRN-13. Round 7 (delta) passed: all round-6 fixes verified with teeth
    (disabling the six behaviors fails exactly the six cases), fresh attacks
    on the changed surfaces held, two one-line lows (path-traversal
    normalization, check-runner try/catch) applied in-change. Round 8
    (delta, DCX-15 v2 shared-message refactor after a user DRY review)
    passed: extraction verified byte-identical, subject pinning proven by
    wrong-subject mutation, drift immunity and behavior teeth demonstrated;
    two one-line lows (dead template, missing file anchor) applied in this
    recording change. Round 9 (delta, the SDLC-governance increment:
    DCX-4 v6 new decisions/constraints kinds + DCX-16 HITL sign-off tooth)
    passed: gate-bypass hunt confirmed DCX-16 closes the quietly-change and
    quietly-add-with-no-marker paths, with the origin:baseline residual
    (LRN-13 class) reframed honestly; two one-line mediums (overclaim text,
    two missing acceptance cases) fixed in-change; harness 43/43.
implements: []
governed-by: []
depends-on: []
design-scope: local
constrained-by: []
modules: [scripts/docs-check.mjs, scripts/lib/docs-graph.mjs, scripts/lib/messages.mjs, scripts/test-docs-check.mjs]

purpose: >-
  scripts/docs-check.mjs deterministically enforces the documentation
  conventions of docs/CLAUDE.md: ID uniqueness, prefix ownership, referential
  integrity, stale version pins (cascade lists), register/spec schema
  validity, coverage and registers reports, folder hygiene. Internal tooling:
  this spec defines its own items (DCX) inline rather than having a separate
  requirements register. The parser and graph builder live in
  scripts/lib/docs-graph.mjs, shared with the Claude Code hooks (CTX-2,
  CTX-4, CTX-5).

items:
  DCX-1:
    v: 2
    title: Definition uniqueness
    rule: >-
      A key of an `items:` map in any docs/**/*.yaml file (excluding TEMPLATE
      files) is the definition of that ID; the item's `v` field is its
      version. ADR IDs are defined by filenames docs/adr/NNNN-slug.md. Any ID
      defined more than once is an error. Markdown files define no IDs.

  DCX-2:
    v: 5
    title: Prefix ownership and registration
    rule: >-
      A file's top-level `prefix` key (scalar or list) claims ownership of
      those ID namespaces; an ID definition outside its prefix's owning file
      is an error, as is a prefix claimed by two files. Definitions and
      ownership claims under prefixes absent from the docs/CLAUDE.md registry
      are errors — a phantom namespace must not enter the graph even before
      anything references it. Every defined ID's prefix (except
      filename-owned ones) must be claimed by exactly one file: a definition
      under a registered-but-unclaimed prefix is an error, so the ownership
      invariant cannot silently vanish when a claim line is lost. The ADR
      namespace is **filename-owned**: ADR IDs are defined only by
      adr/NNNN-slug.md filenames; an items-map definition or a prefix claim
      under a filename-owned namespace is an error — a phantom decision
      record must not be able to satisfy the design gate.

  DCX-3:
    v: 5
    title: Referential integrity
    rule: >-
      Every ID-shaped token (grammar in docs/CLAUDE.md) occurring anywhere in
      any docs/**/*.{yaml,md} file — except an ID's own definition site — is
      a reference and shall resolve to a defined ID. Tokens with prefixes
      absent from the docs/CLAUDE.md registry are errors, preventing
      vocabulary drift. Two exemptions only: the files named exactly
      TEMPLATE.yaml and TEMPLATE.md are excluded from all checks (placeholder
      content by design), and files of kind challenge-record **located under
      docs/specs/challenges/** are excluded from reference resolution only —
      they quote adversarial attack payloads verbatim, which by nature cite
      deliberately invalid IDs; resolving quotations would forbid honest
      evidence. The exemption is bound to that directory: a self-declared
      challenge-record anywhere else is linted normally and is a placement
      error (DCX-4), so the exemption cannot become an unlinted channel.
      Challenge records remain subject to parse validity and frontmatter
      schema (DCX-4) and the DCX-13 cross-check. No other exemption exists.

  DCX-4:
    v: 6
    title: Schema validity
    rule: >-
      YAML docs are validated by kind. Registers (kind requirements / goals /
      principles / assumptions / risks / open-questions / inconsistencies /
      learnings / decisions / constraints) need prefix, title, legal status,
      and an items map; requirements additionally need a serves list. Items
      need a numeric v and a statement (or rule); requirement items need
      priority P0|P1|P2; open-questions and inconsistencies items need status
      open|resolved; learnings items need type gotcha|dead-end|pattern and a
      scope list; decisions items need date and by; constraints items need a
      category (compliance|deployment|usage|environment|integration|other);
      flexibility, when present, is hard|preference; origin, when present, is
      baseline; serves/depends, when present, are lists. Specs (kind spec)
      need legal status (draft | approved | implemented | superseded) and an
      implements list; depends-on prefixes must be registered. Architecture
      docs need title and status in sketch | approved | superseded. Glossary
      docs (kind glossary) need a terms map. Markdown files of kind
      challenge-record need spec, round, date, and verdict pass|fail in
      frontmatter. An approved: block, when present on any doc, needs date and
      by. A YAML doc with an unknown kind is an error. Other markdown
      frontmatter (ADRs, narrative docs) is parsed for metadata but not
      schema-validated. YAML-subset parse errors are errors — including
      duplicate keys at the same level, which plain YAML would silently
      last-win.

  DCX-5:
    v: 1
    title: Stale version-pin detection
    rule: >-
      A pinned reference "<ID> v<N>" shall match the currently defined
      version; a stale pin is an error and the tool shall print the full
      cascade list (every file and line citing the bumped ID) to drive the
      cascade-analysis protocol step.

  DCX-6:
    v: 1
    title: Coverage report
    rule: >-
      For every requirement item with priority P0 or P1, report
      (informational) whether some non-superseded spec lists it in
      implements — the "not yet specified" list that drives just-in-time spec
      writing.

  DCX-7:
    v: 2
    title: Folder hygiene
    rule: >-
      Every directory under docs/ shall contain a CLAUDE.md, and every file
      under docs/ shall have a .yaml or .md extension — any other extension
      would be invisible to all checks and is therefore an error. Violations
      are errors.

  DCX-8:
    v: 2
    title: Registers report
    rule: >-
      Report (informational) the count and IDs of INC items whose status is
      not resolved, and aggregate spec open-questions sections.

  DCX-9:
    v: 1
    title: Exit code and output
    rule: >-
      Exit 0 when no errors (reports allowed); exit 1 with per-error
      "file:line message" listing otherwise. --json emits the full graph
      (items with effective metadata, references, file data) to stdout as the
      canonical machine registry.

  DCX-10:
    v: 2
    title: Effective item metadata
    rule: >-
      An item's effective serves is its own serves field, falling back to the
      file-level serves; the --json registry carries effective values so
      consumers (hooks, future retrieval) never re-implement the fallback.

  DCX-11:
    v: 2
    title: Design edge (constrained-by)
    rule: >-
      A spec with status approved or implemented must declare design-scope
      local or cross-cutting. Cross-cutting specs must have a non-empty
      constrained-by list; local specs may leave it empty (a conscious,
      greppable claim). Each constrained-by entry is either an ADR ID — which
      must resolve to a filename-defined decision record (DCX-2) with status
      accepted (proposed, rejected, and superseded are errors; superseding an
      ADR therefore cascades into every citing spec) — or a repo-relative
      path to a doc of kind architecture with status approved (citing a
      sketch, a register, another spec, or any non-architecture file is an
      error: only the design layer may constrain a spec by path).

  DCX-12:
    v: 1
    title: Design section required for approval
    rule: >-
      A spec with status approved or implemented must have a non-empty design
      section (capability-local design: module placement, data touched,
      jobs/flows, integration points — the design altitude rule in
      docs/CLAUDE.md governs what belongs here vs in ADRs/architecture).

  DCX-13:
    v: 3
    title: Architect Challenger record required for approval
    rule: >-
      A spec with status approved or implemented must carry a challenge block
      with date, by, verdict pass, a summary, and a record path pointing at a
      challenge-record file — the path must lie under docs/specs/challenges/
      (enforced, not just conventional); the record must exist, be of kind
      challenge-record, name this spec, its frontmatter verdict must match
      the block's, and its verbatim body must contain a line "VERDICT:
      <verdict>" agreeing with both — the laziest realistic forgery flips
      wrapper metadata around pasted evidence, so wrapper and evidence are
      cross-checked. A verdict without evidence is not a verdict. The record
      may only be created from an actual Architect Challenger invocation
      (.claude/agents/architect-challenger.md) per the change protocol; a
      fail verdict means the spec stays draft until findings are resolved.

  DCX-15:
    v: 2
    title: Executable acceptance with a shared message contract
    rule: >-
      The acceptance mutations of this spec are executable, not prose-only:
      scripts/test-docs-check.mjs materializes a copy of the documentation
      tree (via the lint's root override), applies each acceptance mutation
      programmatically, and asserts exit code plus the expected error — plus
      a clean-copy run asserting exit 0. Error text lives once in
      scripts/lib/messages.mjs, imported by both the lint and the harness
      (single source: rewording cannot drift), and each error assertion is
      an exact match against one entry of the parsed --json errors list
      (optionally file-anchored) — never a substring scan of combined
      output, so a neighboring error cannot satisfy the wrong case. Report
      clauses (coverage, open questions) assert structured --json fields.
      The pre-push hook runs the harness; challenge re-rounds verify fixes
      by running it instead of re-deriving mutations by hand. Known
      tradeoff, accepted deliberately: exact-matching shared constants
      cannot detect an unhelpful message text itself — the contract is which
      check fired on which subject, not prose quality (LRN-14).

  DCX-14:
    v: 2
    title: Pre-commit repo gate (presence check)
    rule: >-
      The repo ships a pre-commit git hook that runs docs-check; the lint
      verifies the hook file exists (.husky/pre-commit or
      .githooks/pre-commit) and references docs-check.mjs — a presence
      check that catches deletion, the commonest failure. It does not prove
      git executes the hook (activation depends on husky's prepare script /
      core.hooksPath, and --no-verify always bypasses locally); Stage 1 CI
      is the authoritative backstop.

  DCX-16:
    v: 1
    title: HITL sign-off on product-altitude changes
    rule: >-
      Every item in a product-normative register (kind requirements, goals,
      or principles) must declare its provenance: exactly one of
      origin: baseline (the founding PRD-derived baseline — valid only at
      v: 1; a changed item cannot claim to be untouched) or
      decided-by: DEC-x (a defined decision authorized it; declaring both is
      an error). An item at v>=2, or a v: 1 item without origin: baseline,
      that has no valid decided-by is an error; a decided-by must reference a
      defined DEC item (a wrong-kind target — INC/ADR/CON/etc. — is an error,
      the LRN-4 provenance-kind guard); origin accepts only the value
      baseline. This gives the HITL policy real teeth on the common cases: a
      changed item (v>=2) and a no-marker addition both fail the lint, so the
      ordinary "quietly weaken a requirement" and "quietly add one" paths are
      closed. Residual, explicitly acknowledged (LRN-13 class): origin:
      baseline is a self-declarable claim the lint cannot verify against the
      true founding set without git history or a maintained manifest (LRN-6,
      rejected) — so a brand-new item dishonestly tagged origin: baseline
      still passes, exactly as a dishonest design-scope: local passes DCX-11.
      The compensating control is the same conscious, greppable,
      diff-reviewable claim (a new item claiming baseline is visibly wrong in
      review), not an absolute structural guarantee.

design: >-
  Two zero-dependency Node modules: scripts/lib/docs-graph.mjs (strict
  YAML-subset parser + graph builder, shared with the hooks so lint and
  runtime injection can never disagree about the graph) and
  scripts/docs-check.mjs (checks + reports over the graph). No product
  architecture touched — design-scope local; the zero-dep constraint holds
  until the week-1 skeleton introduces a package.json, at which point a real
  YAML library may replace the subset parser via a superseding decision.

data: None persisted. Reads docs/**/*.{yaml,md}; writes nothing (JSON to stdout).

interfaces: "CLI: node scripts/docs-check.mjs [--json]. Zero dependencies; Node 24."

edge-cases: >-
  Example IDs in prose (routers, this spec) still must resolve (DCX-3) — use
  real IDs in examples. The strict YAML subset turns indentation accidents
  into loud parse errors rather than silent structure changes.

acceptance: >-
  Clean tree exits 0 (DCX-9). Each of the following produces exit 1 with a
  pointing message: a duplicate definition — same file, cross-file, or via a
  duplicate YAML key including in markdown frontmatter (DCX-1, DCX-4), a
  definition outside its prefix's owning file, a prefix claimed by two
  files, a definition or claim under an unregistered prefix, and an
  items-map definition or prefix claim under the filename-owned ADR
  namespace (DCX-2), a dangling reference or unregistered-prefix token
  (DCX-3) — with only the exact-name TEMPLATE files exempt, a stale pin with
  its cascade list (DCX-5), a missing priority or illegal status (DCX-4), a
  missing folder CLAUDE.md or an unexpected file extension under docs/
  (DCX-7), a cross-cutting spec with empty constrained-by, a constrained-by
  entry citing a sketch architecture doc, a non-architecture path, a
  non-accepted ADR, or a phantom ADR not defined by filename (DCX-11), an
  approved spec missing its design section (DCX-12) or challenge block
  (DCX-13), a missing pre-commit hook (DCX-14), a requirement/goal/principle
  item lacking both origin: baseline and decided-by, an item declaring both,
  an origin: baseline claim at v>=2, a non-baseline origin value, a
  decided-by citing an undefined DEC, or a decided-by citing a defined but
  wrong-kind id (DCX-16), a decisions item missing date/by or a constraints
  item with an illegal category (DCX-4). A spec with a non-empty open-questions list appears in
  the registers report (DCX-8); an unimplemented P0 appears in the coverage
  report (DCX-6); an item without its own serves carries the file-level
  serves in --json (DCX-10).

defaults-and-assumptions: >-
  Stage 1+ enforcement (code citations in src/, test-title scanning) is out of
  this version's scope; affected items bump when those land — per the
  enforcement stages in docs/CLAUDE.md.

non-goals: Semantic contradiction detection (Stage 3 concern); style linting.

open-questions: []
