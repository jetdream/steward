kind: spec
prefix: CTX
title: Context Hooks — Instant Lint and ID Resolution for Agents
status: approved
implements: []
governed-by: [P-6]
depends-on: [DCX]
modules: [scripts/hooks/docs-lint-hook.mjs, scripts/hooks/resolve-ids-hook.mjs, scripts/hooks/read-ledger-hook.mjs, scripts/hooks/write-guard-hook.mjs, scripts/lib/session-ledger.mjs, .claude/settings.json]

purpose: >-
  Claude Code hooks that make the documentation graph ambient for agents
  working in this repo: violations surface at the moment of the edit (not at
  commit), IDs mentioned by the user resolve into context without tool calls,
  and no change can be written against a contract the session never loaded.
  This is the deterministic floor of a context-assembly layer — no LLM, no
  retrieval heuristics; only exact ID resolution against the live tree.
  Injection is proportional to certainty of relevance: speculative
  (prompt-time) injection is bounded (CTX-3); write-time injection is
  enforced (CTX-5) because the pending edit itself declares which contracts
  it touches.

items:
  CTX-1:
    v: 1
    title: Lint on every docs edit
    rule: >-
      A PostToolUse hook on Edit|Write runs docs-check when the touched file
      is under docs/ or scripts/. On errors it exits 2 with the error listing
      on stderr, which the harness feeds back to the agent immediately —
      referential integrity violations never survive past the edit that
      introduced them.

  CTX-2:
    v: 1
    title: Prompt-time ID resolution
    rule: >-
      A UserPromptSubmit hook scans the user's message for ID tokens with
      registered prefixes, resolves them via the docs graph, and injects a
      compact context block (ID, version, key metadata, title, statement,
      file:line pointer) on stdout. Injected content is labeled as
      auto-injected excerpts; the file remains the source of truth. Unresolved
      or unregistered tokens are noted rather than silently skipped.

  CTX-3:
    v: 1
    title: Bounded, deduplicated injection
    rule: >-
      At most 8 items are injected per prompt (overflow is listed by ID only),
      and a per-session state file prevents re-injecting an item already
      injected in the same session — injection must never become context
      pollution. Read-time injection (scanning file contents the agent reads)
      is explicitly out of scope for v1; revisit only with observed evidence
      of missed context.

  CTX-4:
    v: 1
    title: Session read ledger
    rule: >-
      A PostToolUse hook on Read records in the per-session state every ID
      whose definition lives in the file just read — seeing a reference to an
      ID is not seeing its contract, so mere mentions do not count.
      Prompt-time injections (CTX-2) and write-guard injections (CTX-5) also
      mark IDs as seen. The ledger is the session's record of which contracts
      have actually been loaded.

  CTX-5:
    v: 1
    title: Write-time contract guard (deny-once)
    rule: >-
      A PreToolUse hook on Edit|Write computes the pending change's contract
      IDs — IDs referenced in the new content plus IDs cited by @implements
      headers of the target file — exempting IDs defined in the target file
      itself (the read-before-overwrite rule already covers those) and IDs not
      defined anywhere (the lint catches those instead). Any contract ID
      missing from the session ledger blocks the call once (exit 2), delivers
      the resolved item excerpts in the feedback, and marks them seen — the
      consciously re-issued edit passes. Guards only files under docs/, src/,
      and scripts/; an agent that already read the governing register is never
      blocked.

data: >-
  Per-session ledger in the OS temp directory
  (steward-ctx-<session_id>.json, shape {seen: [ids]}); safe to delete
  anytime.

interfaces: >-
  Configured in .claude/settings.json (project-scoped, shared with any agent
  working on this repo). Both hooks read the harness JSON payload on stdin.

edge-cases: >-
  Hooks must be fast (docs-check runs in milliseconds) and fail open: an
  unexpected hook crash exits 0 so agent work is never blocked by tooling
  bugs — except the intentional exit-2 paths of CTX-1 and CTX-5. Known limits:
  a partial Read (offset/limit) still marks the whole file's definitions as
  seen; context compaction may drop content the ledger says was seen —
  accepted for v1, the deny-once injection re-grounds the first write after
  any gap.

acceptance: >-
  Editing a docs file to contain a dangling reference yields immediate exit-2
  feedback (CTX-1). A prompt mentioning MEM-1 injects its entry once; a second
  mention in the same session injects nothing (CTX-2, CTX-3). An edit whose
  new content cites MEM-1 in a session that never loaded it is blocked once
  with the MEM-1 excerpt, and the retried edit passes (CTX-5); the same edit
  after Reading the MEM register is never blocked (CTX-4).

defaults-and-assumptions: >-
  Injection is prompt-time only (CTX-3) — the narrow first version; expansion
  is a spec change, not a tweak.

non-goals: >-
  Semantic retrieval, embedding search, transitive dependency expansion —
  candidates for a later retrieval layer, not hooks.

open-questions: []
