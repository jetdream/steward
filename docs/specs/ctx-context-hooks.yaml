kind: spec
prefix: CTX
title: Context Hooks — Instant Lint and ID Resolution for Agents
status: approved
challenge:
  date: 2026-07-13
  by: architect-challenger
  verdict: pass
  summary: >-
    First run failed with two high findings (CTX-2 rule contradicted its own
    implementation; approved status without a challenge record) plus one
    medium (purpose overclaimed beyond the Edit/Write channel) and two lows
    (unspecified default-ledger fallback; re-noting decision unrecorded) —
    all fixed, CTX-2 bumped to v2. Re-challenge passed after verifying every
    fix against code and live hook invocations; four non-blocking findings
    (index-row cascade, router overclaim, CTX-5 rationale wording, lint-hook
    stderr noise) were applied in the same change. Attacks that held:
    deny-once loop safety, ledger consistency across hooks, fail-open paths,
