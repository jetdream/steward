worker_processes 1;
events { worker_connections 256; }

http {
  default_type application/octet-stream;
  sendfile on;

  # When the request has no `token` cookie yet, inject an auto-login <script>
  # into the MinIO HTML. Once MinIO sets the (HttpOnly) cookie, this variable
  # is empty on subsequent requests, so sub_filter becomes a no-op and the
  # console renders normally.
  map $cookie_token $autologin_script {
    ""      '<script>document.documentElement.style.visibility="hidden";fetch("/api/v1/login",{method:"POST",headers:{"Content-Type":"application/json"},body:`{"accessKey":"steward","secretKey":"stewardpassword"}`}).then(function(r){if(r.ok)location.reload()})</script>';
    default '';
  }

  server {
    listen 9001;

    location / {
      proxy_pass http://minio:9001;
      proxy_set_header Host $host;
      proxy_set_header Accept-Encoding "";
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      # MinIO's CSP blocks inline scripts; drop it so the injected
      # auto-login <script> can run.
      proxy_hide_header Content-Security-Policy;

      sub_filter_types text/html;
      sub_filter_once on;
      sub_filter '<head>' '<head>$autologin_script';
    }
  }
}
