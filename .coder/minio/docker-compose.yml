services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
    expose:
      - "9001"                  # Console — internal only; fronted by minio-console
    environment:
      MINIO_ROOT_USER: steward
      MINIO_ROOT_PASSWORD: stewardpassword
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Thin nginx in front of the MinIO console:
  # injects a tiny <script> into the HTML that performs the /api/v1/login
  # call client-side, so the developer never sees the login form.
  # The URL is already gated by Coder auth.
  minio-console:
    image: nginx:alpine
    ports:
      - "127.0.0.1:9001:9001"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      minio:
        condition: service_healthy

  # One-shot container: creates the bucket on first boot then exits
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 steward stewardpassword &&
        mc mb --ignore-existing local/steward-dev
      "

volumes:
  minio_data:
