services:
  playwright:
    build: .
    ports:
      - "127.0.0.1:6080:6080"
      - "127.0.0.1:5900:5900"
      - "127.0.0.1:9222:9223"
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    shm_size: "1gb"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SCREEN_RESOLUTION: "1900x900x16"
      VSCODE_PROXY_URI: "${VSCODE_PROXY_URI:-}"
      APP_PORT: "3000"
    volumes:
      - ../../:/workspace:ro
    command: ["tail", "-f", "/dev/null"]
