kind: registry
format-version: 1
title: Steward Prefix Registry
intent: >-
  Maps every ID prefix to the file that owns its definitions. Read as data by
  the cortex engine — the single source of valid namespaces. Adopted from the
  former prose table in .spec/CLAUDE.md during the Cortex extraction (DEC-4).
filename-owned: [ADR]
# A project may widen the engine's canonical field-set per kind. Steward keeps
# `binds` on decisions as a forward index of what each decision authorized/affected (a declared
# project field; the engine does not act on it — the decided-by back-reference is the
# governed-item link, and a resolved INC carries its own `resolution`).
extra-fields:
  decisions: [binds]
# Code folders that receive a managed `cortex:folder-context` block in their
# CLAUDE.md, materialized by `cortex context` from the specs their code realizes
# (@implements markers). Populates as capability verticals land — the skeleton
# code has no markers yet. Turned on by the DEC-37 foundation phase.
code-paths: [shared, backend, client, news]
# Path-prefix -> scope tags: the edit-time hooks surface scope-matched conventions
# (must/should) and learnings (gotchas/dead-ends) when a file under a prefix is edited.
learning-scopes:
  shared: [shared]
  backend: [backend]
  client: [client]
  news: [news]
  .spec: [docs-format, spec-authoring, process]
# Controlled vocabulary for `scope` tags (the scope-vocabulary lint): learnings
# items and conventions scopes may only use these — the design/methodology tags
# (cortex-extraction era) plus the four code-layer tags added with the tree (DEC-37).
scope-vocabulary: [agents, architecture, cascade, change-request, claude-code, context, design, docs-format, enforcement, git, guardrails, hooks, id-grammar, lint, llm, nodejs, parser, process, review, security, spec-authoring, testing, tooling, yaml, shared, backend, client, news]
