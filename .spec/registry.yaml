kind: registry
format-version: 1
title: Steward Prefix Registry
intent: >-
  Maps every ID prefix to the file that owns its definitions. Read as data by
  the cortex engine — the single source of valid namespaces. Adopted from the
  former prose table in .spec/CLAUDE.md during the Cortex extraction (DEC-4).
filename-owned: [ADR]
# A project may widen the engine's canonical field-set per kind. Steward keeps
# `binds` on decisions as a forward index of what each decision authorized/affected (a declared
# project field; the engine does not act on it — the decided-by back-reference is the
# governed-item link, and a resolved INC carries its own `resolution`).
extra-fields:
  decisions: [binds]
prefixes:
  VIS: product/vision.yaml
  G: product/goals.yaml
  VAL: product/values.yaml
  GR: product/guardrails.yaml
  A: product/assumptions.yaml
  R: product/risks.yaml
  Q: product/open-questions.yaml
  INC: product/inconsistencies.yaml
  DEC: product/decisions.yaml
  CON: product/constraints.yaml
  LRN: learnings.yaml
  ONB: product/requirements/onb-onboarding.yaml
  MEM: product/requirements/mem-org-memory.yaml
  CHT: product/requirements/cht-agentic-chat.yaml
  INT: product/requirements/int-interviewer.yaml
  STR: product/requirements/str-posting-strategy.yaml
  GEN: product/requirements/gen-content-generation.yaml
  EXT: product/requirements/ext-external-radar.yaml
  TOP: product/requirements/top-content-topics.yaml
  APR: product/requirements/apr-approval-inbox.yaml
  PUB: product/requirements/pub-publishing.yaml
  PRO: product/requirements/pro-proactive-manager.yaml
  STW: product/requirements/stw-stewardship.yaml
  AUT: product/requirements/aut-autonomy.yaml
  BIL: product/requirements/bil-billing.yaml
  OPS: product/requirements/ops-console.yaml
  UX: product/requirements/ux-app-shell.yaml
  DS: product/requirements/ds-design-system.yaml
  NWS: product/requirements/nws-news-site.yaml
  BOT: product/requirements/bot-messenger-ingestion.yaml
  # specs (behavior) — one spec register per capability, prefix = <REQ>S
  MEMS: specs/mem-org-memory.yaml
  STRS: specs/str-posting-strategy.yaml
  ARC: architecture/overview.yaml
  UI: experience/ui.yaml   # superseded spine (DEC-18) — retained so history resolves
  EXP: experience/spine.yaml
  DM: architecture/data-model.yaml
  IG: architecture/integrations.yaml
  PIPE: architecture/llm-pipeline.yaml
  SEC: architecture/security-privacy.yaml
  ADR: adr/NNNN-slug.md
