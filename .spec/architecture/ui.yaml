kind: architecture
prefix: UI
title: UX Structure — Journeys, Flows, Screens
status: sketch

intent: >-
  The addressable UX structure (method/ui.md): journeys, flows, and screens
  as design-elements the UI specs will cite via constrained-by. Bodies hold
  the structural intent and link design artifacts under design/ (Claude
  Design mockups land there and are linked from the owning element — the
  element is the addressable node, the artifact its attachment). Foundations:
  DEC-6 (substrate ADR-0001), DEC-7 (Inbox-first shell + docked chat,
  terracotta accent, light-only), the DS register (design-system
  guarantees), and the UX app-shell register (UX-1..7).

items:
  UI-1:
    v: 1
    kind: journey
    title: "Journey: first session → first drafts"
    body: |
      Signup (ONB-1, org name + email only) → ingestion narrates itself in
      colleague voice while it works ("I'm reading your website now") — the
      no-empty-state rule (DS-6) does its hardest work here → interviewer
      opens in chat when sources are thin (INT-1) → "here's what I know"
      review (ONB-5) → first drafts appear in the Inbox within the session
      (ONB-6, G-5). Ends with the founder having approved a first post —
      the G-5 activation moment (first approved post live within 48h).

  UI-2:
    v: 1
    kind: journey
    title: "Journey: weekly digest"
    body: |
      Digest email deep link (APR-4) → Inbox stack (UI-7) → per item:
      approve / per-channel toggle / inline edit / skip / free-text redirect
      (APR-1) → completion moment surfacing the stewardship streak (G-4) and
      what the system does next. The whole journey must fit inside G-3's
      15-minute weekly budget; the finite stack with visible progress
      ("3 of 5") is the workspace inversion of the substrate's browse-forever
      marketplace pattern.

  UI-3:
    v: 1
    kind: journey
    title: "Journey: redirect via chat"
    body: |
      Founder gives plain-language feedback anywhere (docked chat companion,
      UI-6, or full Chat surface, UI-9) → system confirms it back in
      colleague voice (VAL-5) → writes to Memory or Strategy (CHT-2) →
      visibly binds future drafts ("from now on…"). The confirm-back step is
      the trust checkpoint: the founder must see what was understood and
      where it landed (VAL-3).

  UI-4:
    v: 1
    kind: flow
    title: "Flow: compose"
    body: |
      Compose is an action, not a nav item (UX-7): button in Inbox/Calendar
      or via chat → master text → picture (upload or library) → target
      channels (or fit-gate suggestion) → adapted variants for confirmation →
      schedule (APR-5). Steps are progressive disclosure in one surface, not
      a wizard maze.

  UI-5:
    v: 1
    kind: flow
    title: "Flow: picture request fulfillment"
    body: |
      Proactive request with a reason (PRO-1, ReasonLine per DS-5) arrives
      via notification/chat/inbox → dead-simple upload (drag or phone
      camera-roll multi-select) → library ingestion + tagging → the blocked
      awaiting-picture drafts (GEN-4) unblock visibly. Optimized for the
      founder acting from a phone in the field.

  UI-6:
    v: 1
    kind: screen
    title: "Screen: app shell"
    body: |
      The navigation frame (UX-1..7, ARC-5; foundations DEC-7). Desktop: a
      quiet left rail with the five surfaces — Inbox (home), Calendar, Chat,
      Organization, Settings — plus the Compose action; the chat companion
      docks as a summonable right-side panel on every surface. Mobile:
      bottom tab bar, chat companion as a slide-up sheet. Landing surface is
      the Inbox digest stack. Single terracotta accent marks the active nav
      item and the screen's primary action (DS-2); wordmark "Steward" (Q-1)
      in ink, not accent.

  UI-7:
    v: 1
    kind: screen
    title: "Screen: inbox (home)"
    body: |
      The digest stack (UX-3, APR-1) — where 90% of non-chat time lives. A
      finite, vertically generous stack of post cards: org photo at 4:3
      (14px radius, the substrate's card anatomy), master text, per-channel
      FitBadges, ReasonLine on system-initiated items, awaiting-picture
      state where applicable (DS-5). Card actions: Approve (accent), edit,
      skip, redirect. Batch approve; progress indicator; completion state
      celebrates the streak (G-4) — progress and doneness, not discovery,
      are the dopamine here.

  UI-8:
    v: 1
    kind: screen
    title: "Screen: post review / detail"
    body: |
      One draft in full: master text + per-channel variant tabs (GEN-2),
      picture (or library suggestions when awaiting, GEN-4), fit reasons per
      channel (GEN-5), inline edit per variant or master (APR-1). Desktop: a
      sticky approve panel in the right rail — the substrate's booking-panel
      pattern (three-layer elevation) repurposed: Approve CTA, channel
      toggles, schedule note. Mobile: bottom-anchored approve bar.

  UI-9:
    v: 1
    kind: screen
    title: "Screen: chat"
    body: |
      The full conversational surface (UX-2, CHT-1..4): interviewer
      sessions, ideation, questions, redirects. Designed as a colleague
      presence — spacious message rhythm, real org content rendered as rich
      cards inline (drafts, photos, strategy snippets), never a
      support-widget bubble. Docked-companion mode (UI-6) is the same
      conversation, narrower.

  UI-10:
    v: 1
    kind: screen
    title: "Screen: calendar / published"
    body: |
      Planned and published posts across channels (UX-4, PUB-3): a rolling
      month of what's coming and the publish log of what went out, with
      links and variant text. Read-mostly; reschedule and edit-scheduled
      actions (full command set arrives with CHT-3/P1).

  UI-11:
    v: 1
    kind: screen
    title: "Screen: organization"
    body: |
      Two tabs (UX-5): Profile & Memory — what the system knows, with
      AssumedNotes visible (MEM-2, VAL-3; MEM-3 browser at P1) — and
      Posting Strategy — the versioned editor over STR-1's five sections
      with diffs (STR-2). The founder must always be able to answer "what
      does it think it knows, and what rules is it following?"

  UI-12:
    v: 1
    kind: screen
    title: "Screen: settings / billing"
    body: |
      Cadence (APR-2), notifications (APR-4), per-category Trust Levels with
      the TrustLevel indicator (AUT-1, DS-5), per-channel pause and the kill
      switch (AUT-3) — prominent, one gesture, never buried — channel
      connections (ONB-4), plan (BIL-1).

  UI-13:
    v: 1
    kind: screen
    title: "Screen: composer"
    body: |
      The compose surface backing UI-4 (APR-5): master text editor, picture
      picker (upload/library), channel selection with fit-gate suggestions,
      variant preview + confirm. Reached as an overlay/action from Inbox,
      Calendar, or chat — not a nav destination (UX-7).
