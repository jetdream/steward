kind: architecture
prefix: DM
title: Data Model
status: approved
# Approved 2026-07-18 (architecture-approval pass). Challenger pass:
# specs/challenges/architecture-2026-07-18-r1.md (F3 state-machine split applied).
# Amended 2026-07-19: DM-3 → v2 (DEC-22, section (c) is a view) and DM-13 Topic
# added then → v2 (DEC-23), reviewed via the STR + TOP spec challenges.

intent: >-
  Entity semantics and relationships, seeded from PRD §9. Once @shared types
  exist they are the machine truth for fields; this file keeps only diagrams
  and meaning, linking to the type files. Postgres + pgvector (embeddings for
  Memory retrieval). Each entity below is a data-entity design-element; the
  cross-entity ERD lives on Org (the aggregate root) and the ContentItem
  lifecycle lives on ContentItem. ChannelVariant is modelled as part of
  ContentItem (master + ChannelVariant[]), not as a separate entity.

items:
  DM-1:
    v: 1
    kind: data-entity
    title: Org
    body: |
      The customer organization; includes optional donationUrl (a plain
      Memory-adjacent fact, not a donations module — product/scope.md;
      surfaceable on ask posts and the news page per DEC-9). The aggregate
      root: every other entity is owned by an Org.

      Also carries newsConfig — the news-site addressing (slug, domain mode:
      app-path/dedicated/custom, optional customDomain) per NWS-1 + DEC-10 —
      and owns MessagingLink records (DM-12) binding messenger senders to the
      org (BOT-1, P1).

      Relationships (ERD):

      erDiagram
        ORG ||--o{ MEMORY_ENTRY : owns
        ORG ||--|| STRATEGY_DOC : "has current"
        ORG ||--o{ MEDIA_ASSET : owns
        ORG ||--o{ CONTENT_ITEM : owns
        ORG ||--o{ CHAT_SESSION : owns
        ORG ||--o{ EXTERNAL_ITEM : owns
        ORG ||--o{ TRUST_LEVEL : "per category"
        ORG ||--o{ MESSAGING_LINK : "linked bot senders"
        ORG ||--o{ CHANNEL_CONNECTION : "authorized channels"
        ORG ||--|| SUBSCRIPTION : has
        CONTENT_ITEM ||--o{ CHANNEL_VARIANT : "adapts to"
        CONTENT_ITEM }o--o| MEDIA_ASSET : "carries picture"
        CONTENT_ITEM }o--o| EXTERNAL_ITEM : "sourced from"
        CHANNEL_VARIANT ||--o{ POST_METRIC : yields
        CHAT_SESSION ||--o{ CHAT_MESSAGE : contains

  DM-2:
    v: 1
    kind: data-entity
    title: MemoryEntry
    body: |
      fact / story / styleRule / taboo / person / program / event; source +
      timestamps (MEM-1). Embedded for retrieval (pgvector).

  DM-3:
    v: 2
    kind: data-entity
    title: StrategyDoc
    body: |
      Persists Strategy sections (a), (b), (d), (e) per STR-1 — versioned with
      diffs (STR-2). Section (c) restrictions/compliance is NOT stored here: it
      is a derived VIEW over the platform guardrails (GR-1..GR-6) + the active
      Memory rule/taboo overlay (MEMS-3), never persisted or doc-versioned
      (DEC-22). Owned by Org (DM-1).

  DM-4:
    v: 1
    kind: data-entity
    title: MediaAsset
    body: |
      tags, provenance (upload vs harvested); the media library.

  DM-5:
    v: 2
    kind: data-entity
    title: ContentItem
    body: |
      master + ChannelVariant[]; per-variant fit verdicts (GEN-5); edit-diff
      log (APR-3). A ContentItem may also carry a long-form article body: the
      news page is a publishing destination (glossary) that renders the item's
      article form (NWS, ADR-0004), while its social variants stay short and
      may link back to it (NWS-5). No separate Article entity — the master
      story is the article (avoids over-abstraction).

      Two state machines at two altitudes (they were conflated in v1 — a
      multi-destination item cannot have one status): EDITORIAL state on the
      ContentItem, DELIVERY state per ChannelVariant (i.e. per destination).

      Editorial lifecycle (ContentItem):

      stateDiagram-v2
        [*] --> draft : generated (GEN-1) or composed (APR-5)
        draft --> awaiting_picture : no picture assigned (GEN-4)
        awaiting_picture --> draft : picture attached
        draft --> approved : founder approves / TL permits (AUT-1)
        approved --> draft : recalled before any variant is scheduled (VAL-3; XG-4)
        draft --> skipped : founder skips

      Delivery lifecycle (per ChannelVariant — one per destination, incl. the
      news page):

      stateDiagram-v2
        [*] --> pending : variant fit-passed (GEN-5), item approved
        pending --> scheduled : slot assigned at engagement-optimal time (PUB-1); under the opt-in hold-then-publish veto model the pending phase first holds the 24h window (AUT-1, DEC-26)
        scheduled --> published : posted/served, logged (PUB-3)
        scheduled --> paused : kill switch / per-channel pause (AUT-3)
        paused --> scheduled : resumed
        published --> unpublished : taken down — news only (DEC-9; SEC-8)

      Invariants: (1) A ContentItem cannot leave awaiting_picture toward
      approved without a picture (GEN-3, GEN-4 — hard rule). (2) No variant
      schedules while the item is not approved. (3) `unpublished` applies only
      to the news destination (the one channel Steward solely controls);
      social variants are deleted natively on their platform, so their
      delivery state ends at `published`.
      A cohort-1 OPERATOR-QA GATE (OPSS-1): a `qaStatus` flag (pending-review |
      cleared | n/a) withholds a draft from the founder's Ready (APRS-1) until an
      operator clears it; n/a (the default) once the per-org QA dial is off, so it
      is invisible outside cohort-1 oversight.

      Cross-capability fields accumulated on ContentItem (concrete shapes in
      @shared at code): the slot's content TYPE + agenda TOPIC (GEN-1 pairing;
      drives the NWSS-4 news category/topic rail), and an optional CAMPAIGN TAG
      (PRO-2 / STWS-2) — a campaign is modelled as a tag on its member
      ContentItems, and a campaign end date is DERIVED from the last scheduled
      campaign-tagged item's delivery date. There is deliberately NO first-class
      Campaign entity yet (DEFERRED to P1 with STW-2 — introduce a Campaign entity
      only if milestone recaps / multi-item campaign state outgrow the tag model).

  DM-6:
    v: 1
    kind: data-entity
    title: ChatSession
    body: |
      A conversation session, including interviewer transcripts (INT-2).
      Contains ChatMessages.

  DM-7:
    v: 1
    kind: data-entity
    title: ChatMessage
    body: |
      An individual message within a ChatSession (agentic chat or interviewer
      transcript, INT-2).

  DM-8:
    v: 2
    kind: data-entity
    title: ExternalItem
    body: |
      source, URL, relevance rationale, summary, disposition, event date
      (EXT-1). Every discovered candidate is retained and readable in the
      Discoveries feed (EXT-5 v2, DEC-20); the disposition holds the
      founder's post-read triage — worth-a-post / saved-for-later /
      not-for-us — written back to Memory to tune future discovery. A
      saved-for-later item joins the SAVED POOL the planner queries to fill
      open calendar slots (GEN-1); an event-tied item carries its event
      date, drives the time-sensitive flag while upcoming, and annotates as
      passed afterward (never silently drafted stale). (v2: DEC-20 replaced
      the two-value relevant/not-relevant mark.)

  DM-9:
    v: 1
    kind: data-entity
    title: TrustLevel
    body: |
      per content category (AUT-1).

  DM-10:
    v: 1
    kind: data-entity
    title: PostMetric
    body: |
      P1 (GEN-6).

  DM-11:
    v: 2
    kind: data-entity
    title: Subscription
    body: |
      Stripe linkage (BIL-1). Carries the subscription STATUS that gates
      publishing (PUBS-1): PUBLISHING-ELIGIBLE = active OR grace (payment-failure
      grace, publishing unaffected — XB-2); NOT eligible = lapsed (grace expired)
      OR cancelled (the durable BILS-2 stop, reversed only by re-subscribe). Plus a
      refund event/field for the G-1 refund-rate metric (BILS-1).

  DM-12:
    v: 1
    kind: data-entity
    title: MessagingLink
    body: |
      P1 (BOT-1). Binds a messenger sender (platform + external user id) to an
      Org via an explicit account-linking handshake (SEC-9), so bot-ingested
      photos/facts route to the right org. Owned by Org; no third-party PII
      beyond the linked founder's own handle.

  DM-13:
    v: 2
    kind: data-entity
    title: Topic
    body: |
      A content topic / editorial theme (TOP, DEC-23). Fields: description;
      why-it-fits + a resolvable Memory/Radar evidence pointer (TOPS-1
      grounding); provenance (system-derived | founder-added); a research
      strategy (TOP-2); status (proposed | active | retired); and
      supersededAt/supersededBy for evolution — a re-described topic supersedes
      its prior form, retained not overwritten (VAL-3), like DM-2. Hard-deleted
      only on the wrong-org purge (MEMS-2) or a BIL-2 account deletion (SEC-4).
      The active set is the editorial agenda (TOP-4). Owned by Org (DM-1); feeds
      Strategy section (a) (STR-1) and the Radar (EXT-1).

  DM-14:
    v: 1
    kind: data-entity
    title: ChannelConnection
    body: |
      An authorized publishing-channel connection (ONB-4). Fields: platform
      (facebook_page | instagram | threads | x); the external account reference
      (page/handle id); the OAuth credential (access + refresh tokens, expiry)
      held as an ENCRYPTED SECRET (SEC-10), never surfaced to the client; status
      (connected | expired | revoked | error); connectedAt / lastVerifiedAt.
      Created by the ONB-4 connect flow (ARC-12, orchestrated during onboarding
      but connectable any time) and READ by the Publisher (ARC-18) to activate a
      destination for PUB-1 — zero connections means drafts still flow and
      publishing waits (ONB-6 is decoupled from connection). A token expiry/
      revocation is a first-class state that surfaces as the XO-4 needs-you
      card with its reason, never a silent dead channel. Hard-deleted with org
      data on a BIL-2 account deletion (SEC-4). Owned by Org (DM-1). Concrete
      field lists live in @shared types.

  DM-15:
    v: 1
    kind: data-entity
    title: User
    body: |
      The authentication principal (BetterAuth user), DISTINCT from the Org
      tenant (DM-1) — the account/identity separation ACC-1 introduces. Fields:
      id, email, name, and an app-level `role` (BetterAuth admin plugin) that
      marks a PLATFORM-STAFF user (ADM-1); a normal founder/org user carries no
      such role. A User is NOT owned by an Org; it links to one or more Orgs
      through a Membership (DM-16). BetterAuth sessions carry the active-org
      context (activeOrganizationId, ACC-3) and, during impersonation,
      `impersonatedBy` (the staff User, ADM-2). Sign-in is Google + dev
      email-only (SEC-7). Concrete field lists live in @shared types.

      erDiagram
        USER ||--o{ MEMBERSHIP : "member via"
        ORG ||--o{ MEMBERSHIP : "has members"

  DM-16:
    v: 1
    kind: data-entity
    title: Membership
    body: |
      Links a User (DM-15) to an Org (DM-1) with a role — owner | admin | member
      (BetterAuth organization-plugin `member`; ACC-2). Exactly one owner per org
      (the signup creator); an Org has one or more Memberships (multi-seat,
      DEC-30) — the typical cohort-1 org is owner-only. A PENDING membership is
      an Invitation (BetterAuth `invitation`: email, role, status
      pending|accepted, expiresAt) — the ACC-4 invite flow. Platform staff are
      NOT Memberships; they hold the app-level role on the User (DM-15, ADM-1).
      Concrete field lists live in @shared types.

  DM-17:
    v: 1
    kind: data-entity
    title: ActivityEvent
    body: |
      An append-only, per-org activity-ledger entry (ADM-3). Fields: orgId,
      timestamp, actorKind (user | system | job | staff-act-as), actorId (the
      acting User, or the job/system identifier; for staff-act-as the
      impersonating staff User via session.impersonatedBy), action, and target
      (a ref to the affected entity). Generalizes the PIPE-1 model-call log into
      ONE org observability record and is the substrate the impersonation
      carve-out (VAL-3, DEC-31) is audited against. Owned by Org (DM-1); read by
      platform staff (ADM-3) and the KPI dashboard (ADM-6). Staff-act-as
      attribution is never surfaced on founder surfaces (VAL-3), only the
      resulting artifact is. Concrete field lists live in @shared types.

      erDiagram
        ORG ||--o{ ACTIVITY_EVENT : records

  DM-18:
    v: 1
    kind: data-entity
    title: SupportSession
    body: |
      A staff support-impersonation grant (ADM-2) — Steward's reason-capturing
      layer over BetterAuth impersonation (which records session.impersonatedBy
      and a time-box via impersonationSessionDuration, but no reason). Fields:
      staffUserId (DM-15), orgId (DM-1), reason (REQUIRED — the SEC-11
      reason-gate), startedAt, expiresAt, endedAt. One row per act-as entry;
      the ActivityEvent (DM-17) rows it produces reference it. Exists only in
      the ops environment (SEC-11). Concrete field lists live in @shared types.

      erDiagram
        USER ||--o{ SUPPORT_SESSION : "staff opens"
        ORG ||--o{ SUPPORT_SESSION : "targeted by"
