kind: architecture
prefix: ARC
title: System Overview
status: approved
# Approved 2026-07-18 (architecture-approval pass). Challenger pass:
# specs/challenges/architecture-2026-07-18-r1.md (F1–F3 resolved in-change).
# Backed by ADR-0002 (stack), ADR-0003 (portability), ADR-0004 (news renderer).

intent: >-
  Technical module map for the core loop described in product/overview.md.
  Stack baseline is ADR-0002 (constitution-fixed: NodeJS 24, TypeScript, Vite +
  React, Tailwind + ShadCN, Postgres + pgvector, tRPC, WebSocket, BetterAuth,
  Vercel AI SDK, OTel/LGTM). Cross-cutting principle: deployment portability via
  ports & adapters (ADR-0003) — every external/infra dependency behind a
  domain-defined port with environment-selected adapters. Modelled as a C4
  register: one c4-context (the system), its c4-container runtime units (client,
  backend, datastore, and the public news renderer per ADR-0004), and the
  c4-component capability modules inside them. Covers the DEC-9 additions (news
  site, messenger bots, radar feed).

items:
  ARC-1:
    v: 1
    kind: c4-context
    title: Steward System
    body: |
      The Steward system in its environment: a browser client, a NodeJS
      backend, and a Postgres + pgvector datastore, wired by tRPC + WebSocket.

      Layout — Three source roots per the constitution: client (@client),
      backend (@backend), shared (@shared) — with folder-modules per capability
      and a dedicated shared folder for cross-module code. Every module folder
      carries a CLAUDE.md (purpose, implemented spec IDs, structure,
      dependencies, optional module-scoped principles and Gotchas). All
      client→backend calls go through domain-specific API React hooks; realtime
      updates arrive over WebSocket with light payloads. Channel adapters are
      isolated per platform so a policy change on one channel never blocks the
      others (R-6) — one instance of the general ports-&-adapters principle
      (ADR-0003): jobs, blob storage, email, the publishing transport, and
      LLM/search each sit behind a domain-defined port with environment-selected
      adapters (self-contained dev → single instance → cloud), so domain code
      never imports a vendor SDK directly.

      Module map (SHARED is @shared source compiled into both client and
      backend — a shared library, not a runtime container — so it is kept in
      this diagram rather than modelled as its own element):

      graph TD
        subgraph client [client SPA]
          SHELL[app-shell — one-home chrome, UX-1..8]
          CCHAT[conversation UI — in-home]
          CINBOX[home UI — pinned zone + Ready spine]
          CCAL[plan & published view]
          CRADAR[discoveries view — UX-8, EXT-5]
          CORG[knowledge & how-i-write views]
        end
        subgraph backend
          AUTH[auth — BetterAuth]
          MEMB[memory — MEM]
          ONBB[onboarding/ingestion — ONB]
          CHATB[chat + interviewer — CHT, INT]
          STRB[strategy — STR]
          GENB[content engine — GEN, STW]
          EXTB[radar — EXT]
          APRB[Ready/approvals — APR]
          PUBB[publisher + channel & news adapters — PUB, NWS]
          BOTB[messenger bots — BOT, P1]
          PROB[proactive — PRO]
          AUTB[autonomy — AUT]
          BILB[billing — BIL]
          OPSB[ops console — OPS]
        end
        NEWS[public news renderer — NWS, ADR-0004]
        SHARED[shared — types, DTOs, channel profiles, ports]
        client -->|tRPC + WS| backend
        NEWS -->|reads published articles| backend
        backend --> SHARED
        client --> SHARED
        MEMB --> GENB
        STRB --> GENB
        EXTB --> GENB
        EXTB --> CRADAR
        BOTB --> MEMB
        GENB --> APRB
        APRB --> PUBB
        PUBB -.news publish-state + cache purge.-> NEWS
        AUTB -.governs.-> PUBB

      ADRs — the consolidating stack baseline is ADR-0002; job scheduling,
      publishing queue, media storage, and transactional email are settled as
      ports (with v1 adapters pg-boss / R2 / SendGrid→Resend) under ADR-0003;
      the public news renderer is ADR-0004. Consciously deferred (recorded, not
      yet written): the messenger-bot infra vendor ADR (BOT, P1), the LLM
      model-selection ADR (at skeleton time — PIPE-1), and the SEC
      threat-model/audit pass (SEC intent).

  ARC-2:
    v: 1
    kind: c4-container
    title: Client (@client)
    parent: ARC-1
    body: |
      Browser SPA: Vite + React, Tailwind + ShadCN. Folder-modules per
      capability UI; all calls to the backend go through domain-specific API
      React hooks, with realtime updates over WebSocket (light payloads).
      Houses the app-shell and the capability UI components.

  ARC-3:
    v: 1
    kind: c4-container
    title: Backend (@backend)
    parent: ARC-1
    body: |
      NodeJS 24 + TypeScript service exposing a tRPC + WebSocket surface,
      authenticated by BetterAuth and driving the LLM work via the Vercel AI
      SDK. Folder-modules per capability host the memory, ingestion, chat,
      strategy, content, radar, approval, publishing, proactive, autonomy,
      billing, and ops capabilities.

  ARC-4:
    v: 1
    kind: c4-container
    title: Datastore — Postgres + pgvector
    parent: ARC-1
    body: |
      Postgres as the system of record for all org-owned entities (see the
      data-model register), with the pgvector extension storing MemoryEntry
      embeddings for retrieval-grounded generation.

  ARC-5:
    v: 2
    kind: c4-component
    title: App Shell
    parent: ARC-2
    body: |
      The application shell (app-shell) under the One-Home model (DEC-18):
      the invariant home chrome — Pause (AUT-3), the Look-inside cluster
      (four glass-wall views), Controls, + Compose — and the summoned-view
      routing. Implements the UX capability (UX-1..8); there is no
      multi-destination navigation. (v2: DEC-18 replaced the six-surface
      nav frame.)

  ARC-6:
    v: 1
    kind: c4-component
    title: Chat UI
    parent: ARC-2
    body: |
      Client module for the conversational medium — the in-home stream
      composer and exchanges (CHT, fused into the home per DEC-18),
      including the interviewer conversations.

  ARC-7:
    v: 2
    kind: c4-component
    title: Home UI
    parent: ARC-2
    body: |
      Client module for the home stream: the pinned needs-you zone, the
      finite Ready spine (APR — reviewing drafts, edits, and verdicts in
      place), stream cards, and the caught-up terminus. (v2: DEC-18 —
      formerly "Inbox UI", one destination among six; now the one home.)

  ARC-8:
    v: 1
    kind: c4-component
    title: Calendar UI
    parent: ARC-2
    body: |
      Client module for the Plan & Published summoned view — the posting
      calendar / scheduled slots and the publish log.

  ARC-9:
    v: 1
    kind: c4-component
    title: Organization UI
    parent: ARC-2
    body: |
      Client module for the Knowledge and How-I-write summoned views
      (organization profile, memory, strategy) and the Controls tray
      (settings).

  ARC-10:
    v: 1
    kind: c4-component
    title: Auth
    parent: ARC-3
    body: |
      Authentication module built on BetterAuth (Google Sign-in + dev
      email-only login).

  ARC-11:
    v: 2
    kind: c4-component
    title: Memory
    parent: ARC-3
    body: |
      Org-memory module (MEM) — the shared read/write layer (PIPE-1 one-brain).
      Owns MemoryEntry read/write and pgvector retrieval PLUS the always-on
      active rule/taboo overlay it routes to the VAL gate (MEMS-3/MEMS-4,
      PIPE-2); feeds the content engine. Also owns the MEM-2 interrupt-or-assume
      decision and the per-org asked-set — never-ask-twice (MEMS-5/MEMS-6).

  ARC-12:
    v: 1
    kind: c4-component
    title: Onboarding / Ingestion
    parent: ARC-3
    body: |
      Onboarding and account/website ingestion module (ONB).

  ARC-13:
    v: 1
    kind: c4-component
    title: Chat + Interviewer
    parent: ARC-3
    body: |
      Agentic chat and structured interviewer module (CHT, INT), sharing the
      Memory read/write layer.

  ARC-14:
    v: 1
    kind: c4-component
    title: Strategy
    parent: ARC-3
    body: |
      Posting-strategy module (STR); produces the StrategyDoc that grounds
      generation.

  ARC-15:
    v: 1
    kind: c4-component
    title: Content Engine
    parent: ARC-3
    body: |
      Content generation + stewardship module (GEN, STW). Central hub: consumes
      Memory, Strategy, and Radar context and produces drafts for the approval
      Ready surface (see the llm-pipeline register).

  ARC-16:
    v: 1
    kind: c4-component
    title: External Radar
    parent: ARC-3
    body: |
      External-signal radar module (EXT); surfaces external items for grounded,
      citation-bearing drafts.

  ARC-17:
    v: 1
    kind: c4-component
    title: Ready / Approvals
    parent: ARC-3
    body: |
      Approval module (APR, the Ready pipeline); receives drafts and records
      edits/verdicts before publishing. (Label renamed Inbox→Ready per
      DEC-16.)

  ARC-18:
    v: 1
    kind: c4-component
    title: Publisher + Channel Adapters
    parent: ARC-3
    body: |
      Publishing module (PUB): per-platform channel adapters behind a shared
      channel-profile configuration, isolated so one platform's change never
      blocks the others (R-6). The org news page is an additional publishing
      destination (NWS-1) — additive to, never part of, PUB-1's four launch
      channels — but it is NOT symmetric with the social adapters: social
      adapters make outbound third-party API calls, whereas "publishing" to the
      news page only sets the article's publish-state in our DB and purges the
      renderer's cache tag (ADR-0004, SEC-8). The public renderer (ARC-23) then
      pulls published articles downstream via the backend read-API — the
      renderer is downstream of the data, not pushed to by the publisher.
      Social variants may carry the published article link (NWS-5). See the
      integrations register.

  ARC-19:
    v: 1
    kind: c4-component
    title: Proactive Manager
    parent: ARC-3
    body: |
      Proactive account-manager module (PRO).

  ARC-20:
    v: 1
    kind: c4-component
    title: Autonomy
    parent: ARC-3
    body: |
      Autonomy / Trust-Level governance module (AUT); governs what publishing
      may proceed without founder approval.

  ARC-21:
    v: 1
    kind: c4-component
    title: Billing
    parent: ARC-3
    body: |
      Subscription billing module (BIL); Stripe linkage for our subscription.

  ARC-22:
    v: 1
    kind: c4-component
    title: Ops Console
    parent: ARC-3
    body: |
      Operations console module (OPS); model-call QA, failure queues, and
      operator alerting.

  ARC-23:
    v: 1
    kind: c4-container
    title: Public News Renderer
    parent: ARC-1
    body: |
      A separate SEO-first SSR/SSG deployable (Astro + React islands, ADR-0004)
      serving the org news site (NWS-1..6) to the public reader persona
      (journey EXP-9). Reads published article/topic data from the backend
      read-API and images via the Blob port (ADR-0003); renders the DS-8
      org-branded template. Isolated from the authenticated SPA so its
      caching/SEO/rate-limit posture (SEC-8) is independent. Resolves the
      DEC-10 URL routing (dev path / prod dedicated domain / org subdomain).

  ARC-24:
    v: 1
    kind: c4-component
    title: Messenger Bot Adapters
    parent: ARC-3
    body: |
      Founder-facing WhatsApp + Telegram bot adapters (BOT-1..3, P1) behind a
      messaging port (ADR-0003). Ingest photos → media library and
      facts/links/voice-notes → Memory (MEM); light Q&A reuses the chat context
      layer (BOT-2, shares CHATB). Vendor infra ADR deferred (P1). Official
      APIs only (BOT-3, SEC-9).

  ARC-25:
    v: 1
    kind: c4-component
    title: Radar UI
    parent: ARC-2
    body: |
      Client surface for the Discoveries feed (UX-8, EXT-5 v2) — the org's
      personalized, read-first feed of discovered external items with the
      post-read triage dispositions (worth-a-post / save-for-later /
      not-for-us, DEC-20) and the saved shelf. Pull-only: never badged or
      counted (VAL-6, G-3).
