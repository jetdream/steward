kind: architecture
prefix: SEC
title: Security, Privacy, Compliance
status: approved
# Approved 2026-07-18 (architecture-approval pass). Challenger pass:
# specs/challenges/architecture-2026-07-18-r1.md (F2 cache-purge, F7 deletion).
# Threat-model/audit pass deferred to before the public surface goes live.

intent: >-
  From PRD §10. The behavioral guardrails themselves live in
  product/guardrails.yaml (GR-1..GR-6); this file covers the operational
  posture — one posture design-element per stance. Pending: threat model,
  attack surface, and audit posture get their own pass (and ADRs where choices
  exist) — gated before the public news surface (SEC-8) and bot webhooks
  (SEC-9) go live, the largest new attack surface, not merely before general
  cohort-1 production traffic.

items:
  SEC-1:
    v: 1
    kind: posture
    title: Platform Policy Compliance
    body: |
      Platform policy compliance: Meta/X/Threads developer policies — app
      review, permitted automation only (GR-6). Publishing-only permission set
      requested (A-1).

  SEC-2:
    v: 1
    kind: posture
    title: No Legal / Tax Advice
    body: |
      No legal/tax advice, no outcome promises: GR-1, GR-2;
      charitable-solicitation registration remains the org's responsibility
      (ToS).

  SEC-3:
    v: 1
    kind: posture
    title: No Third-Party PII
    body: |
      No third-party PII stored: no engagement features in scope
      (product/scope.md); the system reads public presence with signup consent
      (A-5).

  SEC-4:
    v: 1
    kind: posture
    title: Org Data Confidentiality
    body: |
      Org data confidentiality: interview/chat content is org-provided
      confidential data — exported and deleted on request (BIL-2).

  SEC-5:
    v: 1
    kind: posture
    title: External Content Safety
    body: |
      External content safety: mandatory citations (GR-5); sensitive-topic
      classifier forces human approval regardless of Trust Level (GR-3);
      permanent TL1 cap for external content (EXT-3).

  SEC-6:
    v: 1
    kind: posture
    title: Visual Policy
    body: |
      Visual policy: GR-4 (generation disabled; branded-graphics-only if ever
      enabled per Q-3).

  SEC-7:
    v: 2
    kind: posture
    title: Auth
    body: |
      Auth is BetterAuth (constitution): Google Sign-in + dev email-only login;
      dev login must be disabled outside development environments. v2 (ACC-5,
      ADR-0006): BetterAuth is generalized to a MULTI-USER identity model — it
      issues a User (DM-15, the auth principal, distinct from the Org tenant
      DM-1), carries org membership + roles via the organization plugin
      (Membership DM-16, activeOrganizationId — ACC-2/ACC-3), and provides the
      app-level PLATFORM-STAFF role + impersonation via the admin plugin
      (ADM-1/ADM-2). Regular users are confined server-side to their own
      memberships (ACC-3); staff impersonation is the only cross-org path
      (SEC-11).

  SEC-8:
    v: 1
    kind: posture
    title: Public news surface
    body: |
      The org news site (NWS, renderer ARC-23, ADR-0004) is Steward's first
      PUBLIC, unauthenticated surface — a distinct posture from the
      authenticated app. Serves only published, founder-approved article
      content; no authenticated data, no other-org data, no third-party PII
      (SEC-3 holds). CDN-cacheable with **tag-based purge** on
      publish/edit/unpublish, so takedown is immediate DESPITE caching
      (ADR-0004; SSR alone only helps cache misses); rate-limited and
      bot/abuse-guarded independently of the app. robots/sitemap per NWS-2.
      URL/slug reservation (a small record, not the whole Org) follows the
      account-active rule (Q-11, DEC-10): while active/tombstoned an
      unpublished-or-recalled route serves the warm org-branded "not here"
      page (XN-2); after a BIL-2 hard deletion (org data + branding removed,
      SEC-4) the slug returns a GENERIC 410 gone page, never a stale
      org-branded one. The "published with Steward" footer is the only
      cross-org element.

  SEC-9:
    v: 1
    kind: posture
    title: Messenger bot channels
    body: |
      Founder-facing WhatsApp + Telegram bots (BOT-1..3, adapters ARC-24, P1):
      official platform APIs only (BOT-3, extends GR-6). A sender is bound to
      an org only through an explicit account-linking handshake before any
      ingestion; unlinked senders are refused. Inbound media/text is org-owned
      confidential data (SEC-4) — same confidentiality, export, and deletion
      rules as in-app content (BIL-2). No third-party PII is solicited or
      stored (SEC-3); platform message-window and data-retention rules are
      respected per each provider's terms.

  SEC-10:
    v: 1
    kind: posture
    title: Channel credential storage
    body: |
      OAuth publishing credentials (DM-14 ChannelConnection: FB Page, Instagram,
      Threads, X access/refresh tokens) are org secrets — encrypted at rest,
      never logged, never sent to the client, and requested at the minimum
      permission scope (A-1, GR-6). Revocation and expiry are first-class states,
      not silent failures: an unusable connection surfaces as the XO-4
      needs-you card with its reason and is re-authorized by re-running the
      ONB-4 connect flow. Hard-deleted with org data on a BIL-2 account deletion
      (SEC-4). Distinct from founder auth (SEC-7, BetterAuth) — these are the
      org's channel-publishing credentials, not the founder's login.

  SEC-11:
    v: 2
    kind: posture
    title: Operator & platform-staff access, impersonation & audit
    body: |
      Internal platform staff read ALL orgs' confidential data (drafts,
      transcripts, radar candidates — SEC-4) to run the ops console (OPS-1) and
      the platform-admin surface (ADM-1..6). v2 (ADR-0006 supersedes ADR-0005):
      the role is the BetterAuth admin-plugin APP-LEVEL role — DISTINCT from org
      roles (ACC-2) and from founder/user auth (SEC-7) — least-privilege, scoped
      to the admin/ops functions. Every cross-org access to confidential data is
      REASON-GATED and fully AUDIT-LOGGED (no un-logged raw browse). SUPPORT
      IMPERSONATION (act-as-org, ADM-2) is reason-gated (a SupportSession DM-18
      captures the required reason over BetterAuth's session.impersonatedBy),
      time-boxed (impersonationSessionDuration), and recorded in the per-org
      activity ledger (ADM-3, DM-17) — audited in full internally but NOT
      surfaced to the founder (the VAL-3 carve-out, DEC-31); results still appear
      in the founder's own surfaces. The console is disabled outside the ops
      environment. Founder-ratified: DEC-27 (the operator posture) + DEC-32
      (this identity/impersonation model). The audit log + reason prompt + ledger
      are first-class parts of the ops module (ARC-22), not add-ons.
