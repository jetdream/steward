kind: architecture
prefix: PIPE
title: LLM Pipeline
status: approved
# Approved 2026-07-18 (architecture-approval pass). Challenger pass:
# specs/challenges/architecture-2026-07-18-r1.md. Model selection ADR deferred.
# PIPE-1/PIPE-2 → v2 (2026-07-19, DEC-21/DEC-22): the Memory rule/taboo overlay
# is modelled as an explicit VAL-stage input with a GR-8 escalation — surfaced
# by the MEM spec's challenger panel (specs/challenges/mem-org-memory-*).

intent: >-
  From PRD §9. Vercel AI SDK — its provider abstraction is an instance of the
  ADR-0003 ports principle (LLM/search behind a port; providers swappable).
  Model choices are recorded in ADR-0008 (Google Vertex AI / Gemini;
  embeddings at dim 1536; DEC-40) — the deferred model-selection ADR, landed
  with the brain spine. Modelled as one
  pipeline (its grounding/guardrail principles in the body) with a
  pipeline-stage per generation flow.

items:
  PIPE-1:
    v: 2
    kind: pipeline
    title: Steward LLM Pipeline
    body: |
      Principles governing every stage:

      - Grounded, not vibes: all generation is grounded in Memory + Strategy via
        retrieval (pgvector over MemoryEntry embeddings) PLUS the always-on
        active rule/taboo overlay — the full set of founder-stated styleRules
        and taboos, fetched deterministically and never similarity-gated (MEM-1,
        MEMS-3/MEMS-4). Cite VAL-2, VAL-4.
      - One brain, several skills: chat, interviewer, generation, and the
        messenger bots (BOT-2, P1) share the same Memory read/write layer — a
        redirect in chat (CHT-2), a Ready edit (APR-3), a bot-sent fact, and a
        Discoveries triage disposition (worth-a-post / save / not-for-us,
        EXT-5 v2) all land in the same store the planner reads — including
        the saved pool it draws from in thin weeks (DEC-20).
      - Guardrails before queues: Strategy validation (STR-3) + platform
        guardrails (GR-1..GR-6, sensitive-topic classifier GR-3) + the Memory
        rule/taboo overlay gate (GR-8) run at the VAL stage before anything
        enters any queue. Founder rules/taboos live in Memory — the single
        source (MEM-1); the Strategy's org-rules section is a rendered VIEW of
        that overlay, not a second store (DEC-22). A draft VAL cannot
        CONFIDENTLY clear against an active taboo escalates to the founder
        regardless of Trust Level (GR-8) — semantic taboo detection is an LLM
        check with a residual miss rate, so the escalation is the MEM-1 "never
        violated" backstop once auto-publish is on.
      - Everything logged: all model calls logged per org for ops QA (OPS-1) and
        cost tracking. Target COGS (LLM + search + APIs) <$25/org/month.

  PIPE-2:
    v: 2
    kind: pipeline-stage
    title: Draft Generation Flow
    parent: PIPE-1
    body: |
      v2 (DEC-21, DEC-22): the Memory active rule/taboo overlay is an explicit
      VAL input (routed to VAL, not only GEN); VAL blocks/regenerates on a taboo
      violation and escalates to the founder when it cannot confidently clear a
      draft against an active taboo (GR-8), regardless of Trust Level.

      sequenceDiagram
        participant PL as Planner (GEN-1)
        participant RET as Retrieval (Memory+Strategy)
        participant GEN as Generator
        participant VAL as Guardrail chain (STR-3, GR checks, Memory taboo overlay)
        participant FIT as Fit gate (GEN-5)
        participant INB as Ready (APR-1)
        Note over PL,GEN: entry is a planner slot (GEN-1) OR a founder-authored composer master (APR-5) — both feed the same GEN → VAL → FIT chain
        PL->>RET: slot context (category, calendar, org profile)
        RET-->>GEN: grounded context package
        RET-->>VAL: active rule/taboo overlay (full set, deterministic — GR-8)
        GEN->>GEN: master + per-channel variants (GEN-2)
        GEN->>VAL: validate every variant
        VAL-->>GEN: pass / regenerate / escalate (GR-3 sensitive-topic; GR-8 taboo-unconfident)
        VAL->>FIT: per-channel fit verdicts
        FIT->>INB: draft with variants + verdicts (or awaiting_picture)

  PIPE-3:
    v: 2
    kind: pipeline-stage
    title: External Drafts
    parent: PIPE-1
    body: |
      External drafts (EXT-2) enter the SAME chain as internal content: a
      worth-a-post candidate is drafted by the content engine (GENS) and passes
      the PIPE-2 VAL stage with MANDATORY source citation (GR-5) and
      sensitive-topic gating (GR-3, which holds a sensitive draft for the founder
      at any Trust Level). External content is PERMANENTLY TL1-capped (EXT-3,
      AUTS-2) — never full autopilot; within that cap it publishes per the DEC-26
      TL1 veto model (default publish-then-takedown, opt-in hold-then-publish).
      (v2: DEC-26 + AUT-2 replaced the v1 "forced human approval routing" — external
      is TL1-capped auto-publish under the veto model, not forced approval.)

  PIPE-4:
    v: 1
    kind: pipeline
    title: Agent Runtime & harness model
    body: |
      Realizes ADR-0009 (DEC-41). The runtime (ARC-27) is the single home for
      every LLM interaction; "one brain, several skills" (PIPE-1) becomes a real
      component rather than per-capability wiring. Three parts:

      - LLM/SEARCH PORT (ADR-0003 instance, provider = Gemini per ADR-0008). One
        contract for the whole subsystem: generate / generateObject (structured)
        / classify / embed / groundedSearch (Gemini + Google-Search grounding,
        IG-3) / chatStep (one tool-calling turn). Adapters stay dumb (Vertex +
        the keyless dev stub); no vendor type escapes the port.
      - SKILL = a VERSIONED HARNESS: promptRef (a versioned prompt template) +
        tools (a subset of the tool registry) + model/params (the ADR-0008
        flash-vs-pro routing lives here, per skill) + retrievalPolicy (MEMS-4
        grounding + the always-on rule/taboo overlay) + guardrailChain (PIPE-2) +
        agentPolicy. Prompts + tool schemas are versioned artifacts; a harness
        manifest maps skill -> its versions. The docs-graph cascade cannot see
        prompt files, so enforcement is a CI manifest-hash check that fails a
        harness change lacking a passing keyed eval on record (ADR-0010).
      - RUNTIME ASSEMBLER + BOUNDED LOOP: turns (skill, orgContext) into a
        grounded, guarded execution — a single call or a bounded tool-calling
        loop (plan -> call tool -> observe -> repeat -> finalize). BOUNDED BY THE
        agentPolicy: hard maxSteps, a per-invocation token/cost budget (tied to
        the PIPE-1 COGS target), an explicit termination condition, and a
        whitelisted tool set — unbounded loops are structurally impossible. A
        tool is a backend module operation exposed to the model by schema; a tool
        call inherits org confinement (ACC-3) and the guardrail chain exactly as
        a direct call. maxSteps=1 degenerates the loop to a single-shot skill, so
        simple skills carry no loop overhead.

  PIPE-5:
    v: 1
    kind: pipeline
    title: Observability & cost
    body: |
      Realizes PIPE-1's "everything logged … for ops QA (OPS-1) and cost tracking
      … COGS <$25/org/month", which had no schema. Every port call is:
      - TRACED as an OpenTelemetry span (the tRPC-span child) carrying attributes
        org, skill, model, prompt-version, operation, tokensIn/Out, costUsd,
        latencyMs, and the guardrail verdicts. Requires adding an OTel
        MeterProvider (today only traces/Tempo are wired) so a COGS metric has a
        home.
      - LOGGED as a MODELCALL record (DM-19) per org — the per-call grain PIPE-1
        needs; an ActivityEvent (DM-17) may aggregate several ModelCall rows. This
        is the substrate for the ADR-0010 trajectory scoring (steps/tokens/cost)
        and the OPSS-1 model-call QA.
      - COSTED: token usage (currently discarded by the adapter) is captured and
        priced into a per-org COGS metric with budget alerting against the target;
        the per-skill agentPolicy cost budget is the per-invocation ceiling.
      SEC-4: whether a ModelCall stores raw prompt/response CONTENT (vs. metadata
      + refs) is an org-confidential-data decision — content, if stored, is
      org-scoped and purged on BIL-2 like all org data; the eval datasets take
      only de-identified cases (ADR-0010 storage split).

  PIPE-6:
    v: 1
    kind: pipeline
    title: LLM reliability
    body: |
      The LLM port is a network dependency with no error handling today. The
      runtime wraps every call with retry-with-backoff on transient failure, a
      timeout, and a circuit-breaker per provider; a hard failure surfaces to the
      operator failure queue (OPSS-2) and, where founder action is needed, a
      needs-you card (never a silent dead skill). This is the LLM-call resilience
      the AI substrate needs up front; the DURABLE job/queue substrate (pg-boss,
      transactional enqueue — ADR-0003) lands with generation/publishing
      scheduling (GEN/PUB), not here. The GR-3/GR-8 human-escalation backstops
      (PIPE-2) are the reliability guarantee on OUTPUT safety; PIPE-6 is the
      reliability of the CALL itself.
