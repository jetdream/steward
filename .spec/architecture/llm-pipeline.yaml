kind: architecture
prefix: PIPE
title: LLM Pipeline
status: approved
# Approved 2026-07-18 (architecture-approval pass). Challenger pass:
# specs/challenges/architecture-2026-07-18-r1.md. Model selection ADR deferred.

intent: >-
  From PRD §9. Vercel AI SDK — its provider abstraction is an instance of the
  ADR-0003 ports principle (LLM/search behind a port; providers swappable).
  Model choices get an ADR when the skeleton lands (deferred). Modelled as one
  pipeline (its grounding/guardrail principles in the body) with a
  pipeline-stage per generation flow.

items:
  PIPE-1:
    v: 1
    kind: pipeline
    title: Steward LLM Pipeline
    body: |
      Principles governing every stage:

      - Grounded, not vibes: all generation is grounded in Memory + Strategy via
        retrieval (pgvector over MemoryEntry embeddings). Cite VAL-2, VAL-4.
      - One brain, several skills: chat, interviewer, generation, and the
        messenger bots (BOT-2, P1) share the same Memory read/write layer — a
        redirect in chat (CHT-2), an inbox edit (APR-3), a bot-sent fact, and a
        radar-feed relevant/not mark (EXT-5) all land in the same store the
        planner reads.
      - Guardrails before queues: Strategy validation (STR-3) + platform
        guardrails (GR-1..GR-6, sensitive-topic classifier GR-3) run before
        anything enters any queue.
      - Everything logged: all model calls logged per org for ops QA (OPS-1) and
        cost tracking. Target COGS (LLM + search + APIs) <$25/org/month.

  PIPE-2:
    v: 1
    kind: pipeline-stage
    title: Draft Generation Flow
    parent: PIPE-1
    body: |
      sequenceDiagram
        participant PL as Planner (GEN-1)
        participant RET as Retrieval (Memory+Strategy)
        participant GEN as Generator
        participant VAL as Guardrail chain (STR-3, GR checks)
        participant FIT as Fit gate (GEN-5)
        participant INB as Inbox (APR-1)
        PL->>RET: slot context (category, calendar, org profile)
        RET-->>GEN: grounded context package
        GEN->>GEN: master + per-channel variants (GEN-2)
        GEN->>VAL: validate every variant
        VAL-->>GEN: pass / regenerate / escalate (GR-3)
        VAL->>FIT: per-channel fit verdicts
        FIT->>INB: draft with variants + verdicts (or awaiting_picture)

  PIPE-3:
    v: 1
    kind: pipeline-stage
    title: External Drafts
    parent: PIPE-1
    body: |
      External drafts (EXT-2) enter the same chain with mandatory citation
      (GR-5) and forced human approval routing (EXT-3).
