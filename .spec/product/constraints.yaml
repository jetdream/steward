kind: constraints
prefix: CON
title: Operational & Compliance Constraints
status: approved

intent: >-
  Operational, compliance, deployment, usage-mode, and integration context
  that bounds design but is neither a product requirement (WHAT the product
  does) nor an assumption-bet (A-*, an external fact we depend on). Captured
  from the user during intake (.spec/CLAUDE.md A4) so it is never lost and
  informs future features. Each item has a category
  (compliance | deployment | usage | environment | integration | other) and,
  where it tightens a guardrail or drives an NFR, links to it.

items:
  CON-1:
    v: 1
    category: compliance
    title: US 501(c)(3) nonprofits only; no third-party PII
    statement: >-
      Customers are US-registered 501(c)(3) nonprofits exclusively (see
      scope.md non-goals). No third-party PII is stored — the product reads
      only public web/social presence with signup consent (A-5), and stores
      no engagement-derived personal data this release. Tightens GR-2 (no
      legal/tax advice) and the privacy posture in
      architecture/security-privacy.yaml.

  CON-2:
    v: 1
    category: integration
    title: Official platform APIs only, per developer policy
    statement: >-
      Publishing uses only official Meta / X / Threads APIs under their
      developer policies (GR-6); no scraping-based or policy-violating paths.
      Meta app review + business verification gate cohort-1 activation (A-1).

  CON-3:
    v: 2
    category: deployment
    title: Deployment topology & environments
    statement: >-
      RESOLVED (DEC-36, ADR-0007). Dev: self-contained/zero-cloud. Phase-1 prod:
      self-hosted single instance via `docker compose` (app + `@news` renderer +
      bundled Postgres). Phase-2 prod (later): horizontally-scalable managed —
      GCP Cloud Run + Cloud SQL OR DigitalOcean (provider open, Q-15). Cloudflare
      CDN fronts static prod assets + the news surface (edge cache + tag-purge);
      Cloudflare R2 is the blob store. Environments = development (dev-login on,
      SEC-7) / production; the ops/admin console is config-flag-gated (SEC-11).
      PHASE-1 data durability is an obligation NOW (confidential org data, SEC-4,
      in the bundled Postgres): scheduled `pg_dump` → Cloudflare R2 with a bounded
      retention window + a restore path (ADR-0007). Only residual DATA-RESIDENCY /
      UPTIME-SLO decisions ride with the phase-2 provider (Q-15) — not backup.

  CON-4:
    v: 1
    category: compliance
    title: Admin impersonation time-box & audit retention
    statement: >-
      (DEC-35.) Support-impersonation sessions (ADMS-2, DM-18) are time-boxed at the
      BetterAuth default (1h, impersonationSessionDuration) — no custom value.
      The org activity ledger (DM-17) and SupportSession audit records are
      retained WITHOUT a fixed limit for now (revisitable). Open interaction to
      settle at implementation: a BIL-2 hard deletion removes org-confidential
      data (SEC-4) — decide then whether the staff-access AUDIT trail for a
      deleted org survives deletion (audit/compliance need) or is purged with the
      org (SEC-4 confidentiality); they pull opposite ways. Tightens SEC-11.
