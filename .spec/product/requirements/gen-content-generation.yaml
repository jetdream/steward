kind: requirements
prefix: GEN
title: Planning & Content Generation
status: approved
serves: [G-2, G-4]

intent: >-
  The engine that turns Memory + Strategy into a steady, on-mission publishing
  rhythm (G-4) — planned on a rolling calendar, drawn from the content
  taxonomy, adapted per channel, always with a real picture (VAL-4).

items:
  GEN-1:
    v: 4
    decided-by: DEC-23
    priority: P0
    serves: [G-1, G-2, G-4, G-5]
    depends: [MEM-1, STR-1, EXT-1, EXT-5, TOP-4]
    title: Rolling 4-week calendar
    statement: |
      Per-org calendar. Each slot pairs a content TYPE (from the taxonomy below)
      with a SUBJECT/theme from the editorial agenda (TOP-4, the system-maintained
      content topics) — the agenda supplies WHAT to talk about, the taxonomy HOW
      to frame it (v4, DEC-23). Drawing from the content taxonomy:
      - Internal: Mission (what value, how, why it matters) · Founder story ·
        Case studies (people/orgs benefited) · Own events, virtual and
        physical · People (employees & volunteers).
      - External: Related events (local → worldwide) · Related news · Related
        research/articles — supplied by the External Radar (EXT-1), plus the
        founder's SAVED POOL (EXT-5 v2, DEC-20) as the reserve: when a week
        has no fresher material, the planner drafts from saved items —
        preferring fresh over stale, never auto-drafting a passed event-tied
        save, and crediting the save in the draft's ReasonLine ("you saved
        this two weeks ago").
      - Overlays woven through the mix: Impact/Gratitude (stewardship rhythm,
        ≥1 per 4 weeks — north star, STW-1), Fundraising Asks (≤25% of mix,
        include donation URL when provided — scope.md boundary case),
        Seasonal/Campaign hooks (GivingTuesday, year-end, cause awareness
        days).
    coverage:
      status: complete
      reasoning: >-
        Covered by GENS-1 (approved, challenge r2 pass): the rolling planner pairs
        a taxonomy TYPE with a TOPS-4 agenda SUBJECT; mix quotas (≥1
        impact/gratitude, ≤25% asks) are deterministic counts over PLAN-TIME slot
        designations on a trailing 28-day window; saved-pool freshness rules
        (DEC-20). Realization pending code.
      against: [GENS-1@1, G-1@1, G-2@1, G-4@1, G-5@1, MEM-1@1, STR-1@2, EXT-1@2, EXT-5@2, TOP-4@1]

  GEN-2:
    v: 1
    origin: baseline
    priority: P0
    depends: [PUB-2, STR-1]
    title: Per-channel adaptation
    statement: >-
      One story → per-channel variants for every connected channel, adapted
      for (i) technical requirements — character limits, image requirements,
      link handling (PUB-2) — and (ii) the Strategy's channel-specific
      instructions (STR-1 section e).
    coverage:
      status: complete
      reasoning: >-
        Covered by GENS-2 (approved): a variant per CONNECTED channel (DM-14),
        adapted for PUB-2 technical + STR-1 §e, technical limits deterministically
        validated; adapt -> VAL -> fit per PIPE-2. Realization pending code.
      against: [GENS-2@1, G-2@1, G-4@1, PUB-2@1, STR-1@2]

  GEN-3:
    v: 1
    origin: baseline
    priority: P0
    flexibility: hard
    title: Every post carries a picture
    statement: >-
      Sources at launch: founder upload (per-post or batch) and the media
      library (harvested + uploaded, tagged by Memory). AI image generation
      ships disabled behind a feature flag; enabling is Q-3, governed by GR-4.
    coverage:
      status: complete
      reasoning: >-
        Covered by GENS-3 (approved): the hard picture invariant as the DM-5
        awaiting_picture->approved editorial gate (deterministic); AI visuals
        disabled behind the GR-4 flag; library sources tagged by Memory.
        Realization pending code.
      against: [GENS-3@1, G-2@1, G-4@1]

  GEN-4:
    v: 1
    origin: baseline
    priority: P0
    depends: [GEN-3, PRO-1]
    title: Awaiting-picture state
    statement: >-
      A draft without an assigned picture is fully written and visible but
      cannot be scheduled; it triggers a picture request (PRO-1) with
      suggestions from the library. One-tap attach from library in the Inbox
      (APR-1).
    coverage:
      status: complete
      reasoning: >-
        Covered by GENS-4 (approved): the complete-but-blocked awaiting-picture
        state (never an error, XH-5), the DM-5 approval gate, picture request
        (PRO-1) with Memory-ranked library suggestions, one-tap attach (APR-1).
        Realization pending code.
      against: [GENS-4@1, G-2@1, G-4@1, GEN-3@1, PRO-1@1]

  GEN-5:
    v: 1
    origin: baseline
    priority: P0
    depends: [STR-3, PUB-2]
    title: Channel-fit gate
    statement: >-
      For each draft × channel, the system shall decide should this go here at
      all (Strategy fit + content-type fit + technical fit). Unfit channels are
      skipped with a visible reason ("skipped X: over policy 'no long stories
      on X'"). Founder can override per post.
    coverage:
      status: complete
      reasoning: >-
        Covered by GENS-5 (approved): per-variant fit verdicts after adapt+VAL
        (PIPE-2/DM-5), visible skip reason, retained variant for founder
        preview/override; deterministic skip scoped to technical/structural,
        semantic §e is an LLM classification (STRS-3). Realization pending code.
      against: [GENS-5@1, G-2@1, G-4@1, STR-3@1, PUB-2@1]

  GEN-6:
    v: 1
    origin: baseline
    priority: P1
    title: Performance feedback
    statement: Per-post metrics (read-only insights) feed the Planner.
    coverage:
      status: complete
      reasoning: >-
        Covered by GENS-6 (approved): PostMetric (DM-10) as read-only planner
        weighting; no metric alone triggers an autonomous action (VAL-3). P1 —
        outside the P1a thin slice. Realization pending code.
      against: [GENS-6@1, G-2@1, G-4@1]
