kind: requirements
prefix: PUB
title: Publishing
status: approved
serves: [G-1, G-4]

intent: >-
  Approved content reliably reaches the four launch channels through official
  APIs (GR-6), at engagement-optimal times, with failures handled by operators
  — the founder is bothered only when action is needed (MEM-2).

items:
  PUB-1:
    v: 2
    decided-by: DEC-13
    priority: P0
    flexibility: hard
    serves: [G-1, G-4, G-5]
    title: Channels at launch
    statement: >-
      Facebook Pages, Instagram feed, Threads, X — official APIs only,
      per-channel scheduling at engagement-optimal times.
    acceptance: >-
      An approved variant publishes at its scheduled time ±5 min; failures
      retry and alert operators (OPS-1); the founder is alerted only if action
      is needed.
    coverage:
      status: complete
      reasoning: >-
        Covered by PUBS-1 (approved, challenge r4 pass — v3 news-purge-failure): official-API-only
        delivery (GR-6) at engagement-optimal ±5 min, posts only on a HEALTHY
        ChannelConnection (DM-14/ONBS-4), retry+operator alert (OPS-1),
        founder-only-when-needed (MEM-2), AUT-3 kill/pause + AUT-1 veto honored,
        and the account-level active-Subscription gate (PUBS-1 v3 — a cancelled org
        does not publish, BILS-2); asymmetric news destination. Realization pending
        code.
      against: [PUBS-1@3, G-1@1, G-4@1, G-5@1]

  PUB-2:
    v: 1
    origin: baseline
    priority: P0
    title: Per-channel technical profiles
    statement: >-
      Maintained as configuration: length limits, media requirements, link
      behavior, rate limits — consumed by GEN-2/GEN-5 so adaptation and gating
      stay correct as platforms change.
    coverage:
      status: complete
      reasoning: >-
        Covered by PUBS-2 (approved): per-channel technical profile as config (the
        single source read by GENS-2/GENS-5), swappable per channel without code
        (R-6), isolated so one channel's change never affects others; the scheduler
        also consumes rate limits. Realization pending code.
      against: [PUBS-2@1, G-1@1, G-4@1]

  PUB-3:
    v: 1
    origin: baseline
    priority: P0
    title: Publish log
    statement: >-
      What went out, where, when, with links and the variant text; visible in
      Calendar/Published (UX-4).
    coverage:
      status: complete
      reasoning: >-
        Covered by PUBS-3 (approved): an append-only per-variant log (destination,
        timestamp, live link, exact text) visible in Calendar/Published (UX-4 /
        XG-4) — the VAL-3 nothing-hidden guarantee; auto-published posts logged
        like approved ones. Realization pending code.
      against: [PUBS-3@1, G-1@1, G-4@1]

  PUB-4:
    v: 1
    origin: baseline
    priority: P2
    title: LinkedIn evaluation
    statement: Evaluate LinkedIn as a fifth channel.
    coverage:
      status: complete
      reasoning: >-
        Covered by PUBS-4 (approved): P2 deferral with the binding constraint that
        LinkedIn, if adopted, reuses the ARC-18 adapter-behind-a-port + PUB-2
        profile pattern — no bespoke publishing path (GR-6, R-6). Realization
        pending code.
      against: [PUBS-4@1, G-1@1, G-4@1]
