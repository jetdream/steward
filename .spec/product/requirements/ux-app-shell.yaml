kind: requirements
prefix: UX
title: App Shell & Navigation
status: approved
serves: [G-3]
source: PRD v0.3 §8 (UX requirements were unnumbered there; IDs assigned at decomposition)

intent: >-
  One adaptive home plus summoned views and one action, on a responsive web
  app (the One-Home model, DEC-18 — supersedes the original five-surfaces-
  plus-one framing). The shell embodies VAL-5 (colleague voice) and VAL-6
  (no empty states — the system always moves first); the glass wall is
  always one click (VAL-3).

items:
  UX-1:
    v: 2
    decided-by: DEC-19
    priority: P0
    title: Mobile-first responsive web
    statement: >-
      Mobile-first: the phone is the FLOOR — every founder action is
      available one-handed in a phone browser. Desktop adds SIMULTANEITY
      (a summoned pane beside the home, DEC-19), never exclusive
      capability; the home column never stretches into a dashboard. No
      native mobile apps (scope.md).
    coverage:
      status: complete
      reasoning: >-
        Covered by UXS-1 (approved, challenge r1 pass): phone-is-the-floor
        one-handed reach, desktop adds a summoned pane (DEC-19) never exclusive
        capability, single-column home, no native apps. Realization pending code.
      against: [UXS-1@1]

  UX-2:
    v: 2
    decided-by: DEC-18
    priority: P0
    title: The ambient conversation
    statement: >-
      The conversation is the home's medium, not a separate destination:
      interviewer sessions, questions, ideation, redirects (CHT-1, CHT-2)
      run in the home stream, led and never blank (CHT-5); (P1) commands
      (CHT-3).
    coverage:
      status: complete
      reasoning: >-
        Covered by UXS-2 (approved): the conversation is the home's medium (DEC-18
        fusion), interviewer/questions/redirects inline (CHTS/INTS), never blank
        (CHTS-5), commands P1 — no separate chat page. Realization pending code.
      against: [UXS-2@1]

  UX-3:
    v: 3
    decided-by: DEC-18
    priority: P0
    title: Ready — the home's finite spine
    statement: >-
      The finite, clearable approval stack inside the home: per-channel
      variants, fit indicators, awaiting-picture states (APR-1, GEN-4);
      always reaches an honest "caught up". Where most founder time lives.
    coverage:
      status: complete
      reasoning: >-
        Covered by UXS-3 (approved): the finite in-home Ready spine that always
        reaches "caught up"; holds/failures pin and are never batch-cleared (the
        One-Home invariant, reconciled with APRS-1). Realization pending code.
      against: [UXS-3@1]

  UX-4:
    v: 1
    origin: baseline
    priority: P0
    title: Calendar / Published surface
    statement: >-
      Planned and published posts across all channels; publish log (GEN-1,
      PUB-3).
    coverage:
      status: complete
      reasoning: >-
        Covered by UXS-4 (approved): a one-click, pull-only glass-wall view of the
        plan (GENS-1) + publish log (PUBS-3) across channels (screen XG-8), never
        badged/nudging. Realization pending code.
      against: [UXS-4@1]

  UX-5:
    v: 2
    decided-by: DEC-18
    priority: P0
    title: Knowledge & How-I-write views
    statement: >-
      Two one-click glass-wall views (formerly one Organization page with
      two tabs): Knowledge — what the system knows (MEM-3 browser at P1;
      hosts the INT-4 open-questions list) — and How I write — the Posting
      Strategy (STR-1 sections, versioned editor per STR-2).
    coverage:
      status: complete
      reasoning: >-
        Covered by UXS-5 (approved): two one-click, plain-labeled, pull-only
        glass-wall views (Knowledge XG-6, How-I-write XG-7) never gated behind
        chat (DEC-18/VAL-3); Knowledge hosts INT-4, How-I-write is the versioned
        Strategy (STRS/STR-2). Realization pending code.
      against: [UXS-5@1]

  UX-6:
    v: 1
    origin: baseline
    priority: P0
    title: Settings / Billing surface
    statement: >-
      Cadence (APR-2), notifications (APR-4), autonomy levels per category
      (AUT-1), per-channel pause and kill switch (AUT-3), plan (BIL-1).
    coverage:
      status: complete
      reasoning: >-
        Covered by UXS-6 (approved): the Controls tray (XA-6) with cadence
        (APRS-2), notifications (APRS-4), per-category autonomy (AUT-1),
        pause/kill (AUT-3), plan (BIL-1); the kill switch always one gesture from
        the chrome. Realization pending code.
      against: [UXS-6@1]

  UX-7:
    v: 2
    decided-by: DEC-18
    priority: P0
    title: Compose action
    statement: >-
      An action, never a place: + Compose in the home chrome (or via chat),
      not a nav item — master text → picture → channels → adapted variants →
      confirm (APR-5).
    coverage:
      status: complete
      reasoning: >-
        Covered by UXS-7 (approved): Compose as an action in the chrome / via chat
        (never a nav destination, VAL-6), launching the APRS-5 composer flow,
        reachable one-handed (UXS-1). Realization pending code.
      against: [UXS-7@1]

  UX-8:
    v: 2
    decided-by: DEC-18
    priority: P1
    title: Discoveries view
    statement: >-
      A pull-only glass-wall view (formerly "a sixth navigation surface"):
      the org's personalized feed of discovered external content (EXT-5),
      one click from the home's Look-inside cluster. Pull-only by rule — it
      never carries a badge or count, and the feed never generates tasks,
      digest entries, or nudges.
    coverage:
      status: complete
      reasoning: >-
        Covered by UXS-8 (approved): the one-click, pull-only Discoveries feed
        (EXT-5, screen XG-9) that never badges/counts/nudges or generates
        tasks/digest entries (VAL-6, G-3). P1. Realization pending code.
      against: [UXS-8@1]
