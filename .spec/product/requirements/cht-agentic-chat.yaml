kind: requirements
prefix: CHT
title: Agentic Chat
status: approved
serves: [G-2, G-3]

intent: >-
  The conversational front door that makes the "hired human" real — one chat
  aware of everything, where talking is always an alternative to clicking.
  Hosts the Interviewer (INT-1). Contractual thin slice for P1a (R-1):
  interviewer + context Q&A + redirects; command actions are P1.

items:
  CHT-1:
    v: 1
    origin: baseline
    priority: P0
    title: Full context awareness
    statement: >-
      One chat surface with awareness of Org Memory, the Posting Strategy, all
      past and scheduled posts across all channels, and current requests.
    acceptance: >-
      "What's going out this week and where?" answered correctly; "what do you
      know about our volunteer program?" answered from Memory with sources.
    coverage:
      status: complete
      reasoning: >-
        Covered by CHTS-1 (approved, challenge r2 pass): grounded answers from
        Memory (MEMS-4) + Strategy + ContentItem schedule with sources, honest
        "I don't know" -> INT-4 gap, and the GR-2 legal/tax decline gate (the
        answer surface bypasses PIPE-2 VAL) held by catch-rate + fail-safe.
        Realization pending code.
      against: [CHTS-1@1, G-2@1, G-3@1]

  CHT-2:
    v: 2
    decided-by: DEC-22
    priority: P0
    title: Redirects via chat
    statement: >-
      When the founder gives plain-language feedback ("less formal," "never
      name donors," "on X be punchier"), the system shall confirm it back and
      write it to Memory — the single source for founder rules/taboos (MEM-1,
      MEMS-1); the Strategy's org-rules section projects it (DEC-22) — binding
      future drafts immediately.
    coverage:
      status: complete
      reasoning: >-
        Covered by CHTS-2 (approved): confirm-back-before-bind (a deterministic
        gate), write via the MEMS-1 explicit-correction path (styleRule/taboo,
        never a bare fact), Strategy §c projects it (STRS-1 view, DEC-22), binds
        the next draft (MEMS-3), rule-contradiction surfaced. Realization pending
        code.
      against: [CHTS-2@1, G-2@1, G-3@1]

  CHT-3:
    v: 1
    origin: baseline
    priority: P1
    title: Command actions via chat
    statement: >-
      Create a draft, edit a scheduled post, reschedule, pause a channel,
      trigger a campaign — each executed through the same pipelines as the UI,
      with confirmation for destructive actions.
    coverage:
      status: complete
      reasoning: >-
        Covered by CHTS-3 (approved): actions run the identical GEN/PUB/AUT
        pipelines (never a parallel path, guardrails inherited downstream),
        destructive/outward actions confirm-back, permission/autonomy-scoped
        (AUT). P1 — outside the P1a thin slice (R-1). Realization pending code.
      against: [CHTS-3@1, G-2@1, G-3@1]

  CHT-4:
    v: 1
    origin: baseline
    priority: P0
    title: Voice
    statement: >-
      Colleague, never software; every system-initiated message carries a
      reason. Governed by VAL-5.
    coverage:
      status: complete
      reasoning: >-
        Covered by CHTS-4 (approved): the reason is a REQUIRED field on any
        proactive message (a deterministic gate — no reason, not sent); colleague
        tone is an LLM quality held by review/eval (honest LRN-20 split); binds
        all system-initiated chat surfaces. Realization pending code.
      against: [CHTS-4@1, G-2@1, G-3@1]

  CHT-5:
    v: 1
    decided-by: DEC-17
    priority: P0
    title: Proactive, leading chat — never a blank prompt
    statement: >-
      Chat never presents a blank prompt (VAL-6, DS-6 applied to chat). It
      LEADS the conversation so the founder mostly ANSWERS questions they
      already know the answers to; when idle it offers a few non-trivial,
      context-relevant suggested openings rather than an empty box. It hosts
      the guided "Adjust" — the alternative to APR-1's raw inline Edit: instead
      of a text editor, the chat asks what to change and offers the most
      relevant options given the overall context (Memory + Strategy + this
      draft). And it is the home of the ENRICHMENT LOOP (learn-by-disposing):
      an information-bearing disposition — a Skip/reject ("mind saying why?",
      OptionalReason) or an Adjust — becomes a short, optional conversation
      that deepens Org Memory (MEM-1). Blank-page avoidance is the point: the
      hardest thing for this persona is knowing what to say (R-10).
    acceptance: >-
      Opening chat with no prior context shows suggested, specific openings
      (never an empty box); skipping a draft offers a one-line "why?" that,
      answered, writes a rule/fact to Memory.
    coverage:
      status: complete
      reasoning: >-
        Covered by CHTS-5 (approved): never-blank suggested openings (VAL-6,
        DS-6), the guided Adjust as the default alternative to APR-1 raw edit, and
        the single enrichment loop (DEC-17) shared with INT-4 (post-completion
        OptionalReason -> Memory). Realization pending code.
      against: [CHTS-5@1, G-2@1, G-3@1]
