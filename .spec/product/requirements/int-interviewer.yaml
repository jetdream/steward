kind: requirements
prefix: INT
title: Interviewer
status: approved
serves: [G-2, G-3, G-5]

intent: >-
  The chat skill that fills Memory gaps as a curious thinking partner — the way
  a great hire would in their first week — never a form in disguise. Driven by
  the gap model (ONB-3) and by content-value heuristics: stories > adjectives.

items:
  INT-1:
    v: 1
    origin: baseline
    priority: P0
    title: The Interviewer skill
    statement: >-
      Conducts initial and ongoing info-gathering as a curious interviewer and
      thinking partner. Friendly, inviting tone; open questions; deepening
      follow-ups that pursue what will later fuel content and ideation ("You
      mentioned the first family you helped — what happened next? That's the
      kind of story donors remember").
    coverage:
      status: complete
      reasoning: >-
        Covered by INTS-1 (approved, challenge r1 pass): the curious
        thinking-partner skill grounded in Memory (MEMS-4) + the gap model
        (ONBS-3); conversational quality honestly framed as an LLM behavior held
        by heuristic + acceptance (LRN-20). Realization pending code.
      against: [INTS-1@1, G-2@1, G-3@1, G-5@1]

  INT-2:
    v: 1
    origin: baseline
    priority: P0
    depends: [ONB-3, MEM-1, MEM-2]
    title: Interview mechanics
    statement: >-
      Session-resumable; a few questions at a time, never an interrogation;
      driven by ONB-3's gap model; every answer written to Memory (MEM-1);
      never re-asks (MEM-2); explicitly connects answers to value ("I'll turn
      this into a founder-story post — you'll see it in your next digest").
    coverage:
      status: complete
      reasoning: >-
        Covered by INTS-2 (approved): resumable (DM-6/7), few-at-a-time rate cap,
        driven by the single ONBS-3 gap model, answers via the MEMS-1 free-remark
        path (MEMS-5 narrower default), never re-asks via the MEMS-6 asked-set,
        value-connecting. Realization pending code.
      against: [INTS-2@1, G-2@1, G-3@1, G-5@1, ONB-3@1, MEM-1@1, MEM-2@1]

  INT-3:
    v: 1
    origin: baseline
    priority: P1
    title: Periodic curiosity
    statement: >-
      After launch weeks, the Interviewer occasionally (rate-limited) probes
      for fresh material tied to the calendar ("your beach cleanup is Saturday
      — want me to prep a before/after pair of posts?").
    coverage:
      status: complete
      reasoning: >-
        Covered by INTS-3 (approved): rate-limited calendar-tied proactive
        probes with a distinct per-org aggregate cadence budget (mirrors TOPS-3),
        consulting the MEMS-6 asked-set / MEMS-5 shouldAsk; PRO-1 boundary noted.
        Realization pending code.
      against: [INTS-3@2, G-2@1, G-3@1, G-5@1]

  INT-4:
    v: 1
    decided-by: DEC-17
    priority: P1
    title: Progressive enrichment
    statement: >-
      Onboarding gathers what it can and never blocks on gaps (ONB-1); the rest
      is filled PROGRESSIVELY, on the founder's time, not via upfront forms
      (R-10). The system keeps a gentle, always-available set of OPEN QUESTIONS
      — visible but never a nag — that the founder can answer in a spare ten
      minutes, each tied to why it helps ("a founder-story detail would sharpen
      next week's posts"). Answers flow to Org Memory (MEM-1) and improve future
      drafts. Complements INT-3's calendar-triggered curiosity with
      DISPOSITION-triggered asks (the enrichment loop, CHT-5): a Skip or reject
      invites one deeper question. Surface: the Knowledge view (UX-5) and via
      chat; rate-limited and dismissible, never blocking.
    acceptance: >-
      A founder who provided minimal onboarding still receives drafts; an
      always-available "help me understand you" list holds a few specific open
      questions; answering one is reflected in later drafts.
    coverage:
      status: complete
      reasoning: >-
        Covered by INTS-4 (approved): the always-available open-questions list is
        a filtered VIEW of the ONBS-3 gap model (asked-set + shouldAsk), surfaced
        in the Knowledge view (UX-5) + chat; disposition-triggered enrichment via
        CHT-5; never-blocking, dismissible. Realization pending code.
      against: [INTS-4@1, G-2@1, G-3@1, G-5@1]
