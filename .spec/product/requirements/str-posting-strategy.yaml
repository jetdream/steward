kind: requirements
prefix: STR
title: Posting Strategy
status: approved
serves: [G-2]

intent: >-
  The system's editorial judgment written down where the founder can see and
  change it (VAL-3) — an explicit contract, not a black box. Enforced on every
  draft; the mechanism by which redirects (CHT-2) durably bind future content.

items:
  STR-1:
    v: 2
    decided-by: DEC-23
    priority: P0
    title: The Strategy document
    statement: >-
      Every org has an explicit, versioned Posting Strategy with exactly these
      sections: (a) what to post / what not to post — drawn from the editorial
      agenda (TOP-4, the system-maintained content topics), founder-editable;
      (b) tone of voice — description and concrete examples; (c) restrictions /
      compliance / guardrails; (d) specific standing instructions;
      (e) channel-specific instructions (per FB / IG / Threads / X).
    coverage:
      status: complete
      reasoning: >-
        Covered by the approved STRS spec (challenge r1-r2 pass, 2026-07-19):
        STRS-1 formalizes the five-section doc with the (a/b/d/e)-persisted /
        (c)-derived-view split (DM-3 v2) and section (a) drawn from the TOP-4
        agenda. Realization pending code.
      against: [STRS-1@1, G-2@1]

  STR-2:
    v: 1
    origin: baseline
    priority: P0
    depends: [ONB-2, CHT-2]
    title: Auto-drafted, founder-owned
    statement: >-
      Auto-drafted from ingestion (ONB-2 style findings) + interview answers;
      presented for founder review; editable in the How-I-write view (UX-5) and
      via chat (CHT-2). Edits bind immediately and are versioned with diffs.
    coverage:
      status: complete
      reasoning: >-
        Covered by STRS-2 (approved): auto-draft grounded in ONB-2 + interview,
        founder-editable (How-I-write + chat) with semantic (not positional)
        routing, immediate binding, two versioning paths. Realization pending code.
      against: [STRS-2@1, G-2@1, ONB-2@1, CHT-2@2]

  STR-3:
    v: 1
    origin: baseline
    priority: P0
    flexibility: hard
    title: Enforcement
    statement: >-
      Every draft shall be validated against the Strategy before entering any
      queue; the channel-fit gate (GEN-5) and channel adaptations (GEN-2)
      consume section (e).
    coverage:
      status: complete
      reasoning: >-
        Covered by STRS-3 (approved): validation at the VAL stage before any
        queue, with the soft-inject (a/b/d) vs hard-gate (e channel-fit, GEN-5)
        split and the (c) overlay co-located but not performed by strategy-fit.
        Realization pending code.
      against: [STRS-3@1, G-2@1]

  STR-4:
    v: 2
    decided-by: DEC-22
    priority: P0
    flexibility: hard
    title: Two-layer guardrails
    statement: >-
      Platform-level rules (non-negotiable: GR-1..GR-6) + org-level rules.
      Org-level rules are founder-stated taboos/styleRules that live in Memory —
      the single source (MEM-1); the Strategy's section (c) is a rendered VIEW
      of that active overlay, not a second store (DEC-22), and they are enforced
      by the Memory rule/taboo overlay gate at the VAL stage (GR-8, PIPE-2),
      co-located with — not performed by — STR-3. A direct edit to section (c)
      — adding or changing an org rule, via the How-I-write view or chat —
      routes to a Memory write (supersession, MEMS-2), not a StrategyDoc diff.
      Org rules can only tighten, never loosen, platform rules.
    coverage:
      status: complete
      reasoning: >-
        Covered by STRS-4 (approved): the platform (GR-1..GR-6) / org (Memory
        overlay) layering with tighten-only pinned on the deterministic
        enforcement-time independence of the platform GR check (org overlay
        never gates it), write-time loosen-detection best-effort. Realization
        pending code.
      against: [STRS-4@1, G-2@1]
