kind: requirements
prefix: EXT
title: External Content Radar
status: approved
serves: [G-2, G-4]

intent: >-
  The second content well — things the org's audience genuinely cares about
  (related events, news, research), discovered automatically and offered as
  drafts in the org's voice. Highest reputation-risk surface (R-4): citations
  are mandatory (GR-5) and autonomy is permanently capped.

items:
  EXT-1:
    v: 2
    decided-by: DEC-23
    priority: P0
    source: A-3 (Gemini + Google Search grounding; upgrade path fixed there)
    title: Radar v0
    statement: >-
      Recurring discovery runs per org, driven by the editorial agenda — the
      content topics and their per-topic research strategies (TOP-1, TOP-2) —
      grounded in the org's cause profile and geography from Memory (local →
      county → state → national → global). Output: candidate items (events,
      news, research) with source links and relevance rationale.
    coverage:
      status: complete
      reasoning: >-
        Covered by EXTS-1 (approved, challenge r2 pass): recurring agenda-driven
        (TOPS-1/2) runs grounded in Memory geography (MEMS-4) via Gemini+Search
        (IG-3); candidates with a provenance-bound, dereferenceable source (R-4/
        GR-5 guard) + rationale + event date; cold-start bootstrap. Realization
        pending code.
      against: [EXTS-1@1]

  EXT-2:
    v: 1
    origin: baseline
    priority: P0
    depends: [EXT-1]
    title: External drafts
    statement: >-
      Selected candidates become drafts in the org's voice with mandatory
      source citation (GR-5) and clear commentary framing (the org's
      perspective, not rehashed news). Always subject to the sensitive-topic
      classifier (GR-3).
    coverage:
      status: complete
      reasoning: >-
        Covered by EXTS-2 (approved): worth-a-post candidates drafted by the
        content engine (GENS, LRN-22), mandatory GR-5 citation + org-perspective
        commentary + GR-3 sensitive gating at PIPE-2 VAL (PIPE-3 v2); sourced from
        the ExternalItem (DM-8<->DM-5). Realization pending code.
      against: [EXTS-2@1]

  EXT-3:
    v: 1
    origin: baseline
    priority: P0
    flexibility: hard
    title: Autonomy cap
    statement: >-
      External-content posts are permanently capped at TL1 — never full
      autopilot (AUT-2).
    coverage:
      status: complete
      reasoning: >-
        Covered by EXTS-3 (approved): the permanent TL1 cap as a hard
        deterministic invariant, enforced from the autonomy side by AUTS-2
        (no double-ownership). Realization pending code.
      against: [EXTS-3@1]

  EXT-4:
    v: 2
    decided-by: DEC-23
    priority: P1
    title: Source depth
    statement: >-
      Add Google News RSS + newsdata.io (news), GDELT (event streams), arXiv
      (research) as structured feeds; add Perplexity and/or Tavily/Exa as
      discovery engines (order: Q-4). Discovery runs against the editorial
      agenda (TOP); founder-welcomed/banned topics are managed there and
      reflected in Strategy section (a).
    coverage:
      status: complete
      reasoning: >-
        Covered by EXTS-4 (approved): structured feeds + engines behind the same
        ADR-0003 port and agenda-driven query model (no bespoke path); banned
        agenda topics suppress discovery. P1; upgrade order is the open Q-4.
      against: [EXTS-4@1]

  EXT-5:
    v: 2
    decided-by: DEC-20
    priority: P1
    depends: [EXT-1, MEM-1]
    title: Discoveries feed — read-first triage
    statement: >-
      Every discovered candidate (EXT-1) is stored and READABLE as the org's
      personalized feed (surfaced on UX-8). Each item leads with content
      worth reading — headline, source, a short summary — before any ask:
      the founder reads first, then disposes. Three one-tap dispositions,
      each writing to Memory (MEM-1) and tuning future discovery:
      "worth a post" (hands to drafting, EXT-2; items tied to ongoing or
      imminent events are flagged time-sensitive and prioritized),
      "save for later" (a kept pool the planner may draw from to fill open
      calendar slots when no fresher material exists — the external well's
      reserve), and "not for us" (teaches taste). An effortless alignment
      channel and the org's own news feed. Strictly a PULL surface: never
      badged, counted, or nudged (VAL-6); browsing time is treated like
      voluntary chat time under G-3. (v2, DEC-20: read-first framing, the
      save-for-later pool, event-tied prioritization; pull-only unchanged.)
    coverage:
      status: complete
      reasoning: >-
        Covered by EXTS-5 (approved): read-first pull-only feed (DM-8, UX-8/
        XG-9); three dispositions writing to Memory (MEMS-1) + tuning discovery;
        saved pool feeds the planner (GENS-1); not-for-us refines TOPS-2; never
        badged/nudged. Surface P2, behavior specified. Realization pending code.
      against: [EXTS-5@1]
