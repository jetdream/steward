kind: requirements
prefix: APR
title: Approval surface (Ready) & Composer
status: approved
serves: [G-2, G-3]

intent: >-
  Where 90% of the founder's non-chat time lives — the one-tap digest that
  keeps founder effort under 15 min/week (G-3), plus the manual composer for
  founder-initiated posts. Every interaction here feeds the learning loop
  (MEM-1).

items:
  APR-1:
    v: 3
    decided-by: DEC-16
    priority: P0
    serves: [G-1, G-2, G-3, G-4, G-5]
    depends: [GEN-5]
    title: Ready
    statement: >-
      Drafts with per-channel variant preview and fit indicators (GEN-5);
      one-tap Approve (all variants), per-channel toggle, inline Edit (per
      variant or master), Skip, free-text redirect (CHT-2 semantics). Batch
      approve supported.
    coverage:
      status: complete
      reasoning: >-
        Covered by APRS-1 (approved, challenge r2 pass): the disposition spine with
        per-variant fit verdicts (GEN-5), Trust-Level approve/veto (AUT-1),
        DM-5-exact undo scope (pending recall; scheduled -> AUT-3/veto), batch
        approve excluding pinned/blocked cards, dispositions -> Memory. Realization
        pending code.
      against: [APRS-1@3]

  APR-2:
    v: 1
    origin: baseline
    priority: P0
    title: Founder-selected cadence
    statement: >-
      Daily / 2–3×week / weekly (default weekly); event-driven items
      (campaigns, time-sensitive external items, picture-request follow-ups)
      may arrive anytime.
    coverage:
      status: complete
      reasoning: >-
        Covered by APRS-2 (approved): the deterministic digest cadence with
        event-driven items on a separate always-allowed channel that never frames
        the home as behind (XH-4). Realization pending code.
      against: [APRS-2@1]

  APR-3:
    v: 2
    decided-by: DEC-22
    priority: P0
    depends: [MEM-1]
    title: Learning loop
    statement: >-
      Every edit is diffed; recurring edit patterns are proposed as Memory
      styleRules/taboos (surfaced in the Strategy's org-rules view — DEC-22,
      MEMS-1) ("You've shortened 4 X posts in a row — set 'max 200 chars on X'
      as a rule?").
    coverage:
      status: complete
      reasoning: >-
        Covered by APRS-3 (approved): edit-diff -> recurring-pattern PROPOSAL
        (confirm-before-bind) -> accepted rule written via the MEMS-1 explicit
        channel (styleRule/taboo), projected in the Strategy view (DEC-22);
        declined not re-proposed (MEMS-6). Realization pending code.
      against: [APRS-3@1]

  APR-4:
    v: 1
    origin: baseline
    priority: P0
    title: Notifications
    statement: >-
      Email (web push P1) for digest-ready and time-sensitive items; deep
      links.
    coverage:
      status: complete
      reasoning: >-
        Covered by APRS-4 (approved): email via the IG-5 port (XH-15 digest),
        deep-link to the Ready-spine top, time-sensitive off-cadence notifies,
        routine items batched (bother-only-when-needed, MEM-2). Realization pending
        code.
      against: [APRS-4@1]

  APR-5:
    v: 1
    origin: baseline
    priority: P0
    depends: [GEN-2, GEN-5, PUB-1]
    title: Manual composer
    statement: >-
      The founder writes a post (master text), attaches a picture (upload or
      library), picks target channels (or accepts the fit-gate's suggestion);
      the system produces channel adaptations for confirmation; then normal
      scheduling/publishing (PUB-1). Also reachable via chat ("post this photo
      with a thank-you to Saturday's volunteers") — chat-initiated composition
      is P0 for creation-with-confirmation, P1 for full command flow (CHT-3).
    coverage:
      status: complete
      reasoning: >-
        Covered by APRS-5 (approved): the composer surface hands the founder master
        to the content engine (ARC-15 / GENS-2 / PIPE-2 / GENS-5) yielding a draft
        for confirmation — same VAL chain as generation, no authorship bypass
        (GR-1/2/3/5/8); the GEN-3 picture invariant applies. Realization pending
        code.
      against: [APRS-5@1]

  APR-6:
    v: 1
    origin: baseline
    priority: P1
    title: Quiet accountability
    statement: >-
      One gentle nudge if a digest sits >72h; never guilt, never spam (VAL-5).
    coverage:
      status: complete
      reasoning: >-
        Covered by APRS-6 (approved): exactly one nudge at >72h, a second miss
        escalates nothing (rhythm restarted forward, XH-4/DEC-16), rate-limited,
        never guilt (VAL-5). P1. Realization pending code.
      against: [APRS-6@1]
