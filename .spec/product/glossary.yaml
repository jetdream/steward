kind: glossary
title: Domain Glossary
status: approved

intent: >-
  The authoritative vocabulary. One term — one concept; when a term risks
  overload, qualify it (e.g., "auth token" vs "LLM token"). New domain
  concepts are added here in the same change that introduces them. Code
  identifiers, DB entities, and UI copy use these names. Short forms map to
  their full term.

terms:
  Org: >-
    A customer organization — a small US 501(c)(3) nonprofit with a single
    account.
  Founder-Operator: The primary user persona; the person running the org (users.md).
  Org Memory: >-
    (short: Memory) The persistent knowledge store about an org: facts,
    stories, style rules, taboos, people, programs, events — each entry
    attributed with source and timestamp. Owned by MEM requirements.
  Memory Entry: >-
    One attributed record in Org Memory, typed as fact / story / styleRule /
    taboo / person / program / event.
  Posting Strategy: >-
    (short: Strategy) The explicit, versioned, founder-editable editorial
    contract with sections: (a) what to post / not post, (b) tone of voice,
    (c) restrictions & guardrails, (d) standing instructions, (e)
    channel-specific instructions. Owned by STR requirements.
  Interviewer: >-
    The chat skill that gathers information as a curious thinking partner —
    never a form. Owned by INT requirements.
  Agentic Chat: >-
    (short: Chat) The single conversational surface with full context
    awareness (Memory, Strategy, all posts, schedules). Owned by CHT
    requirements.
  Redirect: >-
    Plain-language founder feedback via chat or the Ready surface ("less
    formal") that is confirmed back and written to Memory — the single source
    for founder rules/taboos (MEM-1); the Strategy's org-rules section projects
    it (DEC-22) — binding future drafts immediately.
  Content taxonomy: >-
    The classification of content: Internal (mission, founder story, case
    studies, own events, people), External (related events, news, research),
    and Overlays (impact/gratitude, fundraising asks, seasonal/campaign
    hooks).
  External Radar: >-
    (short: Radar; founder-facing: "Discoveries" — DEC-16) Recurring discovery
    of external candidate items (events, news, research) relevant to the org's
    cause, with source links and relevance rationale. Owned by EXT
    requirements.
  Master post: >-
    (short: Master) The channel-independent text of a content item, from which
    channel variants are derived.
  Channel Variant: >-
    A per-channel adaptation of a master post, honoring technical limits and
    Strategy section (e).
  Fit Gate: >-
    (also: channel-fit) The per-draft-per-channel decision "should this go
    here at all" (Strategy fit + content-type fit + technical fit), with a
    visible skip reason and founder override. Defined by GEN-5.
  Awaiting-picture: >-
    Content item state: fully written but not schedulable until a picture is
    attached.
  Media Library: >-
    (short: Library) The org's tagged picture store: harvested at ingestion
    plus founder uploads.
  Ready: >-
    (formerly "Inbox" — DEC-16) The approval surface: the finite, clearable
    spine of the Home where the founder reviews finished drafts (per-channel
    variants, fit indicators) and gives the one verb, Approve. Founder-facing
    header reads "Ready for you". Owned by APR requirements.
  Home: >-
    (DEC-18) The single founder surface: a fused, finite stream — the pinned
    needs-you zone, the Ready spine, and the ambient leading conversation —
    that morphs with the trust arc (day-one / steady / quiet shapes) over one
    invariant skeleton. Everything else is summoned from its chrome.
  Glass wall: >-
    (DEC-18; VAL-3 experienced) The four plain-labeled, one-click, pull-only
    inspection views — Knowledge, How I write, Plan & Published, Discoveries —
    permanently visible in the Home chrome, never badged, never gated behind
    asking in chat.
  Controls: >-
    (DEC-18) The summoned tray for configuring the colleague: cadence,
    notifications, plain-language trust dials, channels, pause / kill switch,
    plan & billing, and cancel.
  Digest: >-
    A batch of ready-to-review drafts delivered at the founder's chosen
    cadence.
  Composer: >-
    The manual post-creation flow: master text → picture → channels → adapted
    variants → confirm. An action, not a nav surface (APR-5, UX-7).
  Publisher: >-
    The subsystem that schedules and publishes approved variants through
    official channel APIs. Owned by PUB requirements.
  Channel: >-
    A connected social destination: Facebook Page, Instagram feed, Threads,
    or X. Qualified since DEC-9: "social channel" means these four;
    "publishing destination" additionally includes the org news page, which
    publishes through the same adapter model (ARC-18, NWS-1) but is never
    "connected" (no OAuth) and never counted in PUB-1's launch set.
  Article: >-
    A long-form story published to the org news page (NWS-1): headline, hero
    image, body, topic tags (NWS-4). Rides the same draft pipeline as posts
    (Strategy-checked, guardrail-checked); its social variants may carry the
    article link (NWS-5).
  News page: >-
    The org's hosted, SEO-first public news surface (NWS-1..6) on the DS-8
    org-branded template — one templated surface per org, not website
    building (scope.md boundary case). Read by the audience-reader persona
    (users.md), journey EXP-9.
  Channel profile: >-
    Per-channel technical configuration: length limits, media requirements,
    link behavior, rate limits (PUB-2).
  Publish log: >-
    The record of what went out, where, when, with links and variant text
    (PUB-3).
  Proactive Manager: >-
    The subsystem that initiates: material requests with reasons, campaign
    proposals, ask-hygiene. Owned by PRO requirements.
  Material request: >-
    A Proactive Manager ask for raw input (usually pictures), always tied to a
    real event and a reason (PRO-1).
  Trust Level: >-
    (TL) Per-content-category autonomy: TL0 approve-everything → TL1
    auto-publish with 24h veto window → TL2 full autopilot. Owned by AUT
    requirements. Founder-facing labels (DEC-16): "Ask me first / Publish with
    a heads-up / Run on your own" — the TL0/1/2 codes stay internal.
  Veto window: >-
    The 24h period at TL1 during which the founder can stop an auto-scheduled
    post.
  Kill switch: >-
    Global instant pause of all publishing; per-channel pause also exists
    (AUT-3).
  Stewardship rhythm: >-
    The north-star behavior: an unbroken 4-week posting streak including at
    least one impact or gratitude post. Founder-facing copy says "rhythm" /
    "steady presence", never "streak" (DEC-16); "streak" is an internal metric
    term only.
  Ask: >-
    (fundraising ask) A donation-request post; capped at 25% of the mix and
    permanently at most TL1.
  Lazy onboarding: >-
    No *blocking* homework (DEC-17): org name + email suffices to start
    (ONB-1), the system uses whatever it can gather (ONB-2), and the rest is
    filled progressively (INT-4) — never a gate. "Zero-homework" is literal for
    orgs with an ingestable presence; thin-source orgs get a gentle
    interview-first path (INT-1/INT-2), not a blocker. Owned by ONB/INT.
  Saved pool: >-
    (DEC-20) Discoveries the founder marked "save for later" (EXT-5): the
    planner's reserve for thin weeks — drafted only when nothing fresher
    exists, never after an event-tied save's date passes, always credited
    in the draft's ReasonLine. Held on the Discoveries saved shelf.
  Enrichment loop: >-
    (learn-by-disposing — DEC-17) Every information-bearing disposition — a
    Skip/reject "why?", an Adjust request — becomes a short optional
    conversation that deepens Org Memory (MEM-1). Spans CHT-5 (the leading
    chat), APR (the disposition), and INT-4 (progressive open questions).
  Source ingestion: >-
    Harvesting the org's website and existing social accounts for facts and
    style at onboarding (ONB-2).
  Design partner: >-
    A cohort-1 org from warm contacts, paying full price under the 30-day
    guarantee.
  Operator: >-
    Us — the team doing silent QA and failure handling through the ops
    console. Owned by OPS requirements.
  Ops console: >-
    The internal operator dashboard: draft QA, failure queues, transcript
    review, radar precision review (OPS-1).
  Content topic: >-
    An editorial theme the system maintains for an org — what to talk about.
    Structures internal content and drives external research; identified and
    proposed proactively, and founder-editable (TOP, DEC-23).
  Editorial agenda: >-
    The active set of content topics — the org's living what-to-talk-about,
    explicit and founder-owned; one shared source for internal content planning
    and external discovery (TOP-4).
  Research strategy: >-
    Per content topic, how the system finds genuinely interesting and relevant
    external content — query formulations, source/feed selection, and
    relevance/engagement criteria (TOP-2).
