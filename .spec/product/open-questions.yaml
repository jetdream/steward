kind: open-questions
prefix: Q
title: Open Questions
status: approved

intent: >-
  Pending founder decisions. Each resolves into a requirement change, an ADR,
  a principle, or a scope edit — via the change protocol (.spec/CLAUDE.md).
  Resolved questions keep their entry with `status: resolved` and a pointer to
  where the decision landed.

items:
  Q-1:
    v: 1
    status: open
    title: Product name
    statement: "Working name: Steward."

  Q-2:
    v: 1
    status: open
    title: Design partner zero
    statement: >-
      Use the co-founder's own nonprofit as design partner #0 (fastest
      dogfooding path)?

  Q-3:
    v: 1
    status: open
    title: Image-generation flag-on criteria
    statement: >-
      Proposal: only after the picture-bottleneck metric (R-3) shows real
      founder pain and branded-graphics templates pass cohort review; never
      photorealistic (GR-4 stands regardless).

  Q-4:
    v: 1
    status: open
    title: Radar engine upgrade order
    statement: >-
      Perplexity vs Tavily/Exa first; which structured feeds (GDELT /
      newsdata.io / arXiv) earn P1 slots per vertical (A-3, EXT-4).

  Q-5:
    v: 1
    status: open
    title: Conversion-loop re-introduction trigger
    statement: >-
      Proposal (unchanged): G-2 met and cohort retention through month 3.

  Q-6:
    v: 1
    status: open
    title: 30-day guarantee marketing posture
    statement: >-
      Loudly (conversion lever) or quietly (refund-risk lever) —
      recommendation: loudly.

  Q-7:
    v: 1
    status: open
    title: Launch vertical
    statement: >-
      Vertical-agnostic launch; the flag-planting vertical ("built for
      animal-welfare nonprofits") is chosen from cohort-1 data.

  Q-8:
    v: 1
    status: resolved
    decidable-by: user
    resolution: DEC-10
    title: News-site URL strategy at P0
    statement: >-
      App-domain path (<app>/news/<org-slug>) vs a dedicated news domain
      with per-org slugs (<org>.<news-domain>). Path is zero-infra; the
      dedicated domain reads more like the org's own address and separates
      SEO reputations. Decide before NWS-1 build (P1b).
      RESOLVED (DEC-10): configurable — dev defaults to the app-domain path,
      prod defaults to the dedicated Steward news domain, org may choose its
      own subdomain in Settings (NWS-6).

  Q-9:
    v: 1
    status: open
    title: SMS/MMS ingestion adapter
    statement: >-
      US founders skew SMS/iMessage over WhatsApp/Telegram; evaluate a
      Twilio SMS/MMS adapter alongside the committed bots (BOT-1) once
      cohort-1 usage shows where founders actually send photos from.

  Q-10:
    v: 1
    status: resolved
    decidable-by: user
    resolution: DEC-10
    title: Org theming depth on the news page
    statement: >-
      How far the DS-8 sanctioned slots go: name + logo + accent only
      (recommended — keeps the template unmistakably calm), or also
      typography/imagery treatments per org.
      RESOLVED (DEC-10): name + logo + accent only; no per-org typography.

  Q-12:
    v: 1
    status: resolved
    decidable-by: user
    binds: [G-1, G-4, G-5]
    resolution: >-
      RESOLVED (DEC-13, 2026-07-18): the serves-edge closures were made — GEN-1 + APR-1 →
      G-1/G-5, APR-1 + AUT-1 → G-4, PUB-1 → G-5 (GEN-1/APR-1/PUB-1/AUT-1 → v2, coverage
      re-pinned). G-1/G-4/G-5 coverage is now complete: the generate→approve→publish core
      loop is on each goal's critical path. The GEN-3 picture-blocker sub-question was
      classified an OUTCOME risk (mitigated by R-3 library seeding), not a decomposition
      gap — carried by G-5's `outcome` assertion, not a serving edge.
    title: Close the core-loop serves-edge gaps (G-1/G-4/G-5 → complete)
    statement: >-
      Three OUTCOME goals are `coverage: partial` because their serving sets omit
      steps of the generate→approve→publish core loop their metrics run through:
      G-5 (post live in 48h) omits GEN, APR, and PUB entirely; G-4 (4-week streak)
      omits the approve/autopublish step (APR, AUT); G-1 (pay/stay) omits the
      generation + approval steps its value delivery rests on (GEN, APR). Closing
      them means adding the missing `serves:` edges (candidate minimum: GEN-1 +
      APR-1 + PUB-1 → G-5; APR-1 + AUT-1 → G-4; GEN-1 + APR-1 → G-1) — a requirement
      change: each edited requirement bumps a version and cascades a re-pin of every
      coverage `against` list that references it. Deferred out of the DEC-11 honesty
      pass to keep that pass scoped to the goals layer. Sub-question: is GEN-3's hard
      every-post-needs-a-picture rule (via GEN-4 awaiting-picture) a genuine 48h
      ACTIVATION RISK for G-5 worth a mitigation (e.g. a first-post picture-optional
      path), or is library seeding at ingestion (R-3) sufficient? Recommendation:
      make the edge additions, then re-affirm the three goals to complete.

  Q-11:
    v: 1
    status: resolved
    resolution: DEC-10
    title: News-page URL afterlife on churn
    statement: >-
      When an org cancels (BIL-2, UI-45): do published article URLs
      tombstone (a polite "this org's page has moved on" — preserves inbound
      social links from NWS-5) or hard-410? Interacts with the data-deletion
      affordance and SEC policy; decide before the first cohort-1 churn.
      RESOLVED (DEC-10): the URL stays reserved and served while the org's
      account is active; reservation is a benefit of an active account, not
      held indefinitely for inactive ones.

  Q-13:
    v: 1
    status: open
    title: X read access for onboarding style-harvest
    statement: >-
      The committed X integration (IG-2, A-2) is write-only. Onboarding style
      ingestion (ONBS-2) therefore harvests the org's own timeline for voice from
      website + Meta channels only; X variants lean on the shared cross-channel
      style seed. Decide whether to budget X read scope so the org's X voice is
      harvested directly — a paid-tier + budget question, not a blocker (surfaced
      by the ONB r1 challenge).

  Q-14:
    v: 1
    status: resolved
    title: Internal admin-console design-system primitives
    statement: >-
      The platform-admin console (experience register XADM) needs dense
      internal-tool primitives — a data table/list, data-viz for the KPI
      dashboard (ADM-6), and the act-as banner (staff trust-chrome, XADM-9) —
      that the founder-spine design system (DS-1..8 / DSS-1..23) does NOT own (it
      is card / badge / form / DS-5 trust-chrome). Decide BEFORE the XADM screens
      are built: extend the DS trio with these internal-tool primitives, or
      establish a separate internal-console component layer. Tracked (surfaced by
      the XADM Product-Designer challenge) so the console's GR-7 conformance is
      honest — the screens name the needed primitives rather than claiming to
      reuse components that were never built. Mirrors the DEC-33 support-marker
      DS-home cascade. Internal, lower-fidelity (XOPS/DEC-8 precedent); not a P1b
      blocker.
      RESOLVED (DEC-35): the internal console uses shadcn primitives styled with
      the steward theme tokens (DS-1/DS-3/DS-4) — NO DS-trio extension. GR-7 → v3
      scopes the inventory-reuse clause to founder/public surfaces; internal
      tools conform via tokens only. The XADM screens are updated accordingly.

  Q-15:
    v: 1
    status: open
    decidable-by: user
    title: Phase-2 managed hosting provider
    statement: >-
      Phase-1 prod is self-hosted single-instance Docker Compose (ADR-0007). The
      phase-2 horizontally-scalable managed shape (ADR-0003 shape 3) is decided in
      kind but not in provider: GCP (Cloud Run + Cloud SQL for Postgres) OR
      DigitalOcean. Includes the data-residency / uptime-SLO decisions
      (CON-3 residual) that ride with the provider. Backup is NOT here — phase-1
      already carries a durability posture (`pg_dump` → R2, ADR-0007/CON-3). NOT a
      phase-1 blocker — ports & adapters (ADR-0003) keep domain code
      provider-agnostic; choose when phase-2 scaling is actually needed.
      Cloudflare stays the CDN + R2 blob regardless (ADR-0007).
