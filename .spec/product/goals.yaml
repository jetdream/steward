kind: goals
prefix: G
title: Goals and Success Metrics
status: approved

intent: >-
  The goals every requirement must serve (register `serves:` fields). A
  requirement serving no goal is a removal candidate.

  Every goal here is a field-measured OUTCOME goal, so each carries TWO
  justified assertions (DEC-11, DEC-13):

  - `coverage` — is the CAPABILITY decomposition complete? `status: complete`
    requires the serving set to include every capability on the metric's
    CRITICAL PATH: the chain of capabilities that produces the metric's subject,
    up to its measurement point (a capability that only moves whether the TARGET
    is HIT — not whether the subject exists — is an outcome dependency, not a
    path step). Omitting a critical-path step is a gap even when another goal
    decomposes it, because the roll-up has no goal→goal edge. The shared product
    core loop is generate (GEN) → approve/autopublish (APR/AUT) → publish (PUB);
    a goal whose metric's path runs through the loop pins the steps it runs
    through. Metrics that stop earlier pin only that far — e.g. approval-rate
    (G-2) ends at APPROVE, so PUB is legitimately off its path. The Q-12 closure
    (DEC-13) wired the loop to G-1/G-4/G-5, so all five are now `complete`.

  - `outcome` — is the metric VALIDATED in the field? Building and testing the
    capabilities is necessary but NOT sufficient for a market/behavioral result,
    so a goal's `achieved` state additionally requires this assertion `validated`
    (backed by a cohort-measurement record the engine checks exists + names the
    goal — it never ingests analytics). All five sit at `in-progress` — no cohort
    data yet — so none can report `achieved` on build alone. This replaces the
    former prose caveat with the engine-enforced outcome tier that shipped in the
    cortex toolchain (the resolution of the method gap this project surfaced).

  Reasoning is argued requirement-by-requirement so each `against` pin is
  auditable; every pinned ID must be placeable on the metric's path.

items:
  G-1:
    v: 1
    origin: baseline
    title: Commercial proof
    coverage:
      status: complete
      reasoning: >-
        CAPABILITY-decomposition complete along the commercial funnel + the value-delivery
        loop the metric runs through (the Q-12 gap closed by DEC-13: GEN-1 + APR-1 now serve
        G-1). VALUE-DELIVERY LOOP (the product must produce posts to be worth paying for):
        GEN-1 (generation) → APR-1 (approval) → PUB-1 (publish) — the full chain is now
        on-path. COMMERCIAL LAYER: ACQUISITION — ONB-1 + ONB-2 + ONB-3 + ONB-4 + ONB-5 lower
        the cost of reaching first value; PROOF & growth loop — NWS-1..5 give a visible
        donor-facing deliverable and carry the "published with Steward" reference (NWS-3),
        NWS-6 the custom-subdomain upgrade; CONVERSION & refund mechanics — BIL-1 (the paywall
        + the refund the refund-rate metric measures), BIL-3; DELIVERY reliability beyond the
        base pipe — PUB-2..4; RETENTION QA — OPS-1. No capability gap. The metric TARGETS
        (paying-org counts, refund <20%, churn <3%) are field outcomes — see this goal's
        `outcome` assertion; the standing bet is R-1/R-5 and A-5.
      against: [APR-1@3, BIL-1@1, BIL-2@1, BIL-3@1, GEN-1@4, NWS-1@2, NWS-2@1, NWS-3@1, NWS-4@2, NWS-5@1, NWS-6@2, ONB-1@1, ONB-2@1, ONB-3@1, ONB-4@1, ONB-5@1, OPS-1@1, PUB-1@2, PUB-2@1, PUB-3@1, PUB-4@1, ACC-1@1, ACC-2@1, ACC-3@1, ACC-4@1, ACC-5@1, ADM-1@2, ADM-2@1, ADM-3@1, ADM-4@1, ADM-5@1, ADM-6@1]
    outcome:
      status: in-progress
      reasoning: >-
        Field-validated only by cohort-1 billing/retention data — paying-org counts at day-90
        and month-5, 30-day refund rate, post-cohort monthly churn. No cohort exists yet, so
        this is in-progress; `achieved` is correctly gated until a measurement record lands.
    statement: >-
      ≥1 nonprofit paying $199/mo within 90 days of dev start; 5 paying orgs
      by month 5. Refund rate under the 30-day guarantee <20% in cohort 1.
      Monthly churn <3% after cohort 1.

  G-2:
    v: 1
    origin: baseline
    title: Autonomy proof
    coverage:
      status: complete
      reasoning: >-
        CAPABILITY-decomposition complete. The metric's critical path ENDS AT APPROVAL —
        ≥70% approved-without-edits is measured when the founder approves — so the path is
        generate→approve, both fully pinned; publishing is correctly off this path. QUALITY
        inputs feeding the path: MEM-1 (corrections persist and are never violated again — the
        compounding that makes near-autonomy possible), MEM-2, MEM-3; GEN-1 + GEN-2 + GEN-3 +
        GEN-4 + GEN-5 + GEN-6 (on-mission, per-channel, gated drafts with a real picture);
        STR-1..4 (the editorial contract enforced on every draft); INT-1..4 (the story
        material that makes content specific, not generic); EXT-1..5 (the external well,
        in-voice with mandatory citations); CHT-1 + CHT-2 + CHT-4 + CHT-5 (context, redirects that bind
        future drafts, colleague voice); BOT-1 (raw material). APPROVE + learning loop: APR-1 +
        APR-3 + APR-5. EARNED AUTONOMY (the ultimate approve-without-edit): AUT-1 + AUT-2 +
        AUT-3. QUALITY FLOOR: OPS-1. No capability gap on the approval-rate path. Weakly-serving
        inherited edges (APR-2/APR-4/APR-6, CHT-3, BOT-2/BOT-3 primarily serve effort, G-3)
        noted, left uncorrected as defensible (DEC-11). The 70% target is a field outcome — see
        the `outcome` assertion; R-5 is the quality dial. Re-affirmed 2026-07-19 against STR-4 v2
        + CHT-2 v2 + APR-3 v2 (DEC-22 Memory-as-single-source taboo enforcement + the GR-8 backstop): a
        founder correction now binds immediately and is enforced at the VAL overlay gate — this
        strengthens the approval-rate path; no capability added or removed.
        Re-affirmed again 2026-07-19 for DEC-23: Content Topics (TOP-1..4) join the quality
        path — the system now proactively sets the editorial agenda + per-topic research
        strategy that feed generation and the radar (EXT-1/EXT-4/STR-1 → v2), sharpening
        on-mission relevance and thus approval-without-edit.
      against: [APR-1@3, APR-2@1, APR-3@2, APR-4@1, APR-5@1, APR-6@1, AUT-1@2, AUT-2@1, AUT-3@1, BOT-1@1, BOT-2@1, BOT-3@1, CHT-1@1, CHT-2@2, CHT-3@1, CHT-4@1, CHT-5@1, EXT-1@2, EXT-2@1, EXT-3@1, EXT-4@2, EXT-5@2, GEN-1@4, GEN-2@1, GEN-3@1, GEN-4@1, GEN-5@1, GEN-6@1, INT-1@1, INT-2@1, INT-3@1, INT-4@1, MEM-1@1, MEM-2@1, MEM-3@1, OPS-1@1, STR-1@2, STR-2@1, STR-3@1, STR-4@2, TOP-1@1, TOP-2@1, TOP-3@1, TOP-4@1]
    outcome:
      status: in-progress
      reasoning: >-
        Field-validated only by the per-org approval-without-edit rate measured at an org's
        week 8 across the cohort. No cohort data yet → in-progress; `achieved` gated until a
        measurement record lands. Cohort-1 measurement CONTROLS for the OPSS-1 silent
        operator-QA confound — an operator-touched draft COUNTS as non-autonomous (kept in
        the denominator, never credited, never dropped; equivalently computed on the PRE-QA
        draft as it would have reached the founder), so the rate reflects autonomy, not
        hidden operator labor and not cream-skimming (VAL-3). The SAME treatment applies to
        STAFF ACT-AS (ADMS-2, DEC-32): a draft approved or edited under support impersonation
        counts as NON-autonomous — kept in the denominator, never credited — so support
        labor never inflates the autonomy rate (LRN-24).
    statement: ≥70% of drafts approved without edits by an org's week 8.

  G-3:
    v: 1
    origin: baseline
    title: Effort proof
    coverage:
      status: complete
      reasoning: >-
        CAPABILITY-decomposition complete. This metric measures a PROPERTY of using the product
        (median in-app time), not a core-loop execution, so its critical path is the set of
        surfaces + automations that consume — or remove — founder time, all pinned; generation
        quality and publishing live on other goals' paths. THE TWO-VERBS SURFACE (approve/
        redirect fast): APR-1 + APR-2 + APR-4 + APR-6; UX-1..7 (the shell + compose) and UX-8
        (radar, whose browse time the metric explicitly excludes); DS-1..8 (DS-6 no-empty-states
        and DS-2 single-accent make the next action obvious; DS-4 a11y cuts friction; DS-3/DS-7
        are texture/posture). WORK DONE FOR THE FOUNDER: PRO-1..3 (moves first), AUT-1..3
        (auto-publish removes approvals from the queue as trust is earned), MEM-1 + MEM-2 (never
        ask twice), ONB-1..5 (zero-homework setup). LOW-FRICTION INPUT: BOT-1..3 (from the
        phone), CHT-1..5 (talk instead of click), INT-1..4 (a few questions at a time). No
        capability gap on the effort path. The <15-min target is a field outcome — see the
        `outcome` assertion; it leans downstream on AUT auto-publish firing and on high draft
        quality (G-2) so edits — the biggest time sink — are rare. Re-affirmed 2026-07-19 against
        CHT-2 v2 + APR-3 v2 (DEC-22): redirects and learning-loop rules still write once, now to
        Memory as the single source (Strategy is a view) — the
        never-ask-twice/talk-instead-of-click effort path is unchanged; no capability added or
        removed. Re-affirmed again for DEC-23: Content Topics (TOP-1..4) removes the founder's
        topic-identification and research-criteria work — the exact thing the user cannot do
        manually — a direct reduction on the effort path. Re-affirmed for DEC-24:
        the shared proactive-interruption budget (PRO-4) caps founder overwhelm — one
        per-org ceiling instead of stacking per-capability limits — a direct
        effort-path reduction (fewer, calmer interruptions; R-10).
      against: [APR-1@3, APR-2@1, APR-3@2, APR-4@1, APR-5@1, APR-6@1, AUT-1@2, AUT-2@1, AUT-3@1, BOT-1@1, BOT-2@1, BOT-3@1, CHT-1@1, CHT-2@2, CHT-3@1, CHT-4@1, CHT-5@1, DS-1@1, DS-2@1, DS-3@2, DS-4@1, DS-5@4, DS-6@1, DS-7@1, DS-8@2, INT-1@1, INT-2@1, INT-3@1, INT-4@1, MEM-1@1, MEM-2@1, MEM-3@1, ONB-1@1, ONB-2@1, ONB-3@1, ONB-4@1, ONB-5@1, PRO-1@1, PRO-2@1, PRO-3@1, PRO-4@1, UX-1@2, UX-2@2, UX-3@3, UX-4@1, UX-5@2, UX-6@1, UX-7@2, UX-8@2, TOP-1@1, TOP-2@1, TOP-3@1, TOP-4@1]
    outcome:
      status: in-progress
      reasoning: >-
        Field-validated only by median founder in-app time/week (chat/radar-browse excluded)
        measured across the cohort after week 1. No cohort data yet → in-progress; `achieved`
        gated until a measurement record lands.
    statement: >-
      Median founder time in product <15 min/week after the first week (time
      voluntarily spent chatting excluded).

  G-4:
    v: 1
    origin: baseline
    title: Consistency proof
    coverage:
      status: complete
      reasoning: >-
        CAPABILITY-decomposition complete across the cadence loop (the Q-12 gap closed by
        DEC-13: APR-1 + AUT-1 now serve G-4). A 4-week streak is a sustained cadence of LIVE
        posts, so its path is generate→approve/autopublish→publish, repeatedly — now fully
        pinned: SUPPLY — GEN-1 (the rolling calendar, the metronome, with the ≥1-per-4-weeks
        stewardship overlay baked in) + GEN-2..6; EXT-1..5 (the second well); STW-1 + STW-2
        (stewardship overlays); NWS-1..6 (an owned content surface). APPROVE/AUTOPUBLISH —
        APR-1 (the approval that turns a supplied draft into a live post) + AUT-1 (auto-publish
        that keeps the cadence without a manual step). ANTI-STALL — PRO-1 (requests the scarce
        pictures that block posts) + PRO-2 + PRO-3. DELIVERY — PUB-1..4. No capability gap. The
        80% target is a field outcome — see the `outcome` assertion; the top field threat is
        the picture bottleneck (R-3). Re-affirmed 2026-07-19 for DEC-23: Content Topics
        (TOP-1..4) added to the SUPPLY path — a proactively-maintained editorial agenda +
        per-topic research strategy is what keeps a steady stream of on-topic internal and
        external material, preventing the idea-drought cadence gaps that break a streak
        (EXT-1/EXT-4 → v2).
      against: [APR-1@3, AUT-1@2, EXT-1@2, EXT-2@1, EXT-3@1, EXT-4@2, EXT-5@2, GEN-1@4, GEN-2@1, GEN-3@1, GEN-4@1, GEN-5@1, GEN-6@1, NWS-1@2, NWS-2@1, NWS-3@1, NWS-4@2, NWS-5@1, NWS-6@2, PRO-1@1, PRO-2@1, PRO-3@1, PUB-1@2, PUB-2@1, PUB-3@1, PUB-4@1, STW-1@1, STW-2@1, TOP-1@1, TOP-2@1, TOP-3@1, TOP-4@1]
    outcome:
      status: in-progress
      reasoning: >-
        Field-validated only by the share of active orgs holding an unbroken 4-week posting
        streak, measured across the cohort. No cohort data yet → in-progress; `achieved` gated
        until a measurement record lands.
    statement: >-
      ≥80% of active orgs maintain an unbroken 4-week posting streak.

  G-5:
    v: 1
    origin: baseline
    title: Activation
    coverage:
      status: complete
      reasoning: >-
        CAPABILITY-decomposition complete (the Q-12 gap closed by DEC-13: GEN-1 + APR-1 + PUB-1
        now serve G-5). The metric is a post APPROVED AND LIVE within 48h, so its critical path
        is the full generate→approve→publish loop under a deadline — now fully pinned. SETUP →
        first draft: ONB-1..5 (zero-friction setup) + ONB-6 (first drafts inside the first
        session — G-5-only) + INT-1..4 (the interviewer fills thin context in the first ten
        minutes). PRODUCE THE LIVE POST: GEN-1 (generation, which ONB-6 leans on), APR-1
        (approval), PUB-1 (publishing). SURFACES: DS-1..8. No capability gap. NOTE (tracked as
        the resolved Q-12 sub-question): GEN-3's hard every-post-needs-a-picture rule (via GEN-4
        awaiting-picture) is the likeliest 48h blocker in the field — an outcome risk, mitigated
        by library seeding at ingestion (R-3), not a decomposition gap. The 48h target is a
        field outcome — see the `outcome` assertion.
      against: [APR-1@3, DS-1@1, DS-2@1, DS-3@2, DS-4@1, DS-5@4, DS-6@1, DS-7@1, DS-8@2, GEN-1@4, INT-1@1, INT-2@1, INT-3@1, INT-4@1, ONB-1@1, ONB-2@1, ONB-3@1, ONB-4@1, ONB-5@1, ONB-6@1, PUB-1@2]
    outcome:
      status: in-progress
      reasoning: >-
        Field-validated only by time-to-first-approved-live-post measured per org against the
        48h target across the cohort. No cohort data yet → in-progress; `achieved` gated until
        a measurement record lands.
    statement: >-
      First approved post live within 48 hours of the org's first session.
      (Absorbed from Vision v0.2 metrics; see INC-1.)
