kind: decisions
prefix: DEC
title: Human-in-the-Loop Decision Log
status: approved

intent: >-
  The record of decisions a human made when the SDLC protocol required it
  (.spec/CLAUDE.md HITL policy): contradiction overrides, requirement changes
  and removals, flexibility-limiting choices, and genuine product/business
  calls. Distinct from ADR (technical decisions with alternatives, in adr/),
  INC (a detected contradiction), and Q (a still-open question): a DEC is a
  *made* human decision at product/scope/requirement altitude, with
  provenance. Product-altitude changes cite the authorizing DEC via
  `decided-by:`. Each item carries the decision (statement), who
  (by), when (date), and what it binds/authorizes/overrides (binds).

items:
  DEC-15:
    v: 1
    date: 2026-07-18
    by: founder (shpin.p@diffco.us)
    binds: [DS-3, DS-1, DEC-6, DEC-7, ADR-0001]
    title: Design foundations re-explored — substrate + terracotta reaffirmed, neutrals refined, type changed
    statement: >-
      The founder reopened the design foundations (choosing the deepest redesign
      option) and, after a fresh exploration — four theme directions rendered as an
      Artifact, then three real-font type pairings in Claude Design (project AI-S-PR) —
      REAFFIRMED the substrate (ADR-0001, the Airbnb open-design fork) and the
      terracotta accent, light-only, single-accent, and calm-colleague pillars
      (DEC-6/DEC-7). This is therefore a reaffirmation, NOT a supersession of ADR-0001
      or DEC-6/DEC-7. Two refinements are adopted, both realized in
      design/design-system/steward/tokens.css: (1) the neutral ramp is warmed to a
      deliberate bias toward the accent — page ground (#fbfaf8), ink ramp, and
      hairlines — so the neutrals read "chosen, not inherited", while card surfaces
      stay clean white for photo contrast (VAL-4); (2) typography moves OFF Inter (a
      generic default) to Bricolage Grotesque (display) + Source Sans 3 (body) — a
      characterful grotesk over a neutral humanist body — chosen over editorial-serif
      and single-humanist candidates, amending DEC-6's Inter choice and bumping DS-3 to
      v2. Downstream: the full component inventory and screens are rebuilt on this
      foundation and published to the AI-S-DS design system via /design-sync; ADR-0001
      gains a dated amendment note (substrate unchanged).

  DEC-14:
    v: 1
    date: 2026-07-18
    by: founder (shpin.p@diffco.us)
    binds: [INC-3, GR-3, DS-5, UI-6, UI-7, UI-16, UI-29, UI-45, UI-17, UI-67, UI-68]
    title: Pre-UI experience reconciliation — GR-3 manifestation, TL2 inbox, activity center
    statement: >-
      Resolves the founder-requested pre-UI reconciliation audit of the approved
      experience spine (INC-3 plus three deferrals). Four calls, taken together so the
      inbox absorbs them in one design round rather than across three future redesigns:
      (1) GR-3 sensitive-topic holds get a DISTINCT "held for your approval" card class
      (DS-5 v4) — visible, counted in "N of M", never batch-approvable, ReasonLine names
      the hold — chosen over a lighter ReasonLine-only variant or inverting the
      veto-window card, because a hard guardrail deserves an unmistakable, non-confusable
      surface (resolves INC-3; UI-7 v3, UI-29 v2). (2) TL2 (full autopilot) inbox
      semantics are designed NOW rather than deferred to AUT-2/P1 — at TL2 the inbox is
      mostly silent and its only content is GR-3 holds + publish failures + the streak,
      so designing the hold effectively designs the TL2 inbox; consistent with DEC-8's
      TL1-aware-now rationale (UI-7 v3, UI-16 v2). (3) An in-app ACTIVITY & NOTIFICATIONS
      center is added to the spine (new screen UI-67, flow UI-68 under UI-17 "the
      inspectable brain") — the founder-facing realization of VAL-3 "everything auto-done
      is logged and visible", aggregating auto-published actions (PUB-3 publish log),
      publish failures, and channel re-auth prompts (UI-26) — each surfaced only when the
      founder must act. Its shell affordance lives in the TOP CHROME, not the left nav,
      and shows a count ONLY when founder action is required — reconciling the addition
      with UI-6's "only Inbox carries a nav chip" rule rather than breaking it (UI-6 v4).
      (4) UI-45 "cancel with dignity" is given an explicit screen node (the cancel
      section of UI-12), closing the one flow that cited no surface. The
      offline-connectivity posture beyond UI-5's resumable upload stays P0-minimal and is
      subsumed by the actionable-alerts model (no separate global offline mode at P0).
      Reaches approved after the Product-Designer challenger pass of this round.

  DEC-13:
    v: 1
    date: 2026-07-18
    by: founder (shpin.p@diffco.us)
    binds: [Q-12, G-1, G-2, G-3, G-4, G-5, GEN-1, APR-1, PUB-1, AUT-1]
    title: Close the goal-honesty pass — resolve Q-12 + adopt the outcome tier
    statement: >-
      Completes the DEC-11 pass now that the cortex outcome-validation tier has shipped
      (Steward pins cortex v0.20.1). Two moves. (1) RESOLVES Q-12 — closes the G-1/G-4/G-5
      capability gaps by wiring the generate→approve→publish core loop to those goals:
      GEN-1 and APR-1 gain `serves` G-1 + G-5; APR-1 and AUT-1 gain `serves` G-4; PUB-1
      gains `serves` G-5. Each touched requirement bumps a version (GEN-1/APR-1/PUB-1/
      AUT-1 → v2) and cascades a re-pin of the coverage `against` lists that reference it;
      G-1/G-4/G-5 coverage flips partial→complete because the loop is now on-path, not
      relied on in prose. (2) ADOPTS the outcome tier — every Steward goal is a field-metric
      goal, so each now declares an `outcome` assertion (status in-progress: no cohort
      measurement exists yet). This STRUCTURALLY gates a goal's `achieved` on a field
      measurement, not on build alone, replacing the DEC-11 prose caveat with an
      engine-enforced tier. Net honest state: coverage = capability decomposition (complete
      for all five), outcome = field validation (in-progress until cohort data). Recorded
      per HITL (a requirement/goal change): the founder authorized both moves on 2026-07-18.
      CHALLENGE EVIDENCE (compass lens): specs/challenges/goals-2026-07-18-r3.md (pass —
      serves-closures on-path, against-pins reconciled, outcome tier honest, INC-2
      structurally closed), continuing the r1→r2 chain recorded on DEC-11.

  DEC-11:
    v: 1
    date: 2026-07-18
    by: founder (shpin.p@diffco.us)
    binds: [INC-2, Q-12, G-1, G-2, G-3, G-4, G-5]
    title: Goal coverage is a capability claim, not an outcome promise
    statement: >-
      Resolves INC-2 (goal-coverage backfill overstated achievability). Adopted via
      the founder's two AskUserQuestion choices on 2026-07-18. (1) HONESTY POLICY:
      every goal here is a field-measured OUTCOME/METRIC goal, so `coverage: complete`
      asserts only that the CAPABILITY DECOMPOSITION is complete — no capability the
      metric plausibly needs is missing — and explicitly NOT that the metric target
      will be met; metric achievement is empirical, validated by cohort measurement,
      and the causal leap is named against each goal's risks (R-1/R-5, A-5, R-3). (2)
      GRANULARITY: coverage reasoning is argued requirement-by-requirement so the
      `against` pin is auditable; every pinned ID must be placed in the causal chain.
      (2b) CRITICAL-PATH rule (added after the r1 challenger fail): `complete` requires
      the serving set to pin every capability on the metric's CRITICAL PATH; omitting a
      step is a gap even when another goal decomposes it, because the roll-up has no
      goal→goal edge. The status split is DERIVED from this rule, not asserted: G-2
      (approval-rate, path ends at APPROVE) and G-3 (in-app time, an aspect property)
      are `complete` — their paths are fully pinned; G-1 (pay/stay — value delivery
      needs the loop, pins PUB but omits GEN+APR), G-4 (streak — pins GEN+PUB, omits the
      APR/AUT approve step), and G-5 (first live post — pins none of GEN/APR/PUB) are
      `partial`. The earlier r1 attempt kept G-1/G-4 `complete` on a "cross-goal reliance
      in prose" device; the challenger correctly ruled that the very prose-substitution
      INC-2 rejects, so all three critical-path gaps are now `partial`, tracked for
      closure as Q-12. The `serves`-edge audit found APR-2/4/6, CHT-3, BOT-2/3 serve G-2
      only weakly (file-level inheritance); left uncorrected as defensible, noted in G-2
      coverage. Coverage reasoning cites requirement IDs by causal role only — no
      restated parameters or priorities (the r1 low finding). (4) METHOD
      ESCALATION: the root cause is a Cortex gap — the roll-up models `achievable`
      (decomposed) and `achieved` (built) but has no OUTCOME-VALIDATION tier for a
      field-measured goal, so it would imply a behavioral metric is achieved when only
      capabilities are built. Raised as a change-request against the cortex method
      (capability-goal vs outcome-goal distinction); until it lands, the leap is
      carried in prose + risks here. CHALLENGE EVIDENCE (compass lens, mandatory for a
      goal-register reshape): specs/challenges/goals-2026-07-18-r1.md (fail — the
      G-1/G-4 coherence defect) → goals-2026-07-18-r2.md (pass — rule stated + statuses
      re-derived + altitude leak cleared).

  DEC-10:
    v: 1
    date: 2026-07-17
    by: founder (shpin.p@diffco.us)
    binds: [Q-8, Q-10, Q-11, NWS-1, NWS-6, DS-8]
    title: Resolve news-site open questions — URL strategy, theming, afterlife
    statement: >-
      Resolves the three DEC-9 open questions, amending NWS-1/NWS-6/DS-8.
      Q-8 (URL strategy): the news-page address is environment- and
      org-configurable — dev defaults to an app-domain path (zero-infra);
      prod defaults to a dedicated Steward-operated news domain (org slug);
      an org may choose its own news subdomain in Settings (NWS-6). Q-10
      (theming depth): the DS-8 org slots are name + logo + accent color
      ONLY — no per-org typography (keeps the template unmistakably calm,
      GR-7). Q-11 (URL afterlife): an article URL stays reserved and served
      as long as the org's account is active — reservation is a benefit of
      an active account, not held indefinitely for inactive ones (interacts
      with BIL-2 cancel and the SEC deletion policy).

  DEC-1:
    v: 1
    date: 2026-07-12
    by: founder (shpin.p@diffco.us)
    binds: [G-5, G-1, INC-1]
    title: Resolve the vision-vs-PRD metric inconsistency
    statement: >-
      On INC-1 (vision listed activation and churn metrics the PRD goals
      omitted): promote activation to G-5 and fold churn into G-1, rather
      than dropping either. The layered goals become the single source; the
      vision narrative points to them.

  DEC-2:
    v: 1
    date: 2026-07-13
    by: founder (shpin.p@diffco.us)
    binds: [LRN-6, LRN-7]
    title: Documentation representation and structure
    statement: >-
      Adopt the layered, prefix-named, graph-checkable documentation system
      over the initial ordinal-file proposal; normative content is pure YAML,
      narrative is markdown; requirements and specs are separate layers paired
      by slug. Recorded because it is a founding structural decision the whole
      project builds on; the abandoned alternatives are retained as LRN
      dead-ends (LRN-6, LRN-7).

  DEC-3:
    v: 1
    date: 2026-07-13
    by: founder (shpin.p@diffco.us)
    title: Enforce governance with teeth, not prose
    statement: >-
      Where a governance rule can be made deterministic, it must be: the
      mandatory Architect Challenger at spec approval, the pre-commit
      graph gate, the executable acceptance harness, and lint-enforced
      HITL sign-off on product-altitude changes. Chosen over lighter
      prose-only options at each fork. Authorizes the HITL sign-off lint
      tooth and the SDLC protocol's enforcement posture.

  DEC-4:
    v: 1
    date: 2026-07-13
    by: founder (shpin.p@diffco.us)
    title: Rename the docs/ tree to .spec/
    statement: >-
      Rename the documentation tree from docs/ to .spec/ — a dot-prefixed
      system folder signaling a strict, machine-governed, AI-managed spec tree
      rather than informal docs. Mirrors the same change in the Cortex kit; the
      lint engine root, the Claude Code hook scopes, and the pre-commit gate all
      target .spec.

  DEC-5:
    v: 1
    date: 2026-07-13
    by: founder (shpin.p@diffco.us)
    title: Source the docs-check engine from cortex, not a vendored copy
    statement: >-
      Stop vendoring the engine and methodology copies in scripts/ and
      .claude/. Steward consumes cortex two ways: the Claude Code surface via
      the installed plugin (enabledPlugins), and the toolchain (git hooks / CI
      / CLI) via a version-pinned npm git dependency
      (github:DiffCo/cortex, pinned by tag) run as npx cortex-docs-check. The
      prefix registry moves to .spec/registry.yaml (data). This removes the
      divergent engine copy and its version drift.

  DEC-6:
    v: 1
    date: 2026-07-16
    by: founder (shpin.p@diffco.us)
    binds: [ADR-0001]
    title: Design-system substrate — re-themed Airbnb open-design fork
    statement: >-
      Adopt the Open Design "airbnb" package (github:nexu-io/open-design,
      vendored at design/design-system/airbnb/) as Steward's design-system
      substrate, for its spacious, breathing, welcoming, content-first
      character. It is consumed as a re-themed fork: the OD token schema is
      the stable contract; Steward binds its own brand values in a sibling
      theme (design/design-system/steward/). Airbnb's marketplace UX is
      explicitly NOT adopted — the adaptation rules live in the steward
      theme's DESIGN.md and the DS requirements register. Authorizes
      ADR-0001; a flexibility-limiting choice recorded per HITL policy (A5).

  DEC-9:
    v: 1
    date: 2026-07-17
    by: founder (shpin.p@diffco.us)
    binds: [NWS-1, NWS-6, BOT-1, EXT-5, UX-8, DS-8, R-9]
    title: Adopt the THOUGHTS.md round — news site, bots, radar feed
    statement: >-
      Incorporate the founder's THOUGHTS.md across all layers. Decisions:
      (1) the org news site is adopted at P0 — launch scope — as a THIN
      slice (Steward-operated URLs, one minimal template, no custom domains
      until NWS-6/P1), consciously carving it out of scope.md's "website
      building" non-goal and accepting risk R-9 against the 12-week clock;
      (2) messenger ingestion commits to WhatsApp + Telegram at P1 (BOT-1..3;
      SMS/MMS persona-fit evaluation retained as Q-9); (3) the public news
      page wears the ORG's brand on a minimal steward-token template with
      sanctioned org slots (DS-8) and a "published with Steward" footer;
      (4) the radar feed becomes the SIXTH nav surface (UX-8) — accepted
      with the pull-only guard: never badged, counted, or nudged (VAL-6,
      G-3). Two clusters of the brain dump were found already normative
      (GEN-1 taxonomy; EXT-4/A-3/Q-4 sources) and required no change.

  DEC-8:
    v: 1
    date: 2026-07-16
    by: founder (shpin.p@diffco.us)
    binds: [GR-7, UI-1, UI-2, UI-7, UI-16, UI-20]
    title: Found the experience spine (v0.14 experience layer)
    statement: >-
      Establish Steward's full experience spine under the cortex v0.14
      experience layer, as directed by the founder: the relationship-arc
      journey map (day-one, weekly digest, talk, photos, campaigns, earned
      autonomy, inspectable brain, compose, account, ops) with flows,
      screens, and email touchpoints as governed design-elements
      (experience/ui.yaml), plus the mandated conform-to-the-design-system
      guardrail (GR-7, per method/ui.md §5). Four product calls decided in
      the same round: (1) draft cards carry a Memory-provenance line;
      (2) Skip offers an optional one-tap reason written to Memory; (3) the
      Inbox is designed TL1-aware now (veto-window card class) to avoid a
      month-3 core-screen redesign; (4) the operator-console journey is
      mapped thin, design investment deferred. The register reaches
      approved after the Product-Designer challenger pass of this round.

  DEC-7:
    v: 1
    date: 2026-07-16
    by: founder (shpin.p@diffco.us)
    binds: [DS-2, DS-7, UI-6]
    title: UX foundations — home surface, accent, dark-mode scope
    statement: >-
      Three founding UX decisions taken together with DEC-6: (1) the shell is
      Inbox-first with a docked, always-summonable chat companion — the
      founder lands on the digest stack, and talking stays one gesture away
      on every surface (reconciles VIS-1's conversational front door with
      G-3 and UX-3); (2) the Steward accent is warm terracotta/clay
      (#B5502E), replacing Airbnb's trademark Rausch coral while keeping the
      single-accent discipline; (3) v1 ships light-only — the token schema
      keeps a dark theme possible later as a binding file, not a redesign.
