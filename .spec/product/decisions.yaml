kind: decisions
prefix: DEC
title: Human-in-the-Loop Decision Log
status: approved

intent: >-
  The record of decisions a human made when the SDLC protocol required it
  (.spec/CLAUDE.md HITL policy): contradiction overrides, requirement changes
  and removals, flexibility-limiting choices, and genuine product/business
  calls. Distinct from ADR (technical decisions with alternatives, in adr/),
  INC (a detected contradiction), and Q (a still-open question): a DEC is a
  *made* human decision at product/scope/requirement altitude, with
  provenance. Product-altitude changes cite the authorizing DEC via
  `decided-by:`. Each item carries the decision (statement), who
  (by), when (date), and what it binds/authorizes/overrides (binds).

items:
  DEC-34:
    v: 1
    date: 2026-07-21
    by: founder (shpin.p@diffco.us)
    binds: [XADM-1, XB-4, Q-14]
    title: Admin-capability experience — internal console (XADM) + founder team surface
    statement: >-
      Founder-directed authoring of the admin/platform-management experience
      (the /cortex:ux round completing the capability's Steps 1-5). Founds the
      internal platform-admin console register XADM (experience/admin.yaml) — four
      journeys serving ADM-1..6: administer/lifecycle (XADM-1), support
      impersonation act-as-org with a reason-gated entry + persistent banner +
      time-box (XADM-6), the org activity-ledger audit (XADM-10), and billing +
      KPI health (XADM-13) — internal-only, lower-fidelity than the founder spine
      (the XOPS/DEC-8 precedent), governed by SEC-11 v3 / ADR-0006. Adds the
      founder-facing multi-seat team surface (XB-4/5/6, serving ACC-4, P2) in the
      Controls area, on the founder-spine card system. Passed the Product-Designer
      challenger (r1 fail → r2 pass; record
      specs/challenges/experience-admin-2026-07-21-r2.md). The internal console
      needs DS primitives the founder-spine design system does not own (dense
      table, data-viz, the act-as banner trust-chrome) — tracked as Q-14, to be
      resolved before the screens are built. The DEC-33 founder-facing support
      marker is deliberately NOT in the internal console (staff see full
      attribution); its founder-surface rendering remains the tracked ADMS-2
      cascade.
  DEC-33:
    v: 1
    date: 2026-07-21
    by: founder (shpin.p@diffco.us)
    binds: [VAL-3, ADM-2, SEC-11]
    title: Impersonation carve-out surfaces a neutral fact-of-support marker (refines DEC-31)
    statement: >-
      Refines the DEC-31 VAL-3 carve-out after the ADMS design-gate surfaced a
      failure mode: at an ask-first (TL0) org, a fully-silent staff act-as
      publish appears as a post the founder never approved, reading as a breach
      rather than a benign result. Founder decision (2026-07-21, admin-capability
      ideation): a staff act-as action surfaces a NEUTRAL "a Steward support
      action" MARKER on the founder's own surfaces (e.g. the PUBS-3 publish log)
      alongside the result — the FACT of support is shown, the staff IDENTITY is
      withheld. This turns ON the founder-visibility DEC-31 had deferred to a
      "later switch", so it is recorded as its own decision and VAL-3 goes to v3
      (identity hidden; fact-of-support shown). More honest to VAL-3's
      nothing-hidden spirit than full silence; the staff-facing activity ledger
      (DM-17, ADMS-3) retains full attribution for audit.
  DEC-32:
    v: 1
    date: 2026-07-21
    by: founder (shpin.p@diffco.us)
    binds: [DM-1, SEC-4, SEC-7, SEC-11, ADR-0005, OPS-1, G-1]
    title: Adopt an Org⟂User identity, staff-impersonation, and org activity-ledger model
    statement: >-
      To operate and support the platform (extending the internal ops console
      OPS-1), the founder adopts three foundational additions, decided now
      because there is no src/ yet — the account/auth shape is a one-way door
      best fixed before code. (1) SEPARATE IDENTITY FROM TENANT: the Org (DM-1,
      today the aggregate root and implicit account) is split from a new User
      (auth principal, SEC-7); users link to orgs via a membership with a role.
      (2) SUPPORT IMPERSONATION ("act as org"): a dedicated platform-staff role
      may enter any org through a session-scoped org context and act AS the
      founder; regular users are hard-confined to their own memberships. This
      extends the SEC-11 operator posture (reason-gated, fully audited,
      environment-gated) from read-mostly QA to act-as, and supersedes/extends
      the ADR-0005 operator-access model — the concrete model (time-box,
      reason-gate, act-as write boundary, audit retention) is authored as a
      superseding ADR in the architecture pass. (3) ORG ACTIVITY LEDGER: an
      append-only per-org record of all actions — user, system/automatic, and
      background jobs (incl. External Radar discovery) — reviewable by staff;
      it generalizes the PIPE-1 model-call logging. New entities (User,
      membership, activity event, support-session) and the auth generalization
      are defined in the data-model/architecture pass. Serves G-1 (operate and
      retain cohort-1 orgs). Depends on the compass changes DEC-30 (multi-seat)
      and DEC-31 (VAL-3 carve-out).
  DEC-31:
    v: 1
    date: 2026-07-21
    by: founder (shpin.p@diffco.us)
    binds: [VAL-3, SEC-11]
    title: VAL-3 carve-out — internal support impersonation is audited, not founder-surfaced
    statement: >-
      VAL-3 ("Nothing hidden — everything auto-done is logged AND visible")
      is the product's core trust promise about the SYSTEM's autonomy. The
      founder decided that internal support staff acting-as-org (DEC-32) is a
      single, deliberate EXCEPTION to the "visible" clause: every staff
      impersonation action is logged IN FULL internally (reason-gated,
      attributed, audited — SEC-11) but is NOT surfaced to the founder.
      Resolves INC-5. Scope of the exception is deliberately NARROW: it covers
      the ATTRIBUTION of a staff act-as action, not the RESULT — a founder still
      sees the material effects in their own surfaces (e.g. a published post
      appears). VAL-3 → v2 carries this carve-out inline so the value is
      self-documenting. Residual trust risk acknowledged (a silent act-as on
      confidential nonprofit data inverts the "nothing hidden" promise if it
      ever leaks); mitigation — keep act-as writes tightly scoped (the boundary
      is fixed at spec time) and design the ledger so founder-visibility can be
      switched on later without a schema change.
  DEC-30:
    v: 1
    date: 2026-07-21
    by: founder (shpin.p@diffco.us)
    binds: [SEC-7]
    title: Reverse the multi-seat non-goal — allow multiple org members
    statement: >-
      The founder reverses two governing statements to allow MULTIPLE members
      per org: scope.md's "Not in this product … multi-seat roles" non-goal and
      the users.md "Single account per org" persona line. Resolves INC-4. Going
      forward an Org has one or more member Users with roles (owner + members);
      the Founder-Operator persona generalizes to "org members", with the owner
      the default primary. This is the founder-facing half of the identity model
      (DEC-32); the internal platform-staff role is distinct and not an org
      member. scope.md and users.md are amended in this change. Note (sequencing,
      not scope): the two-founder / 12-week / R-8 constraint argues for building
      the internal-admin core first and the founder-facing multi-seat management
      UX as a thin follow — recorded so the requirement authoring can phase it.
  DEC-29:
    v: 1
    date: 2026-07-20
    by: founder (shpin.p@diffco.us)
    binds: [ADR-0002]
    title: Engineering conventions register + Drizzle; Vercel Eve rejected, keep Vercel AI SDK 7
    statement: >-
      The founder expanded the constitution's Code Standards (root CLAUDE.md,
      2026-07-20) with prescriptive type-hygiene rules and two stack touches;
      this DEC propagates them into .spec at the right altitudes. Three parts.
      (1) FOUND the engineering CONVENTIONS register (.spec/conventions.yaml,
      kind: conventions — the implementation compass, scoped prose, DEC-28
      mechanism): strict typing (no `any`), strictly branded types for IDs,
      reuse field shapes via Pick/Omit/Union rather than redefining, prefer
      type inference from Drizzle over hand-written row types, Zod
      type-definitions-with-inference for key entities, and no unsafe
      json/yaml parsing (Zod-validate at every untrusted boundary). These are
      idiom-level "how we build here", not requirements — surfaced to the agent
      at edit time, never a roll-up node. (2) ADOPT Drizzle as the light,
      type-first query builder over Postgres + pgvector — recorded as a dated
      amendment to ADR-0002 (it fills the ORM slot ADR-0002 left open; it is
      consistent with the "one language, minimal surface, strong typing" axis
      and is explicitly NOT the "Prisma-style heavy ORM" that ADR-0002's
      options-considered rejected). (3) REJECT adopting Vercel Eve as the
      primary AI-agent framework (a mid-session constitution edit, reverted):
      the LLM layer stays the proven, provider-abstracted Vercel AI SDK 7 per
      ADR-0002 — Eve is a very new framework and making it primary would be a
      one-way-door lock-in on the product's core (VIS-1) against ADR-0002's
      12-week/minimal-moving-parts founding axis; recorded as a dead-end
      (LRN-25) so it is not silently re-raised without new maturity evidence.
  DEC-28:
    v: 1
    date: 2026-07-20
    by: founder (shpin.p@diffco.us)
    binds: [XO-1, XH-1, XA-1, XP-1, XG-1, XB-1, XN-1, XOPS-1]
    title: Split the monolithic experience spine into eight by-domain registers
    statement: >-
      The One-Home experience spine (DEC-18) had grown to a single ~1000-line
      register of 56 elements (EXP-*, experience/spine.yaml) — past the
      readability / write-contention threshold the Cortex method names as the
      trigger to split (method/ui.md "Scaling", shipped in cortex v0.21.0). The
      founder directed the split, sequenced Cortex-guidance-FIRST so the split
      would conform to a blessed convention (done: v0.21.0 added per-domain
      experience-register guidance, fixed the serves goal-vs-requirement doc
      drift, promoted `touchpoint` to a standard kind, and shipped the
      ux-designed completion tier). Decision: decompose the spine BY JOURNEY
      DOMAIN into eight registers, each with its own prefix and file —
      onboarding (XO), home / the One-Home shell (XH), autonomy (XA), proactive
      (XP), glass-wall (XG), account (XB), public (XN), ops (XOPS). The shared
      surface is homed ONCE and referenced by ID (VAL-4): the home shell (XH)
      is the most cross-referenced register; the glass-wall views, Controls
      tray, and satellites link to it, never copy it. This is a
      CONTENT-PRESERVING migration — every element body is verbatim from the
      DEC-18 spine; IDs were re-homed EXP-* -> <domain>-* in tree order, and
      the ~46 citing sites (17 gated specs' constrained-by, requirements,
      architecture, decisions, the vision-experience map) were re-pointed as a
      pure reference update, so no spec is re-challenged or version-bumped by
      this reorg. The eight registers are re-gated together by one
      Product-Designer challenger pass (structural/delta — content unchanged);
      experience/spine.yaml (EXP) is retired, experience/ui.yaml stays
      superseded for history. Chosen over keeping one register (fails the scale
      trigger) and over a register-per-journey (over-structure, VAL-6).

  DEC-23:
    v: 1
    date: 2026-07-19
    by: founder (shpin.p@diffco.us)
    binds: [TOP-1, TOP-2, TOP-3, TOP-4, DM-13, EXT-1, EXT-4, STR-1, GEN-1]
    title: Content Topics — a first-class proactive editorial-agenda + research-strategy capability (P0)
    statement: >-
      Founders of small nonprofits rarely have the time or the marketer's
      instinct to decide WHAT to talk about, or to define research criteria for
      finding external content that is genuinely interesting yet still relevant.
      Decision: the system owns the EDITORIAL AGENDA as a first-class capability
      (Content Topics, TOP). It proactively identifies content topics (TOP-1),
      holds a rich per-topic research strategy that drives external discovery
      (TOP-2), and gently/timely proposes topics with a reason (TOP-3); the
      active topic set is one shared, transparent, founder-editable source that
      structures internal content AND drives external research (TOP-4). P0,
      woven into the core loop: it reshapes EXT-1 (the Radar runs against the
      agenda + research strategies, not a static cause seed), EXT-4 (topic
      controls managed via the agenda), STR-1 (section (a) draws from the
      agenda), and GEN-1 (the planner pairs a taxonomy type with an agenda
      subject). New entity DM-13 Topic. Boundaries: engagement via real stories
      and honest framing only — within GR-1 (no outcome promises), VAL-1 (sell
      the process, not leads), VAL-4 (real over synthetic); cited sources
      (GR-5); external autonomy capped (EXT-3); proposals proactive-but-calm
      (VAL-6, R-10) and distinct from the strictly pull-only Discoveries feed
      (EXT-5). Aligns with VIS-2 (owns the context, moves first). Chosen over
      enriching EXT/STR in place (no single owner) and a research-strategy-only
      slice (which would leave proactive topic identification — the core of the
      idea — unbuilt).

  DEC-26:
    v: 1
    date: 2026-07-19
    by: founder (shpin.p@diffco.us)
    binds: [AUT-1]
    title: TL1 veto model is a founder-operator choice; default PUBLISH-THEN-TAKEDOWN (semantics pinned now; activation stays P2)
    statement: >-
      AUT-1's "TL1 auto-publish with 24h veto window" (DEC-13) is ambiguous
      between publish-then-takedown and hold-then-publish, and the safety-vs-speed
      trade is genuinely founder-specific. Decision: the TL1 veto model is a
      FOUNDER-OPERATOR-selectable setting, DEFAULTING to PUBLISH-THEN-TAKEDOWN.
      (a) DEFAULT publish-then-takedown — the approved design (XA-3 "Published —
      you can stop it until Thu 6pm", the DS-5 veto-window card, vision.md #8): a
      clean draft auto-publishes at its optimal time and the founder may PULL it
      within the 24h window (native platform delete for social; DM-5
      published->unpublished for news). This preserves the autonomy proof — it
      just gets done (VIS-2, G-4) — and requires NO spine/DS/vision change.
      (b) OPT-IN hold-then-publish — for a cautious founder: the draft is
      auto-approved but HELD in the DM-5 pending phase for 24h (veto = the
      approved->draft recall during pending), publishing only if unvetoed; nothing
      is public within the window. Either way the guardrail backstops (GR-3
      sensitive, GR-8 taboo) already HOLD dangerous drafts for the founder
      regardless of Trust Level, so publish-then-takedown never exposes a
      guardrail-violating post — only a "clean but the founder might have tweaked
      it" one, briefly. A veto/pull in EITHER model hands that item to founder
      control and it is NEVER re-auto-approved. Realized in the AUT behavior spec;
      TL1 ACTIVATION remains P2 (rides the AUT-2 promotion). Resolves the PUBS-1
      veto-window open-question; the opt-in hold-then-publish founder-facing card
      is a deferred P2 experience surface (the default veto-window card exists).
      Extends DEC-13. (Corrects this decision's initial hold-then-publish-only
      framing, which conflicted with the approved publish-then-takedown design.)

  DEC-24:
    v: 1
    date: 2026-07-19
    by: founder (shpin.p@diffco.us)
    binds: [PRO-1, PRO-2, PRO-3, PRO-4, INT-3, TOP-3]
    title: Shared proactive-interruption budget with priority tiers, owned by the Proactive Manager
    statement: >-
      The founder faces multiple INDEPENDENT proactive pushes — PRO-1 photo
      requests, PRO-2 campaigns, INT-3 interviewer curiosity, TOP-3 topic
      proposals — each self-rate-limited but with NO shared ceiling, so three or
      four per-capability limits can STACK into a spammy week (R-10, the exact
      risk the INT challenger flagged). Decision: a SINGLE per-org
      proactive-interruption BUDGET, owned and enforced by the Proactive Manager
      (PRO — new requirement PRO-4), that ALL proactive pushes draw from, with
      PRIORITY TIERS: HIGH (time-sensitive — a PRO-1 photo request tied to an
      imminent event, a PRO-2 campaign window) preempts LOW (deferrable — TOP-3
      topic proposals, INT-3 curiosity). When the budget is spent, low-priority
      pushes WAIT; a high-priority time-sensitive ask may still fire within a hard
      per-org ceiling. Serves G-3 (calm, <15 min/week), VAL-6 (moves first but
      calmly), R-10 (a technical/overwhelming action surface is a churn risk).
      Pull-only surfaces (the EXT-5 Discoveries feed) are NOT interruptions and are
      exempt. Chosen over per-capability limits only (they stack) and a single
      budget without tiers (low-value proposals could crowd out a time-sensitive
      photo request). PRO-4 owns the budget; INT-3/TOP-3/PRO-1/PRO-2 draw from it.

  DEC-25:
    v: 1
    date: 2026-07-19
    by: founder (shpin.p@diffco.us)
    binds: [NWS-4, TOP-4]
    title: News-site topic navigation reuses the editorial agenda (hybrid — universal categories + live TOP-4 agenda)
    statement: >-
      NWS-4 originally derived the org-domain browse topics INDEPENDENTLY from the
      cause profile in Memory — written before DEC-23 made the TOP-4 editorial agenda the
      single source of "what this org talks about", so the news site would grow a
      SECOND topic taxonomy that could diverge from the agenda. Decision: the news
      front-page topic navigation is HYBRID — the fixed UNIVERSAL categories (the
      GEN-1 content taxonomy: mission, founder, case studies, events, people,
      external) PLUS the org's ACTIVE TOP-4 agenda topics as the org-domain rail.
      Reuse the agenda (ONE source) rather than a second independent derivation —
      extends DEC-23's single-source discipline to the reader-facing surface. The
      universal categories give donors a STABLE browse structure; the agenda topics
      keep the org-domain rail CURRENT with what the org actually publishes. NWS-4
      -> v2. Chosen over keeping the separate reader-browse taxonomy (a second
      source diverging from the agenda) and over fully unifying (dropping the
      stable universal categories a public site wants). Extends DEC-23.

  DEC-27:
    v: 1
    date: 2026-07-20
    by: founder (shpin.p@diffco.us)
    binds: [SEC-11, OPS-1]
    title: Operator access is a dedicated, least-privilege, reason-gated + audited role (ADR-0005)
    statement: >-
      The ops console (OPS-1, OPSS-1/2) reads ALL orgs' confidential data (SEC-4)
      to run cohort-1 QA/failure/transcript/radar work — but no operator identity
      or authz existed (SEC-7 is founder BetterAuth only), a gap the OPS spec
      flagged as decidable before cohort-1 operators touch real org data. Decision:
      operator access is a DEDICATED role distinct from founder auth,
      least-privilege and scoped to the console functions; every access to an org's
      confidential data is REASON-GATED and fully AUDIT-LOGGED; the console is
      disabled outside the ops environment. Recorded as posture SEC-11; model +
      alternatives in ADR-0005 (accepted). Chosen over reusing BetterAuth with an
      operator flag (blurs founder/operator, weak cross-org audit) and
      aggregates-only access (defeats OPSS-1's draft QA). Surfaced by the OPS
      challenge; ratifiable — the specific mechanism can be adjusted before
      cohort-1 without reopening the posture.

  DEC-22:
    v: 1
    date: 2026-07-19
    by: founder (shpin.p@diffco.us)
    binds: [STR-4, CHT-2, APR-3, DM-3, PIPE-1, PIPE-2, GR-8, MEMS-3, MEMS-4]
    title: Memory is the single source of truth for founder rules/taboos; Strategy projects it; the overlay is enforced at the VAL stage
    statement: >-
      A founder rule like "never name donors" had two candidate homes in the
      specs: Strategy section (c) (STR-4, enforced via STR-3) and a Memory
      taboo overlay (MEMS-3); CHT-2 wrote such feedback to "Memory or Strategy".
      Decision: MEMORY is the single source of truth for founder-stated
      rules/taboos — it is the core asset every subsystem reads (MEM-1). The
      Strategy's org-rules section (c) becomes a rendered VIEW of the active
      Memory rule/taboo overlay, not a second store. Enforcement routes the
      active overlay to the pipeline validation (VAL) stage as a distinct
      deterministic gate CO-LOCATED with STR-3 (in PIPE-2) — not performed by
      STR-3. A correction therefore binds immediately, with no Strategy-sync
      step. Reconciles STR-4 (→v2), CHT-2 (→v2), and PIPE-1/PIPE-2 (→v2).
      Rejected: Strategy-as-enforcement-home (a correction would bind only
      after propagating into the Strategy — slower, and splits the core asset)
      and dual-store-with-precedence (least DRY; preserves CHT-2's ambiguity).
      Surfaced by the MEM spec's 3-lens challenger panel (2026-07-19,
      specs/challenges/mem-org-memory-*).

  DEC-21:
    v: 1
    date: 2026-07-19
    by: founder (shpin.p@diffco.us)
    binds: [GR-8, PIPE-2, MEMS-3]
    title: Founder-taboo enforcement backstop — an unconfident check forces human approval regardless of Trust Level
    statement: >-
      MEM-1 requires that a stated correction is NEVER violated in subsequent
      drafts — but detecting a semantic taboo (e.g. "never name donors") in
      generated prose is an LLM check with a residual false-negative rate. At
      Trust Level 0 the human approver catches misses; once the system
      auto-publishes (TL1/TL2) that check is the SOLE enforcement, so a miss is
      a published MEM-1 violation. Decision: a draft the guardrail chain cannot
      CONFIDENTLY clear against an active founder-stated taboo forces human
      approval regardless of Trust Level — a new guardrail GR-8, analogous to
      GR-3. Confident-clean drafts still auto-publish, so G-2 near-autonomy is
      preserved; only the ambiguous residual is held. Rejected: a blanket cap
      on all taboo-bearing content at TL1 (would gut autonomy, since most orgs
      state at least one taboo) and monitor-only (would weaken MEM-1's P0/hard
      "never" to "almost never"). Surfaced by the MEM spec's 3-lens challenger
      panel (2026-07-19).

  DEC-20:
    v: 1
    date: 2026-07-19
    by: founder (shpin.p@diffco.us)
    binds: [EXT-5, GEN-1, DM-8, XG-5, XG-8, XG-9, DEC-19]
    title: Design round-2 refinements — true breakpoints, informative calendar, Discoveries as a triage feed
    statement: >-
      Founder feedback on the first glass-wall/day-one renders, taken as four
      decisions. (1) TRUE BREAKPOINTS: mockups render at real phone width and real
      desktop width — nothing in between; on phone, single-action rows are wholly
      tappable with icon affordances (text micro-actions like "edit" collapse to
      icons; ≥44px targets, DS-4). Design-language rule, recorded in DESIGN.md.
      (2) Knowledge needs real visual hierarchy (design-level; no spec change).
      (3) CALENDAR IS INFORMATIVE AND INTERACTIVE (XG-8 v2): day cells carry
      content hints (title snippet + type + TIME), a day can hold several items
      (stacked chronologically — the ~1/day cadence is typical, not a cap;
      campaign/event days exceed it), mobile renders as an agenda list and desktop
      as the four-week grid; selecting any planned or published item opens its
      preview/interaction IN THE SAME SUMMONED PANE, one level deep with
      "back to Plan & Published" — confirming the founder's expectation that the
      right pane is where item interaction lives (DEC-19 summon-beside; the
      pane may swap its content one level, the stream never leaves).
      (4) DISCOVERIES IS A READ-FIRST TRIAGE FEED, not a passive reading room
      (EXT-5 v2, XG-5/XG-9 v2): each item leads with content worth reading
      (headline, source, short summary); after reading, three dispositions —
      "worth a post" (event-tied items flagged time-sensitive and prioritized),
      "save for later" (a kept pool the planner draws from to fill open calendar
      slots when no fresher material exists), "not for us" (teaches taste). The
      pull-only guard is UNCHANGED: never badged, counted, or nudged. Spine
      deltas re-challenged in the r2 round of this date.

  DEC-19:
    v: 1
    date: 2026-07-19
    by: founder (shpin.p@diffco.us)
    binds: [UX-1, XH-12, XH-13]
    title: Mobile-first priority + desktop summon-beside (simultaneity model)
    statement: >-
      Two decisions taken on review of the One-Home desktop rendering (AI-S-SC).
      (1) MOBILE-FIRST is a recorded priority, not an assumption: the phone is the
      FLOOR — every founder action is available one-handed in a phone browser; desktop
      adds capability in the form of SIMULTANEITY, never exclusive features (UX-1 v2).
      (2) DESKTOP SUMMON-BESIDE: on desktop a summoned surface (the opened draft, any
      glass-wall view, Controls) opens BESIDE the home — the stream stays present
      (dimmed, place kept, pinned zone never dimmed) while the elevated pane occupies
      the added width; on phone the same summon is a full-screen takeover. The stream
      itself never stretches into a dashboard: it stays a readable decision column, and
      width is spent on the pane (the "simultaneity, not density" contract). This
      REFINES the challenged r1 mechanics ("a summoned view is a mode of the home,
      never a sibling destination" — beside-with-stream-present strengthens exactly
      that guarantee); no new elements, serves edges, or states — recorded as a
      clarifying v2 of XH-12/XH-13 without a new challenge round (conscious call,
      altitude rule).

  DEC-18:
    v: 1
    date: 2026-07-19
    by: founder (shpin.p@diffco.us)
    binds: [XO-1, XH-12, UX-2, UX-3, UX-5, UX-7, UX-8, ARC-5, ARC-7, DEC-14, DEC-16, DEC-17]
    title: Full experience-spine replacement — the One-Home model (EXP register)
    statement: >-
      The founder directed a from-scratch reevaluation of the entire experience
      philosophy to break tunnel vision. Two independent first-principles drafts
      (conversation-first; one-adaptive-surface), authored blind to the existing spine,
      CONVERGED on rejecting the six-destination shell for one adaptive home — and the
      founder chose FULL REPLACE over selective migration. Decisions taken in the same
      round (all founder): (a) the home is a FUSED conversational stream — the Ready
      spine and the ambient leading conversation in one surface — justified by the
      stated cadence ceiling (~1 content item/day, a few posts a week), which removes
      the inbox-decay risk DEC-16 fled, and by the trust arc (dense and conversational
      early, sparse and report-like at earned autonomy); (b) four disciplines are
      structural, not stylistic: the stream always reaches an honest "caught up"; GR-3
      holds and failures are PINNED, never batch-cleared, never scroll away; the
      morphing home keeps ONE invariant skeleton (chrome and region order never
      change); trust-promotion offers proactively glimpse the glass wall; (c) the
      TRANSPARENCY GUARANTEE, at the founder's insistence: four plain-labeled,
      one-click, pull-only views — Knowledge, How I write, Plan & Published,
      Discoveries — permanently visible in the home chrome, never badged, never gated
      behind asking in chat (VAL-3); (d) supersession mechanics: the new register
      experience/spine.yaml owns EXP-*; the old experience/ui.yaml (UI-*) flips to
      superseded and is RETAINED on disk so every historical reference (DEC-8/9/14/16,
      INC-3, challenge records r1-r3) still resolves; nothing vetted is silently lost —
      the old spine's challenged edge cases are re-absorbed into the new structure
      (GR-3 hold semantics, veto/held non-confusability, article take-down, approve-
      undo/recall, thin-source onboarding floor, missed-week grace, cancel-with-dignity
      loss summary, bot states, citations/ArticleLink, channel re-auth honesty), and
      DEC-14's activity center DISSOLVES into the home's pinned needs-you zone + the
      Plan & Published log (its intent — VAL-3 logging + actionable alerts — preserved,
      its dedicated surface dropped); (e) UX-2/UX-3/UX-5/UX-7/UX-8 and ARC-5/ARC-7 are
      amended to the one-home model in the same change; the AI-S-DS design system and
      DEC-16 vocabulary carry over unchanged (every stream card resolves from the DS-5
      inventory). The register reaches approved after the Product-Designer challenger
      pass of this round.

  DEC-17:
    v: 1
    date: 2026-07-18
    by: founder (shpin.p@diffco.us)
    binds: [VAL-6, CHT-5, INT-4, R-10, APR-1, DEC-16]
    title: Interaction-model refinements — leading chat, learn-by-disposing enrichment, non-blocking onboarding
    statement: >-
      Founder refinements taken while resolving the alignment audit's coherence items —
      four decisions on HOW the founder interacts, all grounded in the persona
      (tech/marketing-averse, blank-page-averse). (2.1) The "two verbs" promise is the
      DISPOSITION-not-production essence; the concrete action set may exceed two verbs
      (Edit/Adjust, Skip) but each must stay minimal, plain-language, and
      consequence-clear — never technical; a technical/overwhelming surface is a churn
      risk (VAL-6 v2, R-10). This resolves the audit's "two-verbs" coherence item. (2.2)
      Chat must LEAD: it never shows a blank prompt — it drives the conversation so the
      founder mostly ANSWERS what they already know, offers non-trivial context-relevant
      suggested prompts when idle, and hosts the guided "Adjust" (what to change, with
      the most relevant options) as the alternative to APR-1's raw inline Edit (new
      CHT-5, P0). This resolves the audit's "chat-as-primary" coherence item — chat is
      the always-proactive conversational layer, not a blank surface the founder must
      drive. (2.3) "Zero-homework" onboarding means no BLOCKING homework: the system uses
      whatever it can find, structures it flexibly, and never blocks on gaps (ONB-1
      already), while a gentle, always-available set of OPEN QUESTIONS invites the founder
      to deepen the org's context in spare time (new INT-4, P1). This scopes the audit's
      zero-homework honesty item. Unifying concept: the ENRICHMENT LOOP ("learn by
      disposing") — every disposition that carries information (Skip/reject "why?", an
      Adjust) becomes a short optional conversation that deepens Org Memory (spans CHT-5,
      APR, INT-4; added to the glossary).

  DEC-16:
    v: 1
    date: 2026-07-18
    by: founder (shpin.p@diffco.us)
    binds: [APR-1, UX-3, UX-8, AUT-1, EXT-5, UI-6, UI-7, DEC-7]
    title: Terminology alignment — rename Inbox→Ready; de-jargon streak/trust-levels/radar
    statement: >-
      Founder-triggered vocabulary pass after the vision→experience audit found that
      several founder-facing terms carry mental models that fight the "colleague who
      brings finished work" vision (VIS-1, VAL-5, VAL-6). Decisions: (1) the core
      approval surface is renamed from "Inbox" to "Ready" (nav + home header "Ready for
      you") — "Inbox" evoked the email drudgery the persona bounced off (users.md) and
      the reactive/never-done model, the opposite of "the system moves first" and the
      finite-completion design; "Ready" names the state (finished work awaiting the one
      verb, Approve) and is cadence-agnostic. (2) "Streak" → "rhythm / steady presence"
      in founder-facing copy (it imported gamified guilt for a guilt-prone persona whose
      promise is "grace, never guilt"); the glossary concept "Stewardship rhythm" already
      used the better word; "streak" survives only as an internal metric name (G-4
      unchanged). (3) Trust levels shed the "TL0/TL1/TL2" codes in founder-facing labels
      → "Ask me first / Publish with a heads-up / Run on your own"; the codes stay
      internal (AUT-1 concept unchanged). (4) "Radar" → founder-facing "Discoveries"
      (surveillance metaphor → a calm reading room). SCOPE: this changes the canonical
      glossary vocabulary + current requirement/experience/design copy going forward;
      historical records (DEC-7/DEC-14, INC-3, challenge logs) keep their original wording
      as a log; internal file names and IDs are unchanged (e.g. apr-approval-inbox.yaml,
      the APR prefix). Two related coherence items from the same audit — squaring the
      vision text ("chat as primary" vs DEC-7's home-first-with-companion; "two verbs" vs
      four surfaced actions) and scoping the "zero-homework" onboarding promise for
      thin-source orgs — are proposed separately (they touch vision/requirement altitude).

  DEC-15:
    v: 1
    date: 2026-07-18
    by: founder (shpin.p@diffco.us)
    binds: [DS-3, DS-1, DEC-6, DEC-7, ADR-0001]
    title: Design foundations re-explored — substrate + terracotta reaffirmed, neutrals refined, type changed
    statement: >-
      The founder reopened the design foundations (choosing the deepest redesign
      option) and, after a fresh exploration — four theme directions rendered as an
      Artifact, then three real-font type pairings in Claude Design (project AI-S-PR) —
      REAFFIRMED the substrate (ADR-0001, the Airbnb open-design fork) and the
      terracotta accent, light-only, single-accent, and calm-colleague pillars
      (DEC-6/DEC-7). This is therefore a reaffirmation, NOT a supersession of ADR-0001
      or DEC-6/DEC-7. Two refinements are adopted, both realized in
      design/design-system/steward/tokens.css: (1) the neutral ramp is warmed to a
      deliberate bias toward the accent — page ground (#fbfaf8), ink ramp, and
      hairlines — so the neutrals read "chosen, not inherited", while card surfaces
      stay clean white for photo contrast (VAL-4); (2) typography moves OFF Inter (a
      generic default) to Bricolage Grotesque (display) + Source Sans 3 (body) — a
      characterful grotesk over a neutral humanist body — chosen over editorial-serif
      and single-humanist candidates, amending DEC-6's Inter choice and bumping DS-3 to
      v2. Downstream: the full component inventory and screens are rebuilt on this
      foundation and published to the AI-S-DS design system via /design-sync; ADR-0001
      gains a dated amendment note (substrate unchanged).

  DEC-14:
    v: 1
    date: 2026-07-18
    by: founder (shpin.p@diffco.us)
    binds: [INC-3, GR-3, DS-5, UI-6, UI-7, UI-16, UI-29, UI-45, UI-17, UI-67, UI-68]
    title: Pre-UI experience reconciliation — GR-3 manifestation, TL2 inbox, activity center
    statement: >-
      Resolves the founder-requested pre-UI reconciliation audit of the approved
      experience spine (INC-3 plus three deferrals). Four calls, taken together so the
      inbox absorbs them in one design round rather than across three future redesigns:
      (1) GR-3 sensitive-topic holds get a DISTINCT "held for your approval" card class
      (DS-5 v4) — visible, counted in "N of M", never batch-approvable, ReasonLine names
      the hold — chosen over a lighter ReasonLine-only variant or inverting the
      veto-window card, because a hard guardrail deserves an unmistakable, non-confusable
      surface (resolves INC-3; UI-7 v3, UI-29 v2). (2) TL2 (full autopilot) inbox
      semantics are designed NOW rather than deferred to AUT-2/P1 — at TL2 the inbox is
      mostly silent and its only content is GR-3 holds + publish failures + the streak,
      so designing the hold effectively designs the TL2 inbox; consistent with DEC-8's
      TL1-aware-now rationale (UI-7 v3, UI-16 v2). (3) An in-app ACTIVITY & NOTIFICATIONS
      center is added to the spine (new screen UI-67, flow UI-68 under UI-17 "the
      inspectable brain") — the founder-facing realization of VAL-3 "everything auto-done
      is logged and visible", aggregating auto-published actions (PUB-3 publish log),
      publish failures, and channel re-auth prompts (UI-26) — each surfaced only when the
      founder must act. Its shell affordance lives in the TOP CHROME, not the left nav,
      and shows a count ONLY when founder action is required — reconciling the addition
      with UI-6's "only Inbox carries a nav chip" rule rather than breaking it (UI-6 v4).
      (4) UI-45 "cancel with dignity" is given an explicit screen node (the cancel
      section of UI-12), closing the one flow that cited no surface. The
      offline-connectivity posture beyond UI-5's resumable upload stays P0-minimal and is
      subsumed by the actionable-alerts model (no separate global offline mode at P0).
      Reaches approved after the Product-Designer challenger pass of this round.

  DEC-13:
    v: 1
    date: 2026-07-18
    by: founder (shpin.p@diffco.us)
    binds: [Q-12, G-1, G-2, G-3, G-4, G-5, GEN-1, APR-1, PUB-1, AUT-1]
    title: Close the goal-honesty pass — resolve Q-12 + adopt the outcome tier
    statement: >-
      Completes the DEC-11 pass now that the cortex outcome-validation tier has shipped
      (Steward pins cortex v0.20.1). Two moves. (1) RESOLVES Q-12 — closes the G-1/G-4/G-5
      capability gaps by wiring the generate→approve→publish core loop to those goals:
      GEN-1 and APR-1 gain `serves` G-1 + G-5; APR-1 and AUT-1 gain `serves` G-4; PUB-1
      gains `serves` G-5. Each touched requirement bumps a version (GEN-1/APR-1/PUB-1/
      AUT-1 → v2) and cascades a re-pin of the coverage `against` lists that reference it;
      G-1/G-4/G-5 coverage flips partial→complete because the loop is now on-path, not
      relied on in prose. (2) ADOPTS the outcome tier — every Steward goal is a field-metric
      goal, so each now declares an `outcome` assertion (status in-progress: no cohort
      measurement exists yet). This STRUCTURALLY gates a goal's `achieved` on a field
      measurement, not on build alone, replacing the DEC-11 prose caveat with an
      engine-enforced tier. Net honest state: coverage = capability decomposition (complete
      for all five), outcome = field validation (in-progress until cohort data). Recorded
      per HITL (a requirement/goal change): the founder authorized both moves on 2026-07-18.
      CHALLENGE EVIDENCE (compass lens): specs/challenges/goals-2026-07-18-r3.md (pass —
      serves-closures on-path, against-pins reconciled, outcome tier honest, INC-2
      structurally closed), continuing the r1→r2 chain recorded on DEC-11.

  DEC-11:
    v: 1
    date: 2026-07-18
    by: founder (shpin.p@diffco.us)
    binds: [INC-2, Q-12, G-1, G-2, G-3, G-4, G-5]
    title: Goal coverage is a capability claim, not an outcome promise
    statement: >-
      Resolves INC-2 (goal-coverage backfill overstated achievability). Adopted via
      the founder's two AskUserQuestion choices on 2026-07-18. (1) HONESTY POLICY:
      every goal here is a field-measured OUTCOME/METRIC goal, so `coverage: complete`
      asserts only that the CAPABILITY DECOMPOSITION is complete — no capability the
      metric plausibly needs is missing — and explicitly NOT that the metric target
      will be met; metric achievement is empirical, validated by cohort measurement,
      and the causal leap is named against each goal's risks (R-1/R-5, A-5, R-3). (2)
      GRANULARITY: coverage reasoning is argued requirement-by-requirement so the
      `against` pin is auditable; every pinned ID must be placed in the causal chain.
      (2b) CRITICAL-PATH rule (added after the r1 challenger fail): `complete` requires
      the serving set to pin every capability on the metric's CRITICAL PATH; omitting a
      step is a gap even when another goal decomposes it, because the roll-up has no
      goal→goal edge. The status split is DERIVED from this rule, not asserted: G-2
      (approval-rate, path ends at APPROVE) and G-3 (in-app time, an aspect property)
      are `complete` — their paths are fully pinned; G-1 (pay/stay — value delivery
      needs the loop, pins PUB but omits GEN+APR), G-4 (streak — pins GEN+PUB, omits the
      APR/AUT approve step), and G-5 (first live post — pins none of GEN/APR/PUB) are
      `partial`. The earlier r1 attempt kept G-1/G-4 `complete` on a "cross-goal reliance
      in prose" device; the challenger correctly ruled that the very prose-substitution
      INC-2 rejects, so all three critical-path gaps are now `partial`, tracked for
      closure as Q-12. The `serves`-edge audit found APR-2/4/6, CHT-3, BOT-2/3 serve G-2
      only weakly (file-level inheritance); left uncorrected as defensible, noted in G-2
      coverage. Coverage reasoning cites requirement IDs by causal role only — no
      restated parameters or priorities (the r1 low finding). (4) METHOD
      ESCALATION: the root cause is a Cortex gap — the roll-up models `achievable`
      (decomposed) and `achieved` (built) but has no OUTCOME-VALIDATION tier for a
      field-measured goal, so it would imply a behavioral metric is achieved when only
      capabilities are built. Raised as a change-request against the cortex method
      (capability-goal vs outcome-goal distinction); until it lands, the leap is
      carried in prose + risks here. CHALLENGE EVIDENCE (compass lens, mandatory for a
      goal-register reshape): specs/challenges/goals-2026-07-18-r1.md (fail — the
      G-1/G-4 coherence defect) → goals-2026-07-18-r2.md (pass — rule stated + statuses
      re-derived + altitude leak cleared).

  DEC-10:
    v: 1
    date: 2026-07-17
    by: founder (shpin.p@diffco.us)
    binds: [Q-8, Q-10, Q-11, NWS-1, NWS-6, DS-8]
    title: Resolve news-site open questions — URL strategy, theming, afterlife
    statement: >-
      Resolves the three DEC-9 open questions, amending NWS-1/NWS-6/DS-8.
      Q-8 (URL strategy): the news-page address is environment- and
      org-configurable — dev defaults to an app-domain path (zero-infra);
      prod defaults to a dedicated Steward-operated news domain (org slug);
      an org may choose its own news subdomain in Settings (NWS-6). Q-10
      (theming depth): the DS-8 org slots are name + logo + accent color
      ONLY — no per-org typography (keeps the template unmistakably calm,
      GR-7). Q-11 (URL afterlife): an article URL stays reserved and served
      as long as the org's account is active — reservation is a benefit of
      an active account, not held indefinitely for inactive ones (interacts
      with BIL-2 cancel and the SEC deletion policy).

  DEC-1:
    v: 1
    date: 2026-07-12
    by: founder (shpin.p@diffco.us)
    binds: [G-5, G-1, INC-1]
    title: Resolve the vision-vs-PRD metric inconsistency
    statement: >-
      On INC-1 (vision listed activation and churn metrics the PRD goals
      omitted): promote activation to G-5 and fold churn into G-1, rather
      than dropping either. The layered goals become the single source; the
      vision narrative points to them.

  DEC-2:
    v: 1
    date: 2026-07-13
    by: founder (shpin.p@diffco.us)
    binds: [LRN-6, LRN-7]
    title: Documentation representation and structure
    statement: >-
      Adopt the layered, prefix-named, graph-checkable documentation system
      over the initial ordinal-file proposal; normative content is pure YAML,
      narrative is markdown; requirements and specs are separate layers paired
      by slug. Recorded because it is a founding structural decision the whole
      project builds on; the abandoned alternatives are retained as LRN
      dead-ends (LRN-6, LRN-7).

  DEC-3:
    v: 1
    date: 2026-07-13
    by: founder (shpin.p@diffco.us)
    title: Enforce governance with teeth, not prose
    statement: >-
      Where a governance rule can be made deterministic, it must be: the
      mandatory Architect Challenger at spec approval, the pre-commit
      graph gate, the executable acceptance harness, and lint-enforced
      HITL sign-off on product-altitude changes. Chosen over lighter
      prose-only options at each fork. Authorizes the HITL sign-off lint
      tooth and the SDLC protocol's enforcement posture.

  DEC-4:
    v: 1
    date: 2026-07-13
    by: founder (shpin.p@diffco.us)
    title: Rename the docs/ tree to .spec/
    statement: >-
      Rename the documentation tree from docs/ to .spec/ — a dot-prefixed
      system folder signaling a strict, machine-governed, AI-managed spec tree
      rather than informal docs. Mirrors the same change in the Cortex kit; the
      lint engine root, the Claude Code hook scopes, and the pre-commit gate all
      target .spec.

  DEC-5:
    v: 1
    date: 2026-07-13
    by: founder (shpin.p@diffco.us)
    title: Source the docs-check engine from cortex, not a vendored copy
    statement: >-
      Stop vendoring the engine and methodology copies in scripts/ and
      .claude/. Steward consumes cortex two ways: the Claude Code surface via
      the installed plugin (enabledPlugins), and the toolchain (git hooks / CI
      / CLI) via a version-pinned npm git dependency
      (github:DiffCo/cortex, pinned by tag) run as npx cortex-docs-check. The
      prefix registry moves to .spec/registry.yaml (data). This removes the
      divergent engine copy and its version drift.

  DEC-6:
    v: 1
    date: 2026-07-16
    by: founder (shpin.p@diffco.us)
    binds: [ADR-0001]
    title: Design-system substrate — re-themed Airbnb open-design fork
    statement: >-
      Adopt the Open Design "airbnb" package (github:nexu-io/open-design,
      vendored at design/design-system/airbnb/) as Steward's design-system
      substrate, for its spacious, breathing, welcoming, content-first
      character. It is consumed as a re-themed fork: the OD token schema is
      the stable contract; Steward binds its own brand values in a sibling
      theme (design/design-system/steward/). Airbnb's marketplace UX is
      explicitly NOT adopted — the adaptation rules live in the steward
      theme's DESIGN.md and the DS requirements register. Authorizes
      ADR-0001; a flexibility-limiting choice recorded per HITL policy (A5).

  DEC-9:
    v: 1
    date: 2026-07-17
    by: founder (shpin.p@diffco.us)
    binds: [NWS-1, NWS-6, BOT-1, EXT-5, UX-8, DS-8, R-9]
    title: Adopt the THOUGHTS.md round — news site, bots, radar feed
    statement: >-
      Incorporate the founder's THOUGHTS.md across all layers. Decisions:
      (1) the org news site is adopted at P0 — launch scope — as a THIN
      slice (Steward-operated URLs, one minimal template, no custom domains
      until NWS-6/P1), consciously carving it out of scope.md's "website
      building" non-goal and accepting risk R-9 against the 12-week clock;
      (2) messenger ingestion commits to WhatsApp + Telegram at P1 (BOT-1..3;
      SMS/MMS persona-fit evaluation retained as Q-9); (3) the public news
      page wears the ORG's brand on a minimal steward-token template with
      sanctioned org slots (DS-8) and a "published with Steward" footer;
      (4) the radar feed becomes the SIXTH nav surface (UX-8) — accepted
      with the pull-only guard: never badged, counted, or nudged (VAL-6,
      G-3). Two clusters of the brain dump were found already normative
      (GEN-1 taxonomy; EXT-4/A-3/Q-4 sources) and required no change.

  DEC-8:
    v: 1
    date: 2026-07-16
    by: founder (shpin.p@diffco.us)
    binds: [GR-7, UI-1, UI-2, UI-7, UI-16, UI-20]
    title: Found the experience spine (v0.14 experience layer)
    statement: >-
      Establish Steward's full experience spine under the cortex v0.14
      experience layer, as directed by the founder: the relationship-arc
      journey map (day-one, weekly digest, talk, photos, campaigns, earned
      autonomy, inspectable brain, compose, account, ops) with flows,
      screens, and email touchpoints as governed design-elements
      (experience/ui.yaml), plus the mandated conform-to-the-design-system
      guardrail (GR-7, per method/ui.md §5). Four product calls decided in
      the same round: (1) draft cards carry a Memory-provenance line;
      (2) Skip offers an optional one-tap reason written to Memory; (3) the
      Inbox is designed TL1-aware now (veto-window card class) to avoid a
      month-3 core-screen redesign; (4) the operator-console journey is
      mapped thin, design investment deferred. The register reaches
      approved after the Product-Designer challenger pass of this round.

  DEC-7:
    v: 1
    date: 2026-07-16
    by: founder (shpin.p@diffco.us)
    binds: [DS-2, DS-7, UI-6]
    title: UX foundations — home surface, accent, dark-mode scope
    statement: >-
      Three founding UX decisions taken together with DEC-6: (1) the shell is
      Inbox-first with a docked, always-summonable chat companion — the
      founder lands on the digest stack, and talking stays one gesture away
      on every surface (reconciles VIS-1's conversational front door with
      G-3 and UX-3); (2) the Steward accent is warm terracotta/clay
      (#B5502E), replacing Airbnb's trademark Rausch coral while keeping the
      single-accent discipline; (3) v1 ships light-only — the token schema
      keeps a dark theme possible later as a binding file, not a redesign.
