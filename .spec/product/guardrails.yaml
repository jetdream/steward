kind: guardrails
prefix: GR
title: Platform Guardrails
status: approved
intent: >-
  Hard, near-immovable rules — the non-negotiable boundaries every draft is checked
  against before it enters any queue (STR-3, STR-4), and what a spec's `governed-by`
  cites. Top of the precedence order (a guardrail outranks goals, requirements, and
  values); org-level rules can only TIGHTEN them, never loosen. Changing one is a
  deliberate, HITL guardrail change. Re-homed unchanged from the former principles
  register during the cortex v0.13 migration.
items:
  GR-1:
    v: 1
    origin: baseline
    title: No outcome promises
    rule: Content never promises fundraising or program outcomes.
  GR-2:
    v: 1
    origin: baseline
    title: No tax or legal advice
    rule: >-
      The product and its content never give legal or tax advice.
      Charitable-solicitation registration remains the org's responsibility
      (ToS).
  GR-3:
    v: 1
    origin: baseline
    title: Sensitive-topic escalation
    rule: >-
      A sensitive-topic classifier forces human approval regardless of Trust
      Level.
  GR-4:
    v: 1
    origin: baseline
    title: AI-visual policy
    rule: >-
      AI image generation ships disabled behind a feature flag (Q-3 governs
      enabling). When enabled it produces branded graphics/illustrations only
      — never photorealistic depictions of beneficiaries, animals, staff, or
      impact scenes.
  GR-5:
    v: 1
    origin: baseline
    title: Mandatory citation of external content
    rule: >-
      Every external-content post carries a source citation and commentary
      framing (the org's perspective, not rehashed news).
  GR-6:
    v: 1
    origin: baseline
    title: Official platform APIs and permitted automation only
    rule: >-
      Meta/X/Threads developer-policy compliance; no scraping-based or
      policy-violating publishing paths.
  GR-7:
    v: 3
    decided-by: DEC-35
    title: Conform to the design system
    rule: >-
      Every FOUNDER- and PUBLIC-facing surface — screens, touchpoints, and the
      components inside them — resolves its visual values from the steward theme
      tokens AND reuses the design-system component inventory (DS-1..8, including
      the news-page template's sanctioned org slots). A screen, email, or UI spec
      inventing its own component, color, spacing, or type role there is a
      governed violation, not a matter of taste. UI specs cite this guardrail via
      governed-by (method/ui.md §5). INTERNAL staff tools (the ops/admin console —
      OPS/ADM, never founder- or public-facing) must still resolve visual values
      from the steward theme tokens (DS-1/DS-3/DS-4), but MAY compose shadcn
      primitives directly rather than the founder DSS inventory — they are
      deliberately lower-fidelity (XOPS/DEC-8 precedent) and not the brand
      surface. (v3: DEC-35 scopes the inventory-reuse clause to founder/public
      surfaces; internal tools conform via tokens only. v2: DS-8 — DEC-9.)
  GR-8:
    v: 1
    decided-by: DEC-21
    title: Stated-correction enforcement
    rule: >-
      A draft the guardrail chain cannot CONFIDENTLY clear against an active
      founder-stated taboo (a Memory taboo/rule, MEM-1) forces human approval
      regardless of Trust Level — the backstop that makes "a stated correction
      is never violated" hold once auto-publish is on. Detecting a semantic
      taboo in generated prose is an LLM check with a residual miss rate; the
      overlay is a distinct deterministic gate at the pipeline VAL stage
      (PIPE-2), and VAL-uncertainty escalates to the founder, never
      auto-publishes. Analogous to GR-3 (which escalates on sensitive topics);
      additive to the chain — it never short-circuits the GR-1..GR-6 checks.
