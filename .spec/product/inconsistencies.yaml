kind: inconsistencies
prefix: INC
title: Inconsistency Register
status: approved

intent: >-
  Detected contradictions between artifacts are first-class persistent entries
  â€” never silently dropped. Lifecycle: open â†’ resolved (an entry is never
  deleted; resolution is recorded). Open entries are mandatory reading for any
  change touching the IDs they reference; scripts/docs-check.mjs reports the
  open count.

items:
  INC-3:
    v: 1
    status: resolved
    binds: [GR-3, UI-7, UI-29, DS-5]
    title: Guardrail GR-3 had no founder-facing manifestation in the experience spine
    statement: >-
      Detected 2026-07-18 (founder-requested pre-UI reconciliation audit of the
      approved experience spine). GR-3 â€” a hard, top-of-precedence guardrail â€” forces
      a sensitive-topic item to human approval REGARDLESS of Trust Level. At TL1/TL2
      the inbox otherwise auto-publishes, so GR-3 requires a distinct founder-facing
      state (an item that WOULD have auto-published but was held for approval, with the
      reason shown). The approved spine referenced GR-3 only in EXT-2's backend body;
      no screen, flow state, or DS component manifested it, and â€” unlike the APR-2 /
      NWS-6 / TL2 conscious-deferral precedents â€” it was not recorded as a deliberate
      omission. A hard guardrail with no experience manifestation would surface late,
      on the inbox (UI-7), the most-designed screen.
    resolution: >-
      DEC-14 designs the manifestation: a distinct "held for your approval" card class
      (DS-5 v4, GR-3), counted in the inbox and never batch-approvable, with a
      ReasonLine naming the sensitive-topic hold (UI-7 v3, UI-29 v2). Vetted in the
      same round by the Product-Designer challenger.

  INC-2:
    v: 1
    status: resolved
    binds: [G-1, G-2, G-3, G-4, G-5]
    title: Goal coverage overstated achievability (register-granular sufficiency)
    statement: >-
      Detected 2026-07-18 (founder review of the 49e70df goal-coverage backfill).
      Every goal carried `coverage: status: complete` whose `reasoning` argued
      sufficiency at REGISTER granularity ("decomposed across billing (BIL),
      publishing (PUB)â€¦") while the `against` pin listed 19â€“45 INDIVIDUAL
      requirement IDs â€” so the sufficiency claim was asserted, never demonstrated at
      the level it pinned, and no missing capability could surface. Two consequences:
      (1) the lint trusts `coverage: complete` at face value, so the graph would flip
      each goal to `achievable` on the strength of unauditable prose the moment specs
      land; (2) all five are OUTCOME/METRIC goals, and `complete` conflated CAPABILITY
      completeness with OUTCOME achievement â€” a leap no requirement set can guarantee.
      Writing the argument at requirement granularity then exposed a concrete false
      claim: G-5 (post live in 48h) pinned NONE of the generateâ†’approveâ†’publish chain
      its own metric requires.
    resolution: >-
      DEC-11 adopts the capability-vs-outcome honesty policy: coverage on a metric
      goal is rewritten requirement-by-requirement, `status: complete` is scoped to
      "capability decomposition complete â€” not the metric will be met" with the
      outcome-leap named against its risks, and status is DERIVED per-goal from a
      stated critical-path rule. G-1, G-4, and G-5 were downgraded to `partial` (each
      omits a step of the generateâ†’approveâ†’publish core loop its metric runs through;
      gaps tracked as Q-12); G-2 and G-3 stay `complete` (their metric paths are fully
      pinned). The underlying method gap (no outcome-validation tier) is raised against
      cortex (DEC-11).

  INC-1:
    v: 1
    status: resolved
    title: Vision defined an activation metric absent from PRD goals
    statement: >-
      Detected during PRD v0.3 decomposition (2026-07-12). Vision v0.2 lists
      activation ("first approved post live within the first session's 48
      hours") and churn (<3%) as success metrics; PRD Â§2 goals (G1â€“G4) omitted
      both, so the two normative documents disagreed on the goal set.
    resolution: >-
      Activation promoted to G-5; churn folded into G-1. Vision's metrics
      section now points to goals.yaml.
