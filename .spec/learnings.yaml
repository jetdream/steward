kind: learnings
prefix: LRN
title: Engineering Learnings
status: approved

intent: >-
  The project's transferable memory: gotchas (traps that bit us), dead-ends
  (approaches built or seriously considered, then abandoned — with the
  reason, so they are not re-proposed without new information), and patterns
  (moves that worked and should be repeated). Entries are scope-tagged for
  retrieval and incident-sourced for provenance. Protocol: any multi-round
  fix loop, reverted approach, or diagnosed tooling bug deposits its lesson
  here in the same commit. Module-local traps stay in module CLAUDE.md
  Gotchas sections; this register is for lessons that transfer.

items:
  LRN-17:
    v: 1
    type: pattern
    scope: [docs-format, process]
    source: goal-coverage honesty pass (INC-2 / DEC-11, 2026-07-18)
    title: A coverage claim is only as honest as its granularity and its scope
    statement: >-
      Two traps when asserting `coverage: complete` on a parent (goal/requirement).
      (1) GRANULARITY: argue sufficiency at the SAME granularity as the `against`
      pin. A `reasoning` that names capability REGISTERS ("across BIL, PUB, NWS")
      while the pin lists individual IDs is a backfill the lint trusts but no human
      can audit, and it hides gaps — writing the argument requirement-by-requirement
      is what surfaced that G-5 pinned none of the generate→approve→publish chain its
      own metric needs. Every pinned ID must be placeable in the causal chain. (2)
      SCOPE: for an OUTCOME/METRIC parent (a field-measured target — churn %, approval
      %, time, activation), `complete` can only mean "the CAPABILITY decomposition is
      complete," never "the metric will be met" — capabilities are necessary but not
      sufficient for a market/behavioral outcome. State the scope in the reasoning and
      name the outcome-leap against a risk. The deeper fix (an outcome-validation tier
      distinct from decomposed/built) is a method-level change, raised to cortex — but
      the authoring discipline above holds regardless.

  LRN-1:
    v: 1
    type: gotcha
    scope: [nodejs, tooling]
    source: docs-check --json corruption, found by user pipe failure (commit 3ca4fef era)
    title: process.exit() truncates piped stdout at 64KB
    statement: >-
      Node's stdout to a pipe is asynchronous; process.exit() drops buffered
      output beyond ~64KB, silently corrupting large payloads. Set
      process.exitCode and let the process drain instead. Symptom: valid
      JSON that cuts off mid-string only when piped.

  LRN-2:
    v: 1
    type: gotcha
    scope: [yaml, parser]
    source: challenge rounds 2 and 3 (dcx spec), both highs
    title: YAML duplicate keys silently last-win
    statement: >-
      Plain YAML semantics let a duplicate key replace the earlier value with
      no diagnostic — which silently defeats any uniqueness guarantee built
      on keys. Any hand-rolled or configured parser in this repo must error
      on duplicate keys at the same level. This bit twice: register items
      maps, then markdown frontmatter.

  LRN-3:
    v: 1
    type: gotcha
    scope: [parser, tooling]
    source: challenge round 3 (dcx spec), high
    title: Swallowed sub-parser errors resurface as gate bypasses
    statement: >-
      Parsing a sub-document (frontmatter, embedded block) and discarding its
      errors converts corruption into silently-wrong metadata downstream —
      in our case, gate-relevant ADR status. Always propagate sub-parse
      errors to the caller, remapping every embedded line number to file
      coordinates (including secondary pointers like "first at line N").

  LRN-4:
    v: 1
    type: pattern
    scope: [lint, security, design]
    source: challenge round 4 (dcx spec), high — phantom decision record satisfied the design gate
    title: ID-gated checks must verify provenance kind, not just existence and status
    statement: >-
      A check of the form "cited ID must exist with status X" is bypassable
      by defining a same-shaped ID through a different, cheaper channel. Gate
      checks must pin the definition channel (e.g. filename-owned
      namespaces) and the artifact kind, and the namespace itself must be
      unclaimable elsewhere. Generalizes: every gate needs the question
      "what else can produce a token that satisfies me?"

  LRN-5:
    v: 1
    type: gotcha
    scope: [id-grammar, hooks]
    source: challenge round 1 (ctx spec), high — rule text contradicted its own implementation
    title: Short uppercase-hyphen-number grammars collide with everyday tokens
    statement: >-
      Encoding names, hash names, standards numbers, and model names all
      match compact ID grammars. Consequences: never auto-note unregistered
      tokens (perpetual noise), make the registry check turn collisions in
      normative docs into loud rename-or-register errors, and avoid writing
      collision-shaped examples literally inside lintable docs.

  LRN-6:
    v: 1
    type: dead-end
    scope: [docs-format, process]
    source: item-representation decision, 2026-07-13 discussion
    title: One-file-per-item registers rejected
    statement: >-
      Full project-master-style item-per-file was rejected for this repo:
      an agent working one capability pays N file reads instead of one, the
      capability's intent narrative loses its home, and frontmatter edges
      duplicate what prose already states (drift channel). Do not re-propose
      without new information — the recorded trigger to revisit is item-level
      knowledge moving into a database for retrieval at scale.

  LRN-7:
    v: 1
    type: dead-end
    scope: [docs-format, yaml]
    source: item-representation iteration, 2026-07-13 — built fully, replaced same day
    title: Markdown headings + per-item fenced YAML blocks rejected
    statement: >-
      The hybrid (markdown item headings, fenced YAML metadata block under
      each) was implemented across all registers and scrapped within hours:
      each item paid a blank line + two fence lines + block before content,
      59 times — too sparse to read. Pure-YAML registers with block-scalar
      prose replaced it. Lesson: when a file is ~80% structure, make the
      whole file the structure; per-item ceremony inside prose satisfies
      neither reader.

  LRN-8:
    v: 1
    type: pattern
    scope: [hooks, context, agents]
    source: context-hooks design discussion (CTX spec purpose)
    title: Inject context in proportion to relevance-certainty
    statement: >-
      Speculative injection (prompt-time, read-time) must be bounded and
      deduplicated — injected content is permanent context residue while the
      tool call it saves is cheap. Write-time is the highest-certainty point
      (the pending edit declares its own contracts) and deserves enforcement,
      not just injection: deny once, deliver the contract, let the conscious
      retry pass.

  LRN-9:
    v: 1
    type: pattern
    scope: [process, review, agents]
    source: challenge rounds 1-5 — each element emerged from a round, none was in the original agent definition
    title: Adversarial review needs three explicit mandates to find real defects
    statement: >-
      (1) Implementation-vs-spec divergence as a named high-severity attack
      category — the reviewer must read the code, not just the spec; (2)
      mutation testing with checksummed byte-identical restoration — claims
      about error paths are verified by making them fire; (3) severity
      self-refutation — every finding must survive the reviewer's own
      attempt to refute it before being reported. Also: successful prompt
      refinements must flow back into the agent definition in the same
      change, or the agent forgets what use taught it.

  LRN-10:
    v: 1
    type: pattern
    scope: [process, enforcement]
    source: retrospective across both major iterations
    title: Prose rules are hope; checked rules hold
    statement: >-
      Every protocol rule that received a deterministic check (lint, hook,
      evidence record) caught real violations; every prose-only rule
      depended on goodwill. Convert prose rules into checks where possible;
      where not, mark them as acknowledged debt and record why. The
      protocol-step enforcement annotations in .spec/CLAUDE.md implement
      this.

  LRN-11:
    v: 1
    type: gotcha
    scope: [git, testing]
    source: negative-test cleanup failure during item-block conversion
    title: git checkout cannot restore an untracked file
    statement: >-
      Destructive tests on files that have never been committed cannot be
      undone via git. Back up to the scratchpad before mutating, or commit
      first. Symptom: a "restore" step that silently does nothing and leaves
      the tree broken while reporting success.

  LRN-12:
    v: 1
    type: gotcha
    scope: [claude-code, agents]
    source: architect-challenger first invocation, 2026-07-13
    title: Agent definitions load at session start
    statement: >-
      A .claude/agents/*.md definition created mid-session is not invocable
      as its own agent type until the next session. Same-session invocations
      must carry the definition by reference in the prompt ("read this file
      first and follow it exactly") on a general-purpose agent. The same
      applies to .claude/settings.json hooks: they activate on next session
      start, after user approval.

  LRN-15:
    v: 1
    type: gotcha
    scope: [claude-code, hooks, tooling]
    source: SDLC-governance increment, 2026-07-13 (write-guard friction observed live)
    title: Example @implements headers in prose files trip the write-guard
    statement: >-
      .spec/CLAUDE.md carries "@implements STR-3 v1" as an example in its layer
      diagram; the context-hooks write-guard reads @implements lines from the
      target file, so every Edit to .spec/CLAUDE.md deny-once-blocks on STR-3
      until it is loaded. Also: an ID authored via Edit/Write this session is
      not in the read-ledger (only Read marks IDs seen), so the write-guard
      fires on IDs you just wrote. Both are harmless (deny-once = one speed
      bump) and are accepted write-guard costs — noted so they are recognized,
      not re-diagnosed as bugs.

  LRN-16:
    v: 1
    type: pattern
    scope: [testing, process]
    source: acceptance-harness fixture-coupling incident, 2026-07-13
    title: Acceptance cases must not hardcode a churning fixture
    statement: >-
      Two acceptance-harness cases hardcoded the r2 challenge-record filename;
      when a parallel re-challenge of a sibling spec repointed the spec's
      record to r3, the cases silently no-op'd (their string replace found
      nothing) and stopped
      testing. Fix: derive the churning value at mutation time (read the
      spec's current `record:` path) instead of pinning a literal. General
      rule: a test that pins an artifact which the normal workflow rotates
      will rot into a false pass — bind the assertion to the live value.

  LRN-13:
    v: 1
    type: pattern
    scope: [lint, security, design]
    source: challenge round 6 (dcx spec), medium findings
    title: Exemptions must be bound to provenance, never self-declared
    statement: >-
      Any check exemption keyed on a self-declarable property (a kind field,
      a name pattern) becomes an unlinted channel — bind exemptions to
      provenance the writer cannot cheaply fake: an exact location, a
      filename-owned namespace, a cross-checked evidence body. Sibling of
      LRN-4 (gate checks must verify provenance kind); together: whoever
      grants an exception must also pin where and from whom it applies.

  LRN-14:
    v: 1
    type: dead-end
    scope: [testing, process, tooling]
    source: DRY review of test-docs-check.mjs assertions, 2026-07-13 (user finding)
    title: Test assertions share message constants with the implementation
    statement: >-
      Decision: lint messages live once in scripts/lib/messages.mjs, imported
      by producer and harness; assertions match exactly against individual
      parsed errors, never substring-scan combined output. Rationale: hand
      duplicated regex fragments carried two risks — loud drift on reword and
      silent missed matches (a neighboring error satisfying a loose pattern).
      Accepted tradeoff: exact-matching shared constants cannot detect
      unhelpful message prose (test tautology) — the tested contract is which
      check fired on which subject, not wording quality. Dead-end recorded:
      a structured error-code taxonomy (stable subcodes as the contract,
      prose fully free, programmatic consumption by hooks) was considered
      and deferred, not rejected — revisit when hooks or CI need per-error
      dispatch, with new information.

  LRN-18:
    v: 1
    type: gotcha
    scope: [spec-authoring, docs-format]
    source: first buildable spec (MEMS, 2026-07-19)
    title: The spec format is a register of spec-elements (items), not a flat behavior map
    statement: >-
      The repo's TEMPLATE.yaml and specs/CLAUDE.md described a pre-items spec
      layout (top-level implements/purpose + a behavior: map + acceptance/
      edge-cases/non-goals). The cortex toolchain (v0.20.1) enforces a different
      SPEC_SCHEMA: a spec is a REGISTER with its OWN prefix (the requirement
      prefix + "S" — MEM to MEMS — registered in registry.yaml), file-level keys
      kind/prefix/title/status/intent/design-scope/constrained-by/depends-on/
      governed-by/assurance/challenge/design/data/interfaces/open-questions, and
      an items: map of spec-elements (each v/title/implements[req-ids]/optional
      constrained-by/statement/optional assurance/optional realization). Behavior,
      edge cases, and an inline acceptance fold into each element's statement;
      governed-by is guardrails-only; constrained-by is design-element IDs + ADR
      IDs (never file paths). The drift was latent because no spec had been
      authored since the toolchain bump. Fix: authored MEMS to the real schema and
      rewrote TEMPLATE.yaml + specs/CLAUDE.md + the .spec/CLAUDE.md references.
      Lesson: the engine's SPEC_SCHEMA (the docs-check schema errors) is the
      authority — verify a template against the linter, and note TEMPLATE.yaml is
      itself NOT linted, so it can silently rot.

  LRN-19:
    v: 1
    type: pattern
    scope: [change-request, cascade, process]
    source: MEMS challenge convergence r2/r3 (DEC-22 dual-home reconciliation, 2026-07-19)
    title: After a reconciliation decision, sweep ALL phrasing variants and ALL registers before challenging
    statement: >-
      DEC-22 collapsed a dual home ("founder rules live in Memory OR Strategy")
      to a single source. The contradiction sweep (SDLC Phase B step 5) updated
      the obvious citers (CHT-2, STR-4, goal coverage) but missed stragglers in
      OTHER registers and OTHER phrasings: the glossary Redirect term and the
      experience flow XH-8 said "Memory or Strategy" (word form), and APR-3 said
      "Strategy/Memory rules" (SLASH form) — the latter invisible to a regex
      matching only the word form. Two challenge rounds were spent finding these
      one at a time. Lesson: when a decision reconciles a CONCEPT, before
      (re)challenging run an exhaustive ripgrep covering every phrasing variant
      (word / slash / "and" / "to-the-X-as-a-store") across ALL live registers —
      glossary, experience spine, and requirements, not just the directly-cited
      IDs. The lint cannot read block-scalar prose for meaning, so a green graph
      is not evidence a concept is single-homed; a stale glossary definition
      (which agents read first) is a real dual home, not cosmetics.

  LRN-20:
    v: 1
    type: pattern
    scope: [spec-authoring, llm, guardrails]
    source: MEMS-3 taboo-enforcement challenge (DEC-21/GR-8, 2026-07-19)
    title: A P0 never-or-always invariant enforced by an LLM classifier needs a deterministic backstop + a catch-rate acceptance
    statement: >-
      MEM-1's "a stated correction is never violated" was first specified as a
      "deterministic" taboo block at the VAL stage. But semantic detection ("does
      this draft name a donor?") is an LLM check with a residual false-negative
      rate — so "deterministic … never" was an overclaim, and at auto-publish (no
      human) a miss ships. Two moves fix this class of hard invariant: (1) split
      deterministic from probabilistic honestly — loading/injecting/routing the
      rule set IS deterministic, DETECTION is not — and say so in the spec; (2)
      pair the probabilistic check with a DETERMINISTIC backstop — when the check
      cannot confidently clear, escalate to a human regardless of autonomy level
      (GR-8, modelled on GR-3). Then write the acceptance as a labeled adversarial
      CATCH-RATE test plus the backstop firing, never an un-failable absolute
      ("NO variant ever …"). Applies to every P0 hard invariant enforced by a
      model — sensitive-topic, mandatory citation, taboo, on-mission.

  LRN-21:
    v: 1
    type: gotcha
    scope: [process, tooling]
    source: TOP spec delta challenge (2026-07-19)
    title: The architect-challenger runs in the shared tree and may git-checkout it
    statement: >-
      The cortex:architect-challenger subagent runs in the SAME working tree
      (not an isolated worktree, since it must read uncommitted spec edits) and,
      for self-cleanup, ran `git checkout` on a tracked-but-uncommitted file
      (goals.yaml) mid-review — reverting the in-flight coverage re-pins it found
      there before reconstructing them (LRN-11 class: checkout reverts
      modified-not-just-untracked files). It self-corrected and the tree verified
      byte-correct, but a failed reconstruction would have silently dropped
      uncommitted work. Lesson: after every challenge round, VERIFY the tree
      (docs-check + a targeted grep of the just-edited pins/versions) BEFORE
      acting on the verdict — never assume a "read-only" challenger left the tree
      untouched. Worktree isolation does not help (a fresh worktree lacks the
      uncommitted spec under review); post-challenge verification is the
      mitigation.

  LRN-22:
    v: 1
    type: pattern
    scope: [spec-authoring, architecture]
    source: GENS-2/GENS-5 flow-ordering challenge (2026-07-19)
    title: When a spec's flow ordering conflicts with an approved architecture artifact, the data-model shape is the tiebreaker
    statement: >-
      The GEN spec ordered the channel-fit gate BEFORE per-channel adaptation (a
      COGS-minimizing instinct: don't adapt channels you'll skip). The challenger
      flagged it as inverting PIPE-2's approved sequence (GEN master+variants → VAL
      → FIT). The escalation ladder offers two resolutions — change the
      architecture (invert PIPE-2) or conform the spec — and the RIGHT one was
      decided by the DATA MODEL: DM-5 already carried "per-variant fit verdicts"
      and a delivery lifecycle keyed on "variant fit-passed, item approved", i.e.
      the model presumes a variant EXISTS for every channel before it is
      fit-scored — which only adapt-then-fit produces, and which the founder
      preview/override UX (GEN-5) actually needs (you can't preview a skipped
      channel's variant that was never generated). Lesson: a spec-vs-architecture
      ordering conflict is not a free choice — check whether the data model already
      encodes the intended order (entity fields/state machines are the quiet
      authority), and conform the spec to it rather than reflexively "optimizing"
      the flow. Only invert the architecture when the model is genuinely wrong, and
      then via the design pass (re-approve + cascade), never silently in a spec.

  LRN-23:
    v: 1
    type: pattern
    scope: [spec-authoring, process]
    source: PUBS-1's v2 + APRS-1 v3 re-challenges (P1b, 2026-07-20)
    title: Adding NEW behavior to an already-approved spec needs a delta re-challenge, not the additive-enumeration in-band shortcut
    statement: >-
      During P1a a few approved specs were bumped for purely ADDITIVE-CLARIFYING
      enumeration edits (MEMS-1 naming the ONB-5 channel; INTS-3/TOPS-3 naming the
      shared budget) and kept approved on the strength of the CONSUMING spec's
      challenger reviewing the delta in-band. That shortcut does NOT extend to a NEW
      BEHAVIOR. In P1b, closing the BIL->PUB gap added a real publishing gate
      (in PUBS-1's v2, active-Subscription) and the OPS QA hold added a readyStack filter
      (APRS-1 v3) — both to already-approved specs, both re-pinned + green. The
      consuming challengers (BIL, OPS) FLAGGED each as an un-challenged behavior
      change on an approved spec (a silent gate-bypass class the lint can't catch:
      it checks pin freshness, not that the challenge record post-dates the item
      version). Both then FAILED their own delta re-challenge (PUBS-1's v2 grace
      wording was backwards; APRS-1 v3 lacked an acceptance clause). Lesson: when a
      downstream change adds behavior to an approved spec, REGRESS that spec to
      draft and delta-re-challenge the bumped item BEFORE re-approving — reserve the
      in-band shortcut for genuinely additive-clarifying enumeration/reference edits
      with no new behavior. The lint won't force this; it's a judgment gate.

  LRN-24:
    v: 1
    type: gotcha
    scope: [spec-authoring, process]
    source: OPS G-2 confound reconciliation (P1b, 2026-07-20)
    title: A goal/coverage note can SILENTLY GOVERN a spec — precedence means reconcile both sides of a cross-layer claim
    statement: >-
      OPSS-1 correctly reframed the silent-operator-QA measurement (an
      operator-touched draft counts as NON-autonomous, kept in the denominator).
      But the matching note added to G-2's outcome reasoning said "operator-touched
      drafts EXCLUDED" — the exact cream-skimming inflation OPSS-1 repudiated. The
      OPS challenger caught it as a HIGH precisely because GOALS > SPECS in
      precedence: the biased goal note GOVERNS the honest spec, so an implementer
      following the authoritative metric would inflate. Lesson: when a spec and a
      higher-precedence layer (goal/value/guardrail) both assert a cross-cutting
      property (here a metric definition), write them to AGREE and re-read BOTH
      after editing either — a one-line note in the higher layer can silently
      override the spec, and the graph lint (which checks IDs/pins, not semantic
      agreement) will not see it.

  LRN-25:
    v: 1
    type: dead-end
    scope: [architecture, process]
    source: constitution stack edit + /cortex:change-request intake (2026-07-20, DEC-29)
    title: Vercel Eve as the primary agent framework — considered, rejected (keep the provider-abstracted AI SDK)
    statement: >-
      A mid-session constitution edit made Vercel Eve the PRIMARY AI-agent
      framework with Vercel AI SDK 7 demoted to fallback. Rejected on intake and
      reverted. Reasons, so this is not silently re-raised: (1) it overturns the
      accepted ADR-0002 LLM baseline (Vercel AI SDK, provider-abstracted) which
      ADR-0003's portability port and the PIPE/MEMS specs build on — a
      supersession, not a constitution edit; (2) it is a one-way-door lock-in on
      the product's CORE (VIS-1, "an AI employee") onto a very new framework,
      cutting against ADR-0002's founding axis (one language, minimal moving
      parts, 12 weeks to revenue); (3) with no src/ yet there is nothing forcing
      the choice now. Revisit ONLY with new evidence of Eve's production maturity
      AND a concrete fit the AI SDK cannot meet — then via a superseding ADR, not
      a constitution edit. Drizzle (the other stack touch that day) was ACCEPTED
      (a light type-first query builder, consistent with the axis; ADR-0002
      amendment, DEC-29) — the contrast is the point: a reversible, axis-aligned
      addition lands; an irreversible core-layer swap onto an unproven dependency
      does not.
