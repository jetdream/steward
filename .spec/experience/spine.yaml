kind: experience
prefix: EXP
title: Steward Experience Spine — One Home
status: approved
# Sign-off: DEC-18 (full-replace round — founder-directed from-scratch
# reevaluation; fused-stream and glass-wall decisions recorded there).
# Product-Designer challenger pass recorded at
# specs/challenges/experience-spine-2026-07-19-r1.md (findings applied in
# the same change per the convergence rule).
# Supersedes experience/ui.yaml (UI-*, DEC-8/DEC-9/DEC-14 era), retained
# on disk as history.

intent: >-
  The experienced-HOW of Steward, reconceived from first principles (DEC-18)
  after two independent blind drafts converged on rejecting the
  six-destination shell. Five principles are this register's soul:
  (P1) ONE HOME, NO NAVIGATION TAX — the founder lives in a single surface
  and summons everything else; there are no co-equal destinations to learn.
  (P2) THE COLLEAGUE SPEAKS FIRST — the home is a conversation the system
  leads (CHT-5); the founder answers and disposes, never authors from blank
  (VAL-6, DS-6, R-10).
  (P3) THE HOME MORPHS WITH TRUST over one invariant skeleton — dense and
  conversational at low trust (day-one, early weeks), sparse and report-like
  at earned autonomy; the place never changes, its density does.
  (P4) FINITE BY DESIGN — the stream always reaches an honest "caught up";
  holds and failures are pinned, never batch-cleared, never scroll away.
  Justified by the cadence ceiling (~1 content item/day, DEC-18): at this
  volume a fused stream cannot decay into the inbox DEC-16 renamed away.
  (P5) THE GLASS WALL IS ALWAYS OPEN — four plain-labeled, one-click,
  pull-only views (Knowledge, How I write, Plan & Published, Discoveries)
  are permanently visible in the home chrome, never badged, never
  chat-gated (VAL-3); trust-promotion moments additionally glimpse it
  proactively.
  Founder-facing vocabulary is DEC-16 native (Ready, Discoveries, rhythm,
  plain trust labels). Every card resolves from the DS-5 component
  inventory (GR-7); stream-specific rows are composed from existing
  primitives, never invented per-screen. Coverage: the consciously
  journey-uncovered set is unchanged from the superseded register (backend
  and self-referential items: DS-1..8, EXT-1/3/4, GEN-6, MEM-1, NWS-6,
  PUB-1/2, STR-3/4, BIL-3, PUB-4); CHT-5 and INT-4 are newly covered.
  Design artifacts live under design/ and attach to elements here.

items:
  # ───────────────────────── Journeys (the trust arc + satellites) ─────────────────────────

  EXP-1:
    v: 1
    kind: journey
    title: "Day one — the handshake"
    serves: [ONB-1, ONB-2, ONB-3, ONB-4, ONB-5, ONB-6, INT-1, INT-2, STR-2]
    body: |
      From "org name + email" to the first approved post inside the first
      session (G-5). The home opens in its DAY-ONE SHAPE: Steward is already
      working and narrating (never a form, never a wizard), a few curious
      questions arrive as cards, "here's what I know" invites correction,
      first drafts land in the same stream, and the relevant channel is
      connected in context at the moment of first approval. Everything is
      skippable and resumable; nothing blocks on completeness (ONB-1).
      Flows: arrival & watch it learn (EXP-11) → the first conversation
      (EXP-12) → first drafts, first yes (EXP-13); meet the plan (EXP-14)
      is offered, never gated.

  EXP-2:
    v: 1
    kind: journey
    title: "The weekly visit"
    serves: [APR-1, APR-2, APR-3, APR-4, APR-6, GEN-2, GEN-4, GEN-5, EXT-2, PRO-3, STW-1, UX-1, UX-3]
    body: |
      The recurring heart: the digest arrives (email/push), the founder
      lands at the top of the READY SPINE — a finite, ordered, clearable
      stack inside the home — and finishes in minutes. Entry states the
      contract (count, time estimate, mix); disposal is per card (approve /
      adjust / skip / redirect); completion is an honest terminus with the
      rhythm framed as steady presence, never a streak score (DEC-16, G-4).
      A missed week draws exactly one gentle nudge, then the system holds
      quietly and welcomes the founder back warmly (APR-6). Flows: the
      visit arrives (EXP-15) → work the stack (EXP-16) → caught up (EXP-17).

  EXP-3:
    v: 1
    kind: journey
    title: "Just talk"
    serves: [CHT-1, CHT-2, CHT-3, CHT-4, CHT-5, INT-3, INT-4, MEM-2, UX-2]
    body: |
      The ambient conversation IS the home's medium — not a destination
      beside the work but the substance around it (DEC-18 fuses what the
      superseded spine split into a chat page + docked companion). It leads
      (CHT-5): suggested, non-trivial openings when idle; questions the
      founder can answer from what they already know; redirects confirmed
      back before binding (CHT-2); the guided Adjust instead of a raw
      editor; and the enrichment loop — every information-bearing
      disposition becomes a short optional conversation that deepens Memory
      (never re-asking what it knows, MEM-2). Flows: ask anything, led
      (EXP-18) → redirect & adjust (EXP-19) → teach it by disposing
      (EXP-20) → do it by chat (EXP-21, P1).

  EXP-4:
    v: 1
    kind: journey
    title: "The colleague moves first"
    serves: [PRO-1, PRO-2, STW-2, GEN-3, BOT-1, BOT-2, BOT-3]
    body: |
      Steward initiates: reasoned photo requests for the scarcest resource
      (real photos, GEN-3), campaign proposals approved once as a set,
      milestone recaps — and the messenger bots as the lowest-friction
      pipe from the founder's phone into the same context layer. Flows:
      send me three photos (EXP-22) → the bot pipe (EXP-23) → approve once
      — campaigns & milestones (EXP-24).

  EXP-5:
    v: 1
    kind: journey
    title: "Earning the reins"
    serves: [AUT-1, AUT-2, AUT-3, UX-6]
    body: |
      The trust arc made visible and always revocable (VAL-3). Promotion is
      offered, never taken (AUT-2), in plain labels — "Ask me first /
      Publish with a heads-up / Run on your own" (DEC-16) — with permanent
      caps stated wherever the level shows (fundraising asks, external —
      EXT-3 via AUT-2). At a heads-up level the home carries quiet
      veto-window cards; a sensitive topic is HELD for the founder at every
      level (GR-3), pinned and unmissable; the offer moment proactively
      glimpses the glass wall (DEC-18 discipline); and Pause is one gesture
      in the chrome, always (AUT-3). As trust grows the home enters its
      QUIET SHAPE — the earned-autonomy proof is the surface itself going
      calm. Flows: the offer (EXP-25) → published, veto open (EXP-26) →
      held for you (EXP-27) → pause & pull back (EXP-28).

  EXP-6:
    v: 1
    kind: journey
    title: "Looking inside"
    serves: [STR-1, STR-2, MEM-3, PUB-3, GEN-1, EXT-5, UX-4, UX-5, UX-8]
    body: |
      The glass wall (VAL-3): four plain-labeled views, each ONE CLICK from
      the permanent Look-inside cluster in the home chrome, each pull-only
      — never badged, never counted, never nudging, never gated behind
      asking in chat (DEC-18 guarantee). "How I write" (the Strategy,
      versioned), "What Steward knows" (Memory, editable), "Plan &
      Published" (the calendar and the publish log), and "Discoveries"
      (everything the radar found). Visited occasionally; carries
      disproportionate trust weight. Flows: steer how it writes (EXP-29) →
      browse what it knows (EXP-30) → plan & published (EXP-31) → wander
      discoveries (EXP-32).

  EXP-7:
    v: 1
    kind: journey
    title: "Make something now"
    serves: [APR-5, UX-7]
    body: |
      The founder-initiated path: a photo and an idea become a post.
      Compose is an ACTION in the chrome (and available by talking), never
      a place (UX-7, VAL-6); the fit gate pre-suggests channels; adapted
      variants are confirmed before anything ships. One flow (EXP-33), one
      sheet (EXP-46).

  EXP-8:
    v: 1
    kind: journey
    title: "Fair account and exit"
    serves: [BIL-1, BIL-2]
    body: |
      One plan, one promise ($199/mo, BIL-1) and an exit with dignity:
      cancel stops publishing, export is offered (articles included), the
      30-day guarantee is one click + one question (BIL-2). A guilt-free
      exit is part of the brand promise to a guilt-prone persona and
      protects the refund metric (G-1) from dark-pattern backlash. Flows:
      plan & billing (EXP-34) → cancel with dignity (EXP-35). Both live in
      the Controls tray (EXP-45).

  EXP-9:
    v: 1
    kind: journey
    title: "The donor reads"
    serves: [NWS-1, NWS-2, NWS-3, NWS-4, NWS-5]
    body: |
      The non-founder chapter: the org's audience arrives from a social
      link (NWS-5), a search result (NWS-2), or a shared URL and lands on
      something unmistakably the ORG's (NWS-3, DS-8) — calm, fast,
      credible — with a path deeper (topic navigation, NWS-4) and the quiet
      "published with Steward" growth seam (G-1). Content guardrails hold
      here exactly as on social (GR-1, GR-2, GR-5). Flow: EXP-36.

  EXP-10:
    v: 1
    kind: journey
    title: "Operators behind the glass"
    serves: [OPS-1]
    body: |
      Internal and deliberately thin: per-org draft QA before the home
      (with a dial), failure queues, interview transcripts, radar precision
      (R-4). One flow (EXP-37), one low-fidelity console (EXP-50); design
      investment deferred until the founder-facing spine is built.

  # ───────────────────────── Flows: Day one (EXP-1) ─────────────────────────

  EXP-11:
    v: 1
    kind: flow
    parent: EXP-1
    title: "Flow: arrival & watch it learn"
    body: |
      Org name + email is enough (ONB-1); EIN optional with visible
      501(c)(3) verification when given; consent to read the public
      presence stated in plain language (A-5). The home opens in day-one
      shape with Steward already narrating ingestion in colleague voice —
      the no-empty-state rule's hardest test (DS-6): "I'm reading your
      website now — first drafts in about ten minutes." Findings stream in
      as cards. States: EIN unmatched (proceed anyway), verification
      pending (never blocks), already-registered org, no sources at all
      (the interview becomes the primary path — EXP-12 — honestly framed),
      slow source, failed source (honest, non-blocking: "your site
      wouldn't load — I'll retry; meanwhile, tell me…"). Screens: EXP-40
      (doorstep) → EXP-38 (home, day-one shape).

  EXP-12:
    v: 1
    kind: flow
    parent: EXP-1
    title: "Flow: the first conversation"
    body: |
      The curious-colleague interview runs IN the home stream (INT-1): a
      few questions at a time, never an interrogation (INT-2), every answer
      visibly landing ("I'll turn this into a founder-story post — you'll
      see it in your first batch"). Resumable forever; never re-asks
      (MEM-2). "Here's what I know" arrives as a correctable profile card
      (ONB-5): facts, tone, programs, people — every inference marked with
      an AssumedNote (DS-5); corrections become permanent rules (MEM-1).
      States: founder has two minutes (graceful pause), founder rambles
      (the interviewer follows the story — that is the point), thin profile
      (honest about gaps + what would fill them), wrong-org ingestion
      (a "this isn't us" escape that purges cleanly).

  EXP-13:
    v: 1
    kind: flow
    parent: EXP-1
    title: "Flow: first drafts, first yes"
    body: |
      First drafts appear in the stream as the chapter's payoff (ONB-6):
      "Here are your first drafts — built from your website and our chat",
      with first-run copy that teaches the verbs by using them. Approving
      the first draft prompts connecting the relevant channel IN CONTEXT
      (ONB-4) — any order, any time, never a gate: zero connected means
      drafts still flow and publishing waits; partial is normal for week
      one; OAuth failure gets a plain-language retry; a LATER token expiry
      becomes a pinned needs-you card with its reason — the founder never
      discovers a dead channel silently. Target: a live post inside 48
      hours (G-5).

  EXP-14:
    v: 1
    kind: flow
    parent: EXP-1
    title: "Flow: meet the plan"
    body: |
      Steward introduces its auto-drafted editorial contract (STR-2) as
      "here's how I plan to speak for you — change anything", linking the
      How-I-write view (EXP-42). States: founder skips entirely (fine —
      the strategy binds anyway and stays one click away, P5), founder
      edits inline (versioned, diffs visible).

  # ───────────────────────── Flows: The weekly visit (EXP-2) ─────────────────────────

  EXP-15:
    v: 1
    kind: flow
    parent: EXP-2
    title: "Flow: the visit arrives"
    body: |
      The digest email/push carries the week's shape (EXP-51, APR-2/APR-4);
      its deep link lands at the top of the Ready spine in the home. Entry
      states the contract: count, honest time estimate, mix line. States:
      nothing new this visit (the home says why and what it needs — DS-6),
      event-driven items between visits (campaigns, time-sensitive external
      — arrive quietly, never re-paint the home as "behind"), THE MISSED
      WEEK: exactly one gentle nudge (EXP-54, APR-6); a second miss
      escalates nothing — time-insensitive items are held quietly, and a
      returning founder gets "here's what happened while you were away"
      with the rhythm restarted forward, never guilt (VAL-5).

  EXP-16:
    v: 1
    kind: flow
    parent: EXP-2
    title: "Flow: work the stack"
    body: |
      The finite spine, per card: approve (all variants, one tap) /
      per-channel toggle / ADJUST (guided, in conversation — CHT-5; raw
      inline edit remains for power moments, APR-1) / skip (optional
      one-tap reason — EXP-20) / free-text redirect (confirm-back, CHT-2).
      Every card carries ReasonLine + ProvenanceLine (tap-through to
      Memory); external cards are citation-first (EXT-2, GR-5, CitationBlock)
      and their length-limited variants carry the ArticleLink badge
      (NWS-5). Approving advances to the next pending card; every approval
      is undoable in place until it publishes. States: awaiting-picture
      (GEN-4 — complete-but-blocked, never an error: dashed warn slot,
      library suggestions with a reason, one-tap attach, disabled Approve
      until resolved; no matches hands off to a photo request, EXP-22),
      rule-proposal card (APR-3's visible payoff: "you've shortened 4 X
      posts in a row — make it a rule?", accept/edit/decline, declined not
      re-asked soon), ask-hygiene card (PRO-3: the missing impact post,
      ReasonLine naming the flag, STW-1), batch approve ("approve all
      ready" — skips held and veto-window cards), deep review (a card opens
      into EXP-39). Screen: EXP-38; deep review: EXP-39.

  EXP-17:
    v: 1
    kind: flow
    parent: EXP-2
    title: "Flow: caught up"
    body: |
      The honest terminus, always reachable (DEC-18 discipline): "That's
      everything — N posts heading out", what happens next ("next from
      me…", VAL-6), and the rhythm as quiet pride — "6 weeks of steady
      presence" (G-4), never a streak score, never confetti (DEC-16).
      States: first-ever week ("your first full week"), rhythm broken last
      week (grace, restart framed forward), partial finish (blocked items
      named with their unblock path), unresolved pinned item (the terminus
      never says "that's everything" over an open hold or failure — it says
      what still needs the founder).

  # ───────────────────────── Flows: Just talk (EXP-3) ─────────────────────────

  EXP-18:
    v: 1
    kind: flow
    parent: EXP-3
    title: "Flow: ask anything, led"
    body: |
      The home's composer is never blank (CHT-5): when idle it offers a few
      non-trivial, context-relevant openings ("ask me what's going out this
      week", "tell me about Saturday's event — I'll draft from it") instead
      of an empty box. Full-context answers with sources (CHT-1): "what's
      going out this week and where?", "what do you know about our
      volunteer program?". INT-3 periodic curiosity arrives here,
      rate-limited, tied to the calendar. States: founder opens with
      nothing in mind (suggestions carry it), long-idle return (openings
      refresh to what changed), can't answer (honest: "I don't know —
      want me to note it as a gap?" — the gap lands in the INT-4 open
      questions, never a bluff).

  EXP-19:
    v: 1
    kind: flow
    parent: EXP-3
    title: "Flow: redirect & adjust"
    body: |
      Plain-language feedback ("less formal", "never name donors") is
      confirmed back before it binds (CHT-2) and written to Memory or
      Strategy, versioned, undoable. The guided ADJUST (CHT-5) is the
      default alternative to raw editing: the conversation asks what to
      change and offers the most relevant options given Memory + Strategy +
      this draft ("warmer? shorter? lead with the kids? different
      photo?"); the redraft lands in place. States: ambiguous redirect
      (confirm-back resolves it), redirect that contradicts a standing rule
      (named, founder chooses), undo.

  EXP-20:
    v: 1
    kind: flow
    parent: EXP-3
    title: "Flow: teach it by disposing"
    body: |
      The enrichment loop (DEC-17, glossary): a skip offers a one-tap
      OptionalReason AFTER the action completes — answering is a gift,
      never a toll — and an answered "why" can open exactly one deeper,
      optional question that writes a rule or fact to Memory (MEM-1). The
      always-available OPEN QUESTIONS list (INT-4) lives in the Knowledge
      view (EXP-41) and occasionally surfaces one dismissible card in the
      stream — each question tied to its payoff ("a founder-story detail
      would sharpen next week's posts"), rate-limited, never blocking,
      never a nag. States: reason declined (not re-asked soon), question
      answered (later drafts visibly improve), list emptied (it says so,
      and stays quiet).

  EXP-21:
    v: 1
    kind: flow
    parent: EXP-3
    title: "Flow: do it by chat (P1)"
    body: |
      Command actions through conversation (CHT-3): "move Thursday's post
      to Friday", "pause X for two weeks". Permission-scoped; failures are
      honest and name the scope. Every action confirms back what it did.

  # ───────────────────────── Flows: The colleague moves first (EXP-4) ─────────────────────────

  EXP-22:
    v: 1
    kind: flow
    parent: EXP-4
    title: "Flow: send me three photos"
    body: |
      A reasoned request (PRO-1): why these photos, for what post, by when
      — in the stream, by email (EXP-52), and via the bots (EXP-23).
      Upload is resumable over bad connectivity (EXP-47 from the email
      path); arrivals route to the requesting draft first. The library
      (GEN-3) is seeded at ingestion and suggests before it asks. States:
      request satisfied by bot mid-flow, request expired (the draft stays
      awaiting-picture, guilt-free), library suggestion accepted instead,
      founder declines ("no photos for this one" — the draft reworks
      photo-free or skips, no re-ask), wrong photo (swap from the library;
      the library is browsable/taggable where it is picked).

  EXP-23:
    v: 1
    kind: flow
    parent: EXP-4
    title: "Flow: the bot pipe"
    body: |
      WhatsApp/Telegram (EXP-55/EXP-56): photos, facts, links, voice notes
      from wherever the founder is; everything lands in the same context
      layer with a colleague-voice acknowledgment naming destination and
      payoff ("got them — three photos filed for Saturday's recap",
      BOT-1). Simple org-aware questions get answers (BOT-2); anything
      deeper gets a deep link home. States: unlinked sender (secure
      account-link handshake first), voice notes supported — transcribed
      and filed with the transcript echoed back, unsupported media scoped
      to video/stickers/documents (honest "send it as a photo, voice note,
      or text"), mid-request arrival (routes to that request's drafts
      first), rate/spam guard (quiet).

  EXP-24:
    v: 1
    kind: flow
    parent: EXP-4
    title: "Flow: approve once — campaigns & milestones"
    body: |
      A campaign proposal (PRO-2) arrives as one expandable package card in
      the stream — the whole set visible, approved once, then executed
      autonomously with the usual per-item visibility. Milestone recaps
      (STW-2, P1) ride the same shape. A campaign that includes fundraising
      asks shows its ask-spacing honestly (PRO-3 hygiene applies inside
      packages too). States: package partially adjusted (only the changed
      items return for a look), campaign declined (not re-proposed soon;
      reason optional — EXP-20), material needed (the package names what it
      still needs and rides EXP-22).

  # ───────────────────────── Flows: Earning the reins (EXP-5) ─────────────────────────

  EXP-25:
    v: 1
    kind: flow
    parent: EXP-5
    title: "Flow: the offer"
    body: |
      After earned consistency (AUT-2), Steward proposes — never takes —
      the next trust level, in plain words: "You've approved 10 impact
      posts in a row unchanged. Want me to publish these with a heads-up
      from now on?" The offer card GLIMPSES THE GLASS WALL (DEC-18
      discipline): a compact "here's everything I published this month"
      summary with a link into Plan & Published — trust is asked for with
      the evidence attached. Permanent caps are stated in the same breath
      (fundraising asks and external stay at heads-up forever). States:
      accepted (the home explains what changes), declined (not re-offered
      soon), auto-demotion after rejection/edit spikes (named, never
      silent).

  EXP-26:
    v: 1
    kind: flow
    parent: EXP-5
    title: "Flow: published, veto open"
    body: |
      At "publish with a heads-up", items go out on time and appear in the
      stream as quiet VETO-WINDOW cards (DS-5): "Published — you can stop
      it until Thu 6pm", with veto & pull, and see-what-went-out. Excluded
      from the Ready count and from batch approve — they need NO action.
      The action notice (EXP-53) mirrors time-sensitive ones off-app. In
      the QUIET SHAPE (full autonomy earned), the home is mostly these plus
      the rhythm line: "nothing needs you this week — 5 posts went out on
      their own"; the stream is the log (VAL-3). The quiet-shape report
      lines and Plan & Published (EXP-43) render the SAME single PUB-3
      publish log — one source, two views, never a second log. States:
      veto used (pulled everywhere, said plainly), veto expired (normal
      life; a later change of heart uses EXP-31's recall/unpublish or the
      channel's native delete), quiet-shape week.

  EXP-27:
    v: 1
    kind: flow
    parent: EXP-5
    title: "Flow: held for you"
    body: |
      GR-3, at every trust level: a sensitive-topic item is pulled OUT of
      the auto-publish path and PINNED at the top of the home as a
      HeldForApproval card (DS-5) — visually the inverse of the veto card,
      counted in Ready, always actionable, never batch-approvable, its
      ReasonLine naming the hold ("this touches a sensitive topic, so I'm
      not publishing it myself"). Because the home is the only landing
      surface and the pinned zone cannot scroll away, arrival = seeing it;
      a time-sensitive hold additionally rides the action notice (EXP-53,
      APR-4) so an away founder is pulled back. States: hold approved
      (publishes normally), hold redirected, hold expired-while-away (still
      pinned, still waiting — it never auto-resolves).

  EXP-28:
    v: 1
    kind: flow
    parent: EXP-5
    title: "Flow: pause & pull back"
    body: |
      Fear to calm in one gesture: Pause in the chrome stops all publishing
      instantly (AUT-3), from anywhere, always visible; per-channel pause
      and the trust dials live in Controls (EXP-45) in plain labels with
      caps stated (AUT-1). States: global pause (the home says what's
      paused and what resumes how), per-channel pause, resume (nothing
      publishes retroactively without saying so).

  # ───────────────────────── Flows: Looking inside (EXP-6) ─────────────────────────

  EXP-29:
    v: 1
    kind: flow
    parent: EXP-6
    title: "Flow: steer how it writes"
    body: |
      The Strategy as a plain-language, versioned document (STR-1's five
      sections; STR-2): read it, edit it inline, see diffs, watch edits
      bind immediately. Chat edits (CHT-2) land here visibly — the
      document is the source of truth, the conversation is one way to
      change it. States: first visit framed as "here's how I plan to speak
      for you", edit conflict with a standing redirect (named), version
      history browse. Screen: EXP-42.

  EXP-30:
    v: 1
    kind: flow
    parent: EXP-6
    title: "Flow: browse what it knows"
    body: |
      The Memory browser (MEM-3, P1): facts, stories, people, rules — each
      with provenance, each editable/deletable; inferred items wear
      AssumedNotes. Hosts the INT-4 open-questions list ("help me
      understand you") with each question's payoff named. States: correct
      an item (never violated again — MEM-1), delete (explains what it
      affects — "two scheduled drafts use this" — then gone from future
      drafts), empty sections honest about what would fill them. Screen:
      EXP-41.

  EXP-31:
    v: 1
    kind: flow
    parent: EXP-6
    title: "Flow: plan & published"
    body: |
      Forward and backward visibility in one view: the rolling four-week
      calendar (GEN-1) and the publish log with links and variant text
      (PUB-3). Recall an approved-but-unpublished item; UNPUBLISH a
      published news article at P0 (the one channel with no native delete
      outside Steward — its URL then serves the warm not-here page,
      EXP-36). A publish failure appears here AND as a pinned needs-you
      card in the home — surfaced only when founder action is needed
      (PUB-1's alert rule). States: empty month (narrated), recalled item
      (returns to Ready), failure resolved. Screen: EXP-43.

  EXP-32:
    v: 1
    kind: flow
    parent: EXP-6
    title: "Flow: wander discoveries"
    body: |
      The org's personalized feed of everything the radar found (EXT-5),
      strictly PULL: no badge, no count, no nudge, no digest entries, and
      browse time is voluntary (G-3 excludes it). One-tap relevant / not
      relevant (OptionalReason reuse) tunes discovery and writes to
      Memory; "make this a draft" hands off to the normal pipeline —
      arriving in Ready, never publishing directly. States: fresh org
      (feed warming up — narrated, cause-profile inputs shown), item
      already drafted (marked), source unavailable (kept with a note),
      empty topic. Screen: EXP-44.

  # ───────────────────────── Flow: Make something now (EXP-7) ─────────────────────────

  EXP-33:
    v: 1
    kind: flow
    parent: EXP-7
    title: "Flow: compose"
    body: |
      From the chrome + or by talking ("post this photo with a
      thank-you"): master text → picture (library first, upload, or bot) →
      channels (the fit gate pre-suggests and explains skips, GEN-5) →
      adapted variants confirmed (APR-5) → schedule. Progressive
      disclosure, never a wizard maze. States: no picture yet (draft parks
      as awaiting-picture, guilt-free), channel override, save-for-later.
      Screen: EXP-46.

  # ───────────────────────── Flows: Fair account and exit (EXP-8) ─────────────────────────

  EXP-34:
    v: 1
    kind: flow
    parent: EXP-8
    title: "Flow: plan & billing"
    body: |
      One plan, visible invoices, card on file (BIL-1) — a section of
      Controls (EXP-45). States: payment failure (grace period, plain
      email, publishing unaffected during grace), card update, receipt
      trail.

  EXP-35:
    v: 1
    kind: flow
    parent: EXP-8
    title: "Flow: cancel with dignity"
    body: |
      Cancel stops publishing, offers export, honors the 30-day guarantee
      in one click + one-question survey (BIL-2). No retention maze; one
      honest "here's what you'll lose" summary — the memory and rhythm the
      system built, and the org NEWS PAGE: its public articles and every
      social link pointing at them; articles are included in the export,
      and article URLs stay reserved only while the account is active
      (Q-11, DEC-10). States: refund window active vs expired, export
      delivery, data deletion on request (a plain affordance, not a
      support ticket; policy per SEC), re-subscribe (memory retained per
      data policy unless deleted). Surface: the cancel section of Controls
      (EXP-45), sibling of billing.

  # ───────────────────────── Flow: The donor reads (EXP-9) ─────────────────────────

  EXP-36:
    v: 1
    kind: flow
    parent: EXP-9
    title: "Flow: arrive from a link and read"
    body: |
      Social post → article (EXP-48) → optionally the front page / topic
      rail (EXP-49) → back out (share, follow the org's channels, or the
      donation URL when the org stores one — a plain Memory fact per the
      scope boundary, never a donations module). States: article
      unpublished/recalled (a warm org-branded not-here page, never a bare
      404), slow network (server-rendered text first, images progressive),
      link unfurl previews (OG correctness is part of this flow's
      acceptance), search-engine entry (canonical URLs).

  # ───────────────────────── Flow: Operators (EXP-10) ─────────────────────────

  EXP-37:
    v: 1
    kind: flow
    parent: EXP-10
    title: "Flow: silent QA pass (internal)"
    body: |
      OPS-1: per-org draft QA before the home (with a dial to reduce it as
      G-2 improves), failure queues, transcripts, radar precision review.
      Screen: EXP-50. Low fidelity by decision (DEC-8 precedent, carried
      forward).

  # ───────────────────────── Screens ─────────────────────────

  EXP-38:
    v: 2
    kind: screen
    parent: EXP-16
    title: "Screen: the home"
    body: |
      THE one founder surface (UX-1..3; DEC-18) — homed under the weekly
      visit because that is its steady life, but it is every journey's
      landing. One invariant skeleton, three densities:
      CHROME (never changes): Pause (AUT-3, one gesture) · wordmark · the
      Look-inside cluster — Knowledge / How I write / Plan & Published /
      Discoveries, each one click, never badged (P5) · Controls · +
      Compose. Mobile: same chrome collapsed to a top bar + sheet.
      SUMMON MECHANICS (all views and trays, EXP-41..46; v2 — DEC-19): a
      summoned surface opens BESIDE the home on desktop — the stream stays
      present (dimmed, place kept; the pinned zone is never dimmed) while
      the elevated pane occupies the added width — and as a full-screen
      takeover on phone. The chrome persists, one "back to Steward"
      gesture returns, focus is trapped while open and restored on
      dismiss. A summoned view is a mode of the home, never a sibling
      destination — a router-of-destinations implementation would rebuild
      the shell DEC-18 abolished. MOBILE-FIRST (UX-1 v2, DEC-19): the
      phone is the floor — every action here is one-handed on a phone;
      desktop adds simultaneity (home + one pane), never density — the
      stream never stretches into a dashboard.
      REGIONS (never reorder): (1) the PINNED zone — held-for-approval
      cards (GR-3), publish failures, channel re-auth; cannot scroll away,
      never batch-cleared; (2) the READY SPINE — the finite, ordered stack
      with its header contract ("Ready for you · 3 of 5 · about six
      minutes") and the one accent verb per card (Approve, DS-2); (3) the
      CONVERSATION — recent exchanges and the composer with suggested
      openings (CHT-5), never a blank box; (4) the TERMINUS — caught-up
      state with the rhythm line ("6 weeks of steady presence", G-4,
      DEC-16) and "next from me" (VAL-6).
      SHAPES: day-one (narrated ingestion + interview cards where Ready
      will be), steady (the weekly visit), quiet (earned autonomy: mostly
      veto-window/report lines + rhythm; "nothing needs you this week").
      The shape changes density and content, NEVER layout — the persona's
      spatial memory is protected (DEC-18 discipline).
      Every card resolves from the design-system inventory (DS-1..8 —
      the substrate's post-card anatomy; DS-5 trust chrome: HeldForApproval,
      veto-window, awaiting-picture, ReasonLine,
      ProvenanceLine, FitBadge, ArticleLink, CitationBlock, OptionalReason,
      AssumedNote); stream-only rows (report lines, interview and
      open-question cards, the campaign package header) are COMPOSED from
      existing primitives — no screen-invented components (GR-7).
      Accessibility (DS-4): landmarked regions, each card a focusable
      article, polite live-region updates, stable focus order — the stream
      is navigable, not a moving feed.

  EXP-39:
    v: 2
    kind: screen
    parent: EXP-16
    title: "Screen: the draft, opened"
    body: |
      A Ready card expanded for deep review — a focused pane BESIDE the
      home on desktop (the stream stays present, place kept — v2, DEC-19),
      a full-screen takeover on phone, one "back to Steward" gesture. Master text and photo large; per-channel variant tabs (FB /
      IG / Threads / X) each with technical fit; the NEWS variant is the
      long-form article — headline, hero, Medium-length body — reviewed
      here with its donor-visible topic tags editable before publish
      (NWS-4); ArticleLink badges on length-limited variants (NWS-5 —
      never a link to an unpublished article); CitationBlock on external
      stories (GR-5). ReasonLine, ProvenanceLine, AssumedNote where
      relevant; schedule rows in plain language ("Tue 9:05 — when your
      followers are around"); skipped channels shown with their reason,
      overridable (GEN-5). Verbs: Approve (accent) · Adjust (guided, chat)
      · Edit (raw, inline) · Skip · Redirect. Approval undoable in place
      until publish.

  EXP-40:
    v: 1
    kind: screen
    parent: EXP-11
    title: "Screen: doorstep"
    body: |
      Sign-up: org name + email (ONB-1), EIN optional with visible
      verification state, consent in plain language, then straight into
      the home's day-one shape — no profile wizard, no checklist. Sign-in
      thereafter is unremarkable and fast.

  EXP-41:
    v: 1
    kind: screen
    parent: EXP-30
    title: "Screen: Knowledge — what Steward knows"
    body: |
      The glass wall's memory pane (MEM-3): facts, stories, people, rules,
      grouped and searchable; provenance on tap; AssumedNotes on
      everything inferred; edit and delete in place. Hosts the INT-4 open
      questions ("help me understand you") with payoffs named — the
      10-minutes-to-spare surface. Empty sections narrate what would fill
      them (DS-6).

  EXP-42:
    v: 1
    kind: screen
    parent: EXP-29
    title: "Screen: How I write — the Strategy"
    body: |
      The five STR-1 sections as one plain-language document: what to
      post / tone with examples / restrictions / standing instructions /
      per-channel rules. Versioned with visible diffs (STR-2); edits bind
      immediately; chat-made rules land here marked with their origin.
      Framed on first visit as "here's how I plan to speak for you."

  EXP-43:
    v: 1
    kind: screen
    parent: EXP-31
    title: "Screen: Plan & Published"
    body: |
      Forward + backward in one view (UX-4): the rolling four-week
      calendar (GEN-1) above the publish log (PUB-3 — what went out,
      where, when, with links and variant text). Recall
      approved-unpublished items; unpublish news articles (P0). Failures
      wear their state here and pin in the home only when actionable.
      Empty month narrated (DS-6).

  EXP-44:
    v: 1
    kind: screen
    parent: EXP-32
    title: "Screen: Discoveries"
    body: |
      The reading room (EXT-5, UX-8): a calm list of discovered items —
      source, relevance ReasonLine (why the org's audience cares), one-tap
      relevant / not relevant, "make this a draft" as the quiet action.
      Explicitly not a task list: no progress, no counts, no completion
      state (contrast with the Ready spine by design).

  EXP-45:
    v: 1
    kind: screen
    parent: EXP-28
    title: "Screen: Controls"
    body: |
      The summoned tray for everything that configures the colleague
      (UX-6): cadence (APR-2), notification channels (APR-4), the trust
      dials per category in plain labels with permanent caps stated
      (AUT-1; asks and external capped at heads-up), per-channel pause +
      the kill switch mirror (AUT-3), channel connections and re-auth
      (ONB-4), plan & billing (BIL-1, EXP-34), the CANCEL section
      (EXP-35, sibling of billing), and the org's news subdomain upgrade
      (NWS-6, P1 — deliberately a settings affordance with no journey of
      its own).

  EXP-46:
    v: 1
    kind: screen
    parent: EXP-33
    title: "Screen: compose sheet"
    body: |
      The one founder-authored path (APR-5, UX-7): a focused sheet —
      master text, picture (library first), channels with fit-gate
      suggestions and visible skip reasons, adapted variants to confirm,
      schedule. Progressive disclosure; closing parks an unfinished draft
      honestly.

  EXP-47:
    v: 1
    kind: screen
    parent: EXP-22
    title: "Screen: quick upload"
    body: |
      The from-a-link photo drop (PRO-1 via EXP-52): opened from an email
      on a phone, minimal chrome, resumable over bad connectivity, photos
      route to the requesting draft with a colleague-voice confirmation
      and payoff. Exists so sending photos never requires "opening the
      app" (G-3).

  EXP-48:
    v: 1
    kind: screen
    parent: EXP-36
    title: "Screen: news article (public)"
    body: |
      Medium-like reading surface on the DS-8 template: org masthead
      (name/logo/accent slots — Q-10), generous type, the story with its
      real photos, CitationBlock on external stories (GR-5), topic tags
      (NWS-4), "published with Steward" footer (NWS-3). No app chrome, no
      founder controls — this is the donor's surface.

  EXP-49:
    v: 1
    kind: screen
    parent: EXP-36
    title: "Screen: news front page (public)"
    body: |
      The org's article list with a topic navigation rail (NWS-4:
      universal categories + org-domain topics), newest first, calm
      density — the org's living public record (G-4 made visible to
      donors). Empty state narrates honestly ("stories are on their way");
      canonical URLs throughout (NWS-2).

  EXP-50:
    v: 1
    kind: screen
    parent: EXP-37
    title: "Screen: operator console (internal)"
    body: |
      Low-fidelity by decision: per-org QA queue with the dial, failure
      queues, interview transcripts, radar precision review (OPS-1, R-4).
      Never founder-visible.

  # ───────────────────────── Touchpoints ─────────────────────────

  EXP-51:
    v: 1
    kind: touchpoint
    parent: EXP-15
    title: "Touchpoint: the digest email"
    body: |
      The week's shape in the subject; the body names the mix and the
      honest time estimate; one link, landing at the top of Ready
      (APR-2, APR-4). Colleague voice (VAL-5); renders on phone mail
      clients; never more than the founder's chosen cadence.

  EXP-52:
    v: 1
    kind: touchpoint
    parent: EXP-22
    title: "Touchpoint: the photo-request email"
    body: |
      A reasoned ask with its payoff and deadline (PRO-1), linking to
      quick upload (EXP-47). Rides email whenever the messenger window is
      closed (EXP-56). Never more than one open request's worth of asking.

  EXP-53:
    v: 1
    kind: touchpoint
    parent: EXP-26
    title: "Touchpoint: the action notice"
    body: |
      The actionable-only alert family (APR-4, PUB-1's rule): a heads-up
      publish with its veto window, a time-sensitive held-for-approval
      item (GR-3), a publish failure, a channel needing re-auth. Each
      carries its reason and one deep link to the pinned card. Nothing
      else ever notifies.

  EXP-54:
    v: 1
    kind: touchpoint
    parent: EXP-15
    title: "Touchpoint: the nudge email"
    body: |
      Exactly one, gentle, after a missed visit (APR-6): "your posts are
      waiting whenever you have a minute" — never guilt, never a
      streak-broken framing (VAL-5, DEC-16). After it: quiet holding, warm
      welcome-back (EXP-15).

  EXP-55:
    v: 1
    kind: touchpoint
    parent: EXP-23
    title: "Touchpoint: Telegram bot"
    body: |
      The Telegram face of the pipe (official Bot API, BOT-3): same
      context, same voice (CHT-4); command-free — plain messages and
      media, with a pinned "what I can do here" note.

  EXP-56:
    v: 1
    kind: touchpoint
    parent: EXP-23
    title: "Touchpoint: WhatsApp bot"
    body: |
      The WhatsApp face (Business API, BOT-3, A-8): same contract as
      EXP-55; template-message constraints respected — the bot initiates
      only within platform rules, and photo requests ride the email
      touchpoint (EXP-52) when the messaging window is closed.
