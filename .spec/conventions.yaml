kind: conventions
title: Steward Engineering Conventions
status: approved
decided-by: DEC-29
# The implementation-altitude compass (method/conventions.md): prescriptive
# "how we build here" that guides code decisions the spec/architecture leaves
# open. Scoped PROSE, no IDs (VAL-6) — surfaced to the agent at edit time by the
# conventions hook, never a roll-up node. Founded from the constitution's Code
# Standards (root CLAUDE.md, DEC-29). Mechanical rules stay in tsc/biome; product
# principles stay in values (VAL-*) / guardrails (GR-*) — not restated here.
# `global` applies everywhere; the path-scoped blocks (shared/backend/client/news)
# are routed to a file by the registry `learning-scopes` path map and surfaced by
# the edit-time hook. Added with the source tree in the DEC-37 foundation phase.
intent: >-
  Type-first discipline is the house style: the type system, inferred from one
  source per concern, is the contract — hand-written duplicate shapes and
  unchecked external data are the smells. These make an agent's un-specified
  micro-decisions predictable and idiomatic; they never override a spec,
  guardrail, or value.
scopes:
  global:
    must: |
      - Strict typing, no `any`, no exceptions (tsc enforces the mechanical
        floor; this is the intent behind it — reach for `unknown` + a narrowing
        check or a Zod parse, never `any`, never a cast to silence the checker).
      - Strictly branded types for IDs: every entity ID is a branded type, never
        a bare `string`, so IDs of different entities are not interchangeable.
      - No unsafe parsing: never trust `JSON.parse`/YAML/`any` at a boundary
        (network, DB edge, file, env, LLM output) — validate with Zod and use the
        inferred type downstream. (Mirrors the kit's own zod-at-the-boundary rule.)
      - Cross-boundary types live once in the `@shared` package (constitution);
        client and backend import them, never redefine them.
    should: |
      - Don't redefine an essentially-identical shape — derive it with the
        Property Selection utility types (`Pick`, `Omit`, `Partial`) and unions,
        so one change propagates (DRY, VAL-3 — do not over-abstract either).
      - Prefer type INFERENCE from the single source of a concern over
        hand-written types: Drizzle-inferred row/insert types for persistence
        (ADR-0002, DM entities), and `z.infer<>` for a validated entity's type —
        so the schema is the one source and the TS type follows it.
      - Define key entities as a Zod schema with an inferred type, and reuse that
        schema for boundary validation rather than writing a parallel validator.
  shared:
    must: |
      - `@shared` stays dependency-light — it is imported by `@client` and
        `@news` (browser / SSR) as well as `@backend`. Add only pure,
        framework-free deps here (Zod is fine); never a server/Node-only or
        heavy runtime dependency.
    should: |
      - Construct a branded ID only by parsing its schema (e.g. `OrgId.parse`),
        never a bare cast — the parse is the one sanctioned place a raw string
        becomes an ID.
  backend:
    must: |
      - Every client-facing operation is a tRPC procedure; anything org-scoped
        uses `protectedProcedure` and enforces active-org confinement
        server-side (ACC-3) — never trust a client-supplied orgId.
      - Map Drizzle rows to `@shared` entities at the boundary; never return a
        raw persistence row type across the API (the row type is a backend-
        internal detail).
      - Reach an external service ONLY through its ADR-0003 port/adapter — never
        call a vendor SDK from domain/business code.
    should: |
      - Import `./otel` before any instrumented module (it must patch first).
      - A fallible outbound call (publish, cache purge, webhook) must surface its
        failure loudly — never swallow it (SEC-8 takedown is the sharp case).
  client:
    must: |
      - All backend access goes through a domain-specific API hook in
        `src/api/*` (a `useX` hook); components never call `useTRPC`, the tRPC
        client, or `fetch` directly (constitution "Client").
      - Build UI only on a screen that has passed the design gate (the experience
        spine + the design system, GR-7) — the skeleton App shell is not that.
    should: |
      - Resolve visual values from the steward theme tokens (DS-1/DS-3/DS-4);
        never hard-code a colour, radius, or type value.
  news:
    must: |
      - `@news` is a separate SSR deployable: it may import `@shared` but never
        `@client`/`@backend` application code.
      - Org branding uses ONLY the DS-8 sanctioned slots (name / logo / accent) —
        no per-org typography or invented values (GR-7).
    should: |
      - Keep pages SEO-first: server-rendered, indexable, with Open Graph meta.
