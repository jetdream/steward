intent: >-
  Exact behavior of the AI evaluation & regression framework (register
  eval-ai-evaluation.yaml, EVAL-1..4; ADR-0010). Built in Phase-B increments:
  EVS-1 (this pass, B3) is the ASSURANCE SUBSTRATE — the test runner + the
  tiered acceptance harness + the active @verifies/@validates evidence markers —
  the floor everything else stands on. The dataset format, the three-mode +
  trajectory scorer, and the champion-vs-challenger regression gate (EVAL-1/2/3)
  are later EVS elements (B6), authored when the runtime + a first Skill exist to
  evaluate.
design-scope: cross-cutting
constrained-by: [ADR-0010, ADR-0009, ADR-0003]
depends-on: []
governed-by: []
assurance: standard
design: >-
  The substrate is deliberately thin and self-contained (ADR-0003). Test runner:
  NODE:TEST run via TSX (`tsx --test`) — chosen over vitest because tsx already
  runs the app and resolves the project's NodeNext + `.js`-extension + tsconfig-
  path imports identically, so tests need ZERO extra resolver config and add ZERO
  new dependencies (tsx is already present); vitest's vite resolver would have to
  be re-taught our `.js`→`.ts` NodeNext convention across four workspaces. A root
  `test` script runs it. Tests live beside the code they cover (`*.test.ts`) under
  the `code-paths` (shared/backend/client/news) the cortex marker scan reads.

  TIERS (DEC-41, EVAL-4):
  - The KEYLESS DETERMINISTIC tier — pure unit tests (no I/O) + dev-stub-backed
    integration tests (the ADR-0008 keyless LLM adapter; a local Postgres for DB
    integration) — is the every-commit / pre-push ACCEPTANCE HARNESS. No live
    model calls, so CI stays self-contained. This closes the DEC-3 /
    .spec/CLAUDE.md doc-vs-reality gap (they assert pre-push runs an acceptance
    harness that did not exist). DB integration tests skip cleanly when no
    DATABASE_URL is present, so the pure-unit subset runs anywhere.
  - The KEYED LLM EVAL tier (champion-vs-challenger — a later EVS element,
    EVAL-2) runs on a
    harness-artifact change / on demand, NEVER on every push — it is not part of
    this pre-push harness.

  EVIDENCE MARKERS: the cortex assurance ladder is turned on — `@implements`
  (realization), `@verifies` (a unit/integration test backing a spec-element at
  `assurance: verified`), `@validates` (an e2e test backing a story). A
  spec-element raised to `assurance: verified` with no `@verifies` test is
  de-rated by the gate (blocked, reported) — the honest teeth. The brain-spine
  MEMS elements whose code + deterministic tests land in this increment
  (MEMS-1/2/4/5/6) are raised to `verified` as the first exercise of the rung;
  MEMS-3 (VAL enforcement, unbuilt) stays `standard`. The `verified` rung here
  attests each element's DETERMINISTIC / STRUCTURAL acceptance via the keyless
  dev-stub tier (merge-key, supersession, overlay-always-present, AssumedNote
  path, canonical-subject keying) — LLM classification and real embedding-nearness
  QUALITY are NOT covered by these tests and are deferred to the catch-rate /
  champion-challenger tier (EVAL-1/2, B6).
data: >-
  No new entities. Eval datasets (DM-adjacent, ADR-0010 storage split) arrive
  with the later EVS elements (B6). This element owns only the runner + harness wiring.
interfaces: >-
  npm scripts: `test` (run the deterministic tier), and the pre-push hook runs it
  as the acceptance harness alongside docs-check + typecheck + lint. Exact vitest
  config + script names live in code.
items:
  EVS-1:
    v: 1
    implements: [EVAL-4]
    statement: >-
      A real automated-test substrate exists and gates the repo. (1) A TEST
      RUNNER (node:test via `tsx --test`) with a `test` script runs the KEYLESS
      DETERMINISTIC tier — pure unit tests plus dev-stub-backed integration tests
      (no live model calls). (2) That tier IS the pre-push / every-commit
      ACCEPTANCE HARNESS: the pre-push hook runs it alongside docs-check +
      typecheck + lint, and it makes no live-model call, so CI stays
      self-contained (ADR-0003) — closing the DEC-3 gap where an acceptance
      harness was assumed but absent. The KEYED LLM eval (EVAL-2) is explicitly
      NOT in this tier. (3) The EVIDENCE MARKERS are active: a spec-element at
      `assurance: verified` is backed by a `@verifies` test or is de-rated
      (blocked, reported) by the gate; `@implements` / `@validates` likewise
      resolve. Demonstrated by raising MEMS-1/2/4/5/6 to `verified` backed by
      real `@verifies` tests in this increment.
      ACCEPTANCE: `npm test` runs green with no VERTEX/LLM key set; the pre-push
      hook fails if the deterministic tier fails; in a GATING context (pre-push /
      CI) the harness FAILS LOUDLY — never silently narrows to unit-only — when
      the dev-stub integration environment (DATABASE_URL) is unavailable; a
      spec-element marked `assurance: verified` without a `@verifies` test is
      reported by docs-check; at least one real spec-element (a MEMS element) is
      `verified` and backed by a passing `@verifies` test.
