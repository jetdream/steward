intent: >-
  Exact behavior of the AI evaluation & regression framework (register
  eval-ai-evaluation.yaml, EVAL-1..4; ADR-0010). Built in Phase-B increments:
  EVS-1 (B3) is the ASSURANCE SUBSTRATE — the test runner + the tiered acceptance
  harness + the active @verifies/@validates evidence markers. EVS-2 + EVS-3 (this
  pass, B6) add the eval framework proper: the dataset format + runner + scorers
  (EVAL-1) and the champion-vs-challenger regression gate + manifest-hash
  enforcement (EVAL-2), piloted on the extract-memory Skill. EVAL-3 (bounded-agent
  TRAJECTORY + cost scoring) is deferred to GEN — the first multi-step Skill,
  the only thing with a trajectory to score.
design-scope: cross-cutting
constrained-by: [ADR-0010, ADR-0009, ADR-0003]
depends-on: []
governed-by: []
assurance: standard
design: >-
  The substrate is deliberately thin and self-contained (ADR-0003). Test runner:
  NODE:TEST run via TSX (`tsx --test`) — chosen over vitest because tsx already
  runs the app and resolves the project's NodeNext + `.js`-extension + tsconfig-
  path imports identically, so tests need ZERO extra resolver config and add ZERO
  new dependencies (tsx is already present); vitest's vite resolver would have to
  be re-taught our `.js`→`.ts` NodeNext convention across four workspaces. A root
  `test` script runs it. Tests live beside the code they cover (`*.test.ts`) under
  the `code-paths` (shared/backend/client/news) the cortex marker scan reads.

  TIERS (DEC-41, EVAL-4):
  - The KEYLESS DETERMINISTIC tier — pure unit tests (no I/O) + dev-stub-backed
    integration tests (the ADR-0008 keyless LLM adapter; a local Postgres for DB
    integration) — is the every-commit / pre-push ACCEPTANCE HARNESS. No live
    model calls, so CI stays self-contained. This closes the DEC-3 /
    .spec/CLAUDE.md doc-vs-reality gap (they assert pre-push runs an acceptance
    harness that did not exist). DB integration tests skip cleanly ONLY on an
    ad-hoc local run with no DATABASE_URL (so the pure-unit subset runs anywhere);
    in a GATING context (STEWARD_GATE / CI) a missing DATABASE_URL FAILS LOUDLY,
    never a silent unit-only narrowing (EVS-1 acceptance).
  - The KEYED LLM EVAL tier (champion-vs-challenger — a later EVS element,
    EVAL-2) runs on a
    harness-artifact change / on demand, NEVER on every push — it is not part of
    this pre-push harness.

  EVIDENCE MARKERS: the cortex assurance ladder is turned on — `@implements`
  (realization), `@verifies` (a unit/integration test backing a spec-element at
  `assurance: verified`), `@validates` (an e2e test backing a story). A
  spec-element raised to `assurance: verified` with no `@verifies` test is
  de-rated by the gate (blocked, reported) — the honest teeth. The brain-spine
  MEMS elements whose code + deterministic tests land in this increment
  (MEMS-1/2/4/5/6) are raised to `verified` as the first exercise of the rung;
  MEMS-3 (VAL enforcement, unbuilt) stays `standard`. The `verified` rung here
  attests each element's DETERMINISTIC / STRUCTURAL acceptance via the keyless
  dev-stub tier (merge-key, supersession, overlay-always-present, AssumedNote
  path, canonical-subject keying) — LLM classification and real embedding-nearness
  QUALITY are NOT covered by these tests and are deferred to the catch-rate /
  champion-challenger tier (EVAL-1/2, B6).
data: >-
  No new DB entities. EVS-2 adds eval DATASETS (in-repo, versioned, synthetic/
  de-identified only — the ADR-0010 storage split, SEC-4) and an eval-RUNS store
  (`backend/src/eval/runs.json`, committed — self-contained per ADR-0003) keyed
  by `(skill, manifestHash#datasetVersion)`. The per-skill regression tolerance,
  sample count, and judge-agreement threshold live in each skill's eval config
  (with named runner defaults, `DEFAULT_EVAL_CONFIG`) — the ADR-0010 §5 hand-off.
interfaces: >-
  npm scripts: `test` (the keyless deterministic tier / acceptance harness, run
  by the pre-push hook + CI alongside docs-check + typecheck + lint); `eval` (the
  keyed/on-demand LLM eval that records a champion); `eval:gate` (the keyless
  regression-gate check — a harness/dataset change with no passing eval on record
  fails). Exact node:test/tsx config + script names live in code.
items:
  EVS-1:
    v: 1
    implements: [EVAL-4]
    statement: >-
      A real automated-test substrate exists and gates the repo. (1) A TEST
      RUNNER (node:test via `tsx --test`) with a `test` script runs the KEYLESS
      DETERMINISTIC tier — pure unit tests plus dev-stub-backed integration tests
      (no live model calls). (2) That tier IS the pre-push / every-commit
      ACCEPTANCE HARNESS: the pre-push hook runs it alongside docs-check +
      typecheck + lint, and it makes no live-model call, so CI stays
      self-contained (ADR-0003) — closing the DEC-3 gap where an acceptance
      harness was assumed but absent. The KEYED LLM eval (EVAL-2) is explicitly
      NOT in this tier. (3) The EVIDENCE MARKERS are active: a spec-element at
      `assurance: verified` is backed by a `@verifies` test or is de-rated
      (blocked, reported) by the gate; `@implements` / `@validates` likewise
      resolve. Demonstrated by raising MEMS-1/2/4/5/6 to `verified` backed by
      real `@verifies` tests in this increment.
      ACCEPTANCE: `npm test` runs green with no VERTEX/LLM key set; the pre-push
      hook fails if the deterministic tier fails; in a GATING context (pre-push /
      CI) the harness FAILS LOUDLY — never silently narrows to unit-only — when
      the dev-stub integration environment (DATABASE_URL) is unavailable; a
      spec-element marked `assurance: verified` without a `@verifies` test is
      reported by docs-check; at least one real spec-element (a MEMS element) is
      `verified` and backed by a passing `@verifies` test.
  EVS-2:
    v: 1
    implements: [EVAL-1]
    statement: >-
      A Skill's harness is evaluated against a VERSIONED dataset (a `datasetVersion`
      bumped on any change — part of the eval-run key, EVS-3). A dataset is a set
      of CASES (input + expected signals) stored in-repo, each carrying a
      PROVENANCE tag (`synthetic | curated | deidentified`) — real org content
      stays in the org-scoped deletable store, never git (SEC-4, the ADR-0010
      storage split). The RUNNER executes
      the Skill's harness (through the ARC-27 runtime + LLM port) for each case
      and applies three scorer modes: DETERMINISTIC (exact structural
      expectations — e.g. the extracted kind, the correction-channel policy),
      CATCH-RATE (adversarial invariants reported as a rate against a stated
      NUMERIC target — the LRN-20 measurement), and LLM-JUDGE (subjective quality
      vs a rubric; the KEYED tier — calibrated against human labels, never a sole
      blocking authority). It emits a SCORECARD (per-metric rates + cost). The
      keyless dev-stub path exercises the runner + deterministic/catch-rate
      scorers with no live call; the judge + real-quality scoring is the keyed
      tier. Piloted on extract-memory with a synthetic dataset.
      ACCEPTANCE: `npm run eval` runs each registered skill's dataset and emits a
      scorecard with each metric's rate; every in-repo dataset case carries a
      provenance tag and none is sourced from the org store (SEC-4 — structurally
      checkable, not a semantic judgment); a spec's catch-rate acceptance resolves
      to a real dataset + a numeric target, not a placeholder.
  EVS-3:
    v: 1
    implements: [EVAL-2]
    statement: >-
      The REGRESSION GATE. Every eval run is recorded keyed by
      `(skill, harnessManifestHash, datasetVersion)` (ADR-0010 §5) in an IN-REPO,
      COMMITTED store (`backend/src/eval/runs.json` — self-contained, ADR-0003).
      Keying on BOTH the harness hash AND the dataset version means a prompt/model/
      policy bump OR a dataset change invalidates a stale pass and forces a fresh
      eval — no green from a grown dataset the current harness would fail. A change
      to either requires a fresh PASSING eval before it ships: the `eval:gate`
      check FAILS when the current `(hash, datasetVersion)` has no passing eval on
      record — the ADR-0010 §5 manifest-hash seam that DEC-3 calls for.
      CHAMPION-VS-CHALLENGER: the challenger is scored against the recorded champion;
      a regression beyond tolerance on any tracked metric, a catch-rate below
      target, or (for a multi-step Skill) a cost/step increase past budget BLOCKS.
      A passing challenger becomes the champion only by the explicit recorded
      `npm run eval` (+ committing runs.json) — never silent auto-promotion, so the
      baseline cannot drift upward undetected. Runs are repeatability-controlled;
      the hard blocking authority is the deterministic + catch-rate tiers plus the
      GR-3/GR-8 escalation-fired checks; the LLM-judge/proxy is calibrated + never
      a sole uncalibrated blocking authority. Per-skill regression tolerance,
      sample count, and judge-agreement threshold live in the skill's eval config
      (named runner defaults, `DEFAULT_EVAL_CONFIG`).
      KEYED-SATISFIES-THE-GATE: only a KEYED run (a real provider) attests LLM
      QUALITY; a keyless dev-stub run is a MECHANISM record (the dev stub is
      prompt-insensitive), so the QUALITY-regression teeth are DORMANT while a
      skill's champion is keyless and activate on the keyed tier once creds land —
      until then the recorded run is flagged dev-stub and the gate reports the
      dormancy rather than pretending to enforce quality.
      ENFORCEMENT WIRING (honest, DEC-3): `eval:gate` is currently an ON-DEMAND
      check — NOT yet a blocking CI/pre-push step, so running it is discipline, not
      teeth, TODAY. It becomes a required CI step when the keyed tier
      (VERTEX_AI_KEY) is configured; until then pre-push enforces only the keyless
      acceptance harness (EVS-1). The keyed eval itself runs on a harness/dataset
      change / on demand, never on every push (EVS-1 tier). (Matches eval/CLAUDE.md.)
      ACCEPTANCE: a `(hash, datasetVersion)` with no recorded passing eval fails
      `eval:gate`; bumping the prompt version OR the datasetVersion makes the prior
      pass stale (gate fails until re-eval); a challenger that lowers a catch-rate
      below target or worsens a tracked metric beyond tolerance is blocked; a
      keyless champion is reported as quality-teeth-dormant, not a quality pass; an
      uncalibrated judge score alone never blocks or passes a change.
open-questions:
  - >-
    EVAL-3 (bounded-agent TRAJECTORY + cost scoring) is intentionally NOT
    implemented here — no multi-step Skill exists to produce a trajectory (every
    Skill is maxSteps=1 until GEN). It lands as a further EVS element with GEN,
    when the tool-loop it scores exists. Not a gap: the champion-vs-challenger
    frame (EVS-3) already carries a cost/step dimension ready for trajectories.
