kind: spec
prefix: GENS
title: Planning & Content Generation — behavior
status: approved
challenge:
  date: 2026-07-24
  by: "cortex:architect-challenger (r1 4-lens → r2 delta → r3 GENS-7 delta — over-structure + design-conformance + delta-verify)"
  verdict: pass
  record: .spec/specs/challenges/gen-content-generation-2026-07-24-r3.md
  summary: >-
    r3 delta-challenges the added GENS-7 (grounded master generation + the reusable
    VAL guardrail chain, the PIPE-4 harness substrate its first consumer implements).
    PASS: over-structure holds (GENS-7 is referenced by the GEN-1 roll-up, @implements'd
    by the G1 generate-draft Skill, and the citable target for the ADR-0010/EVAL-1
    catch-rate tests; not a GENS-1/GENS-2 duplicate); design conforms (three outcomes =
    PIPE-2 pass/regenerate/escalate; GR-3/GR-8 escalate-on-uncertainty; regenerate
    bounded by the PIPE-4 agentPolicy cap); prior r2 fixes (plan-time quota determinism,
    adapt→VAL→fit ordering) still hold. One medium — the acceptance clause had reverted
