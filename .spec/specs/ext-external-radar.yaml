kind: spec
prefix: EXTS
title: External Content Radar — behavior
status: approved
challenge:
  date: 2026-07-19
  by: cortex:architect-challenger (r1 single 4-lens pass → r2 delta)
  verdict: pass
  record: .spec/specs/challenges/ext-external-radar-2026-07-19-r2.md
  summary: >-
    r1 FAILED on one high — PIPE-3 (the approved External Drafts pipeline stage)
    still read "forced human approval routing (EXT-3)", stale since EXT-3 became
    the permanent TL1 cap (AUT-2) and DEC-26 pinned TL1 to publish-then-takedown;
    EXTS also omitted PIPE-2/PIPE-3 from constrained-by (LRN-22/LRN-19). Fixed:
    PIPE-3 -> v2 (external drafts via GENS -> PIPE-2 VAL with GR-5/GR-3, TL1-capped,
    publish per DEC-26); constrained-by += PIPE-2, PIPE-3. Medium: EXTS-1's source
    guard tightened to grounding-provenance + dereferenceability (drop
    hallucinated/dead URLs before the GR-5 citation — the R-4 hole). Lows: EXTS-4
    references EXT-4's enumeration; depends-on += GENS, AUTS. r2 delta verified all
