kind: spec
prefix: UXS
title: App Shell & Navigation — behavior
status: approved
challenge:
  date: 2026-07-19
  by: cortex:architect-challenger (single pass — design-conformance / product-designer / implementation-divergence + LRN-19/22 sweep)
  verdict: pass
  record: .spec/specs/challenges/ux-app-shell-2026-07-19-r1.md
  summary: >-
    r1 passed with no surviving high. The product-designer lens confirmed GR-7
    conformance (the shell invents no component and defers pixels to method/ui.md),
    the four One-Home invariants as genuinely structural/testable with an honest
    LRN-20 split, and all five cross-cutting reconciliations (APRS-1 batch
    exclusion, CHTS surface/behavior split, APRS-5 composer ownership, MEM-3/UX-8
    P1 framing, the client-hook contract). One medium applied in this change: the
    spec cited FLOWS (XG-4/XG-5) where it meant the SCREENS — swapped to
    XG-8 (Plan & Published) and XG-9 (Discoveries) in UXS-4, UXS-8, and the
    design section, so the deferred pixel pass routes to the right layout-bearing
    screens (an LRN-22 wrong-element class the lint cannot see — both IDs resolve).
intent: >-
  Exact behavior of the One-Home app shell (register ux-app-shell.yaml): one
  adaptive home plus summoned glass-wall views plus one Compose action, on a
  mobile-first responsive web app (DEC-18). Mobile-first (UX-1), the ambient
  conversation as the home's medium (UX-2), the finite Ready spine (UX-3), the
  Calendar/Published (UX-4) and Knowledge/How-I-write (UX-5) and Discoveries
  (UX-8) glass-wall views, the Settings/Billing surface (UX-6), and Compose as an
  action not a place (UX-7). This spec owns the shell's structural INVARIANTS
  (routing, region order, one-click reachability, finite stack, pull-only); the
  pixel layer is a method/ui.md pass on the approved spine + design system.
design-scope: cross-cutting
constrained-by: [ADR-0001, ADR-0002, ADR-0003, XO-1, XH-1, XH-2, XA-1, XG-1, XH-3, XH-12]
depends-on: [CHTS, APRS]
governed-by: [GR-7]
assurance: standard

design: >-
  The app shell is the ONE-HOME model (DEC-18): ONE adaptive home column + summoned
  glass-wall views + one Compose action, on a responsive web app (@client,
  ADR-0003; no native apps, scope). It embodies VAL-5 (colleague voice), VAL-6
  (no empty states — DS-6), and VAL-3 (the glass wall always one click). GR-7
  binds every surface to the steward theme tokens (DS-1) and the DS component
  inventory (DS-5 trust chrome, DS-6 no-empty-state) — the shell invents no
  component, color, spacing, or type role. ONE-HOME INVARIANTS (DEC-18, the
  enforceable cross-cutting rules): (1) the home's chrome + region ORDER never
  change across its shapes — day-one / weekly-visit / quiet (XO-1 / XH-1 /
  XA-1); (2) holds and failures PIN and are never batch-cleared (reconciles with
  APRS-1); (3) the stream ALWAYS reaches an honest "caught up" — never an infinite
  feed; (4) the glass wall is ONE CLICK, plain-labeled, PULL-ONLY, and never gated
  behind asking in chat (UXS-4/5/8). The shell HOSTS the ambient conversation
  (CHTS, UXS-2) and the Ready spine (APRS, UXS-3) and launches the composer
  (APRS-5, UXS-7); it owns NO business logic — all backend calls go through
  domain-specific API hooks (the client contract). Surfaces: journeys XO-1 (day
  one) / XH-1 (weekly visit) / XH-2 (just talk) / XA-1 (earning the reins — the
  quiet shape) / XG-1 (looking inside — the glass wall) / XH-3 (make something
  now); the home screen XH-12; glass-wall screens Knowledge XG-6, How-I-write
  XG-7, Calendar/Published (XG-8), Discoveries (XG-9); the Controls tray
  XA-6. LRN-20: the shell's invariants are DETERMINISTIC structural/routing
  rules (region order, one-click reachability, finite stack, pull-only-no-badge) —
  genuinely enforceable, not LLM behaviors; conversational CONTENT within the
  stream is the LLM part, owned by CHTS/INTS, not this spec.

data: >-
  The shell is stateless over the domain: it ROUTES to and composes views over
  ContentItem (DM-5 — Ready + Calendar), MemoryEntry (DM-2 — Knowledge),
  StrategyDoc (DM-3 — How-I-write), ExternalItem (DM-8 — Discoveries), and
  TrustLevel (DM-9 — autonomy settings). No new entity; which pane is summoned is
  client-local view state, not persisted domain data.

interfaces: >-
  The shell is @client (ADR-0003): the home column + summoned-pane router, the
  Look-inside cluster (one-click glass-wall views), the Compose action, and the
  always-present kill switch (AUT-3). It owns navigation + view composition only —
  every backend call goes through a domain-specific API hook (the client
  contract, CLAUDE.md), never inline business logic. Exact route/hook signatures
  live in code.

items:
  UXS-1:
    v: 1
    title: Mobile-first responsive web
    implements: [UX-1]
    statement: >-
      Mobile-first: the phone is the FLOOR — every founder action is available
      one-handed in a phone browser; no action is desktop-only. Desktop adds
      SIMULTANEITY (a summoned pane beside the home column, DEC-19), never
      exclusive capability; the home column never stretches into a multi-column
      dashboard (it stays a single readable column). No native mobile apps
      (scope). Responsive is a deterministic contract: the SAME action set,
      re-laid-out — never a reduced feature set on mobile.
      ACCEPTANCE: every founder action is reachable one-handed in a phone browser;
      desktop adds a side pane but no capability the phone lacks; the home column
      never becomes a multi-column dashboard.
  UXS-2:
    v: 1
    title: The ambient conversation is the home's medium
    implements: [UX-2]
    statement: >-
      The conversation IS the home's medium, not a separate destination (DEC-18):
      interviewer sessions, questions, ideation, and redirects (CHTS/INTS,
      CHT-1/CHT-2) run IN the home stream, led and never blank (CHTS-5); commands
      are P1 (CHTS-3). There is no separate "chat page" — the One-Home fusion
      superseded the chat-page + docked-companion split (DEC-18).
      ACCEPTANCE: chat runs in the home stream, not a separate route; the
      composer/stream is never a blank prompt (CHTS-5); interviewer questions and
      redirects appear inline in the home, not on a distinct page.
  UXS-3:
    v: 1
    title: Ready — the home's finite spine
    implements: [UX-3]
    statement: >-
      The finite, clearable approval stack lives INSIDE the home (the APRS-1
      surface): per-channel variants, fit indicators, and awaiting-picture states
      (APRS-1, GENS-4). The stream ALWAYS reaches an honest "caught up" (a
      One-Home invariant — never an infinite feed), and holds/failures PIN and are
      never batch-cleared (the One-Home invariant, reconciling with APRS-1's
      batch-approve exclusion). Where most founder time lives.
      ACCEPTANCE: the Ready spine is finite and reaches "caught up"; a held/failed
      card pins and is not cleared by batch approve; Ready lives in the home, not
      a separate route.
  UXS-4:
    v: 1
    title: Calendar / Published surface
    implements: [UX-4]
    statement: >-
      A glass-wall view — one click from the home's Look-inside cluster,
      pull-only: planned and published posts across all channels plus the publish
      log (GENS-1 plan, PUBS-3 log; screen XG-8). Read-oriented; never badged,
      counted, or nudging (VAL-6).
      ACCEPTANCE: one click from the home shows the plan + publish log across all
      channels; it is pull-only (no badge, no nudge).
  UXS-5:
    v: 1
    title: Knowledge & How-I-write views
    implements: [UX-5]
    statement: >-
      Two one-click glass-wall views: KNOWLEDGE — what the system knows (the MEM-3
      browser at P1; hosts the INT-4 open-questions list; screen XG-6) — and HOW
      I WRITE — the Posting Strategy (STRS sections, versioned editor per STR-2;
      screen XG-7). Each is ONE CLICK from the home's Look-inside cluster,
      plain-labeled, PULL-ONLY, and NEVER gated behind asking in chat (the
      glass-wall guarantee, DEC-18 / VAL-3).
      ACCEPTANCE: both views open in one click from the home, plain-labeled;
      neither requires asking in chat to reach; How-I-write edits are versioned
      (STR-2); Knowledge hosts the INT-4 open-questions list.
  UXS-6:
    v: 1
    title: Settings / Billing surface
    implements: [UX-6]
    statement: >-
      The controls surface (the Controls tray, XA-6): digest cadence (APRS-2),
      notifications (APRS-4), autonomy levels per category (AUT-1), per-channel
      pause and the global kill switch (AUT-3), and plan & billing (BIL-1). The
      kill switch is ALWAYS reachable — one gesture in the chrome, at every
      autonomy level (AUT-3).
      ACCEPTANCE: cadence, notifications, per-category autonomy, per-channel pause,
      the kill switch, and plan are all reachable from settings; the kill switch is
      always one gesture from the chrome (AUT-3), not buried in settings.
  UXS-7:
    v: 1
    title: Compose — an action, never a place
    implements: [UX-7]
    statement: >-
      Compose is an ACTION, never a place: "+ Compose" in the home chrome (or via
      chat), NOT a navigation item (VAL-6, DEC-18). It launches the APRS-5
      composer flow — master text → picture → channels → adapted variants →
      confirm — and is reachable one-handed (UXS-1) and via chat.
      ACCEPTANCE: Compose is an action in the chrome (and via chat), not a nav
      destination; it runs the APRS-5 flow; it is reachable one-handed on a phone.
  UXS-8:
    v: 1
    title: Discoveries view
    implements: [UX-8]
    statement: >-
      A PULL-ONLY glass-wall view: the org's personalized feed of discovered
      external content (EXT-5; screen XG-9), one click from the home's
      Look-inside cluster. Pull-only BY RULE — it never carries a badge or count,
      and the feed never generates tasks, digest entries, or nudges (VAL-6;
      browsing time is voluntary under G-3). P1.
      ACCEPTANCE: the Discoveries feed is one click from the home and pull-only; it
      never badges, counts, or nudges, and never generates a task or digest entry.

open-questions:
  - >-
    Pixel-level shell design — the exact chrome, the desktop summoned-pane layout
    (DEC-19), the Look-inside cluster, and the home's shape transitions — is a
    method/ui.md pass on the already-approved One-Home spine (home screen XH-12 +
    journeys XO-1/2/3/5/6/7) and the design system (GR-7). Not deferred design
    (the spine is approved); it is the pixel-spec altitude below this behavior spec.
