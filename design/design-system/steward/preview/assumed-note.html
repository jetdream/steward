<style>
:root {
  /* ─── Surface (3 levels) — inherited: canvas-white page and card,
   * separation from hairlines and photography, warm tier for stepped-
   * back sections (digest completion, footer, date-range middles). */
  --bg: #ffffff;
  --surface: #ffffff;
  --surface-warm: #f7f7f7;

  /* ─── Foreground ramp (4 levels) — inherited ink ramp; --fg carries
   * ~90% of text, never true #000000. */
  --fg: #222222;
  --fg-2: #3f3f3f;
  --muted: #6a6a6a;
  --meta: #929292;

  /* ─── Border (2 levels) — inherited hairlines. */
  --border: #dddddd;
  --border-soft: #ebebeb;

  /* ─── Accent — #Bind S1. Reserve for the primary action (Approve or
   * the screen's single verb), the active-nav indicator, and at most
   * one focal element per viewport (DS-2). */
  --accent: #b5502e;
  --accent-on: #ffffff;
  --accent-hover: #a8492a;       /* hand-bound deeper clay */
  --accent-active: #9e4426;      /* pressed — deepest clay */

  /* ─── Semantic — #Bind S3. */
  --success: #008a05;
  --warn: #c47700;
  --danger: #c13515;

  /* ─── Typography — fonts — #Bind S2. */
  --font-display:
    "Inter Variable", Inter, -apple-system, system-ui,
    "Helvetica Neue", Roboto, sans-serif;
  --font-body:
    "Inter Variable", Inter, -apple-system, system-ui,
    "Helvetica Neue", Roboto, sans-serif;
  --font-mono:
    ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Monaco,
    Consolas, monospace;

  /* ─── Typography — type scale — inherited: conversational 12–22px
   * cluster, 28px section headings; 44/56px reserved for the streak
   * numeral (the completion moment, UI-7) — Steward's analog of the
   * reference's rating lockup. */
  --text-xs: 12px;
  --text-sm: 14px;
  --text-base: 16px;
  --text-lg: 20px;
  --text-xl: 22px;
  --text-2xl: 28px;
  --text-3xl: 44px;
  --text-4xl: 56px;

  /* ─── Typography — leading & tracking — inherited two-mode rhythm:
   * chiseled display, magazine body. */
  --leading-body: 1.43;
  --leading-tight: 1.2;
  --tracking-display: -0.02em;   /* at sizes ≥20px only */

  /* ─── Spacing — inherited 4px-grid scale, 8px base unit. */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-12: 48px;

  /* ─── Section rhythm — inherited generous breathing room. */
  --section-y-desktop: 64px;
  --section-y-tablet: 48px;
  --section-y-phone: 32px;

  /* ─── Radius — inherited soft-circle geometry: 14px is the post-card
   * workhorse, 20px the approve panel, pill for avatars/icon buttons. */
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-pill: 9999px;

  /* ─── Elevation — inherited: flat cards on canvas; the three-layer
   * stack is reserved for the sticky approve panel (UI-8), modals, the
   * docked chat companion, and dropdowns. Never a single drop shadow. */
  --elev-flat: none;
  --elev-ring: 0 0 0 1px var(--border);
  --elev-raised:
    rgba(0, 0, 0, 0.02) 0 0 0 1px,
    rgba(0, 0, 0, 0.04) 0 2px 6px 0,
    rgba(0, 0, 0, 0.1) 0 4px 8px 0;

  /* ─── Focus ring — #Bind S4. */
  --focus-ring: 0 0 0 2px var(--fg);

  /* ─── Motion — inherited: short, purposeful, no overshoot. */
  --motion-fast: 150ms;
  --motion-base: 200ms;
  --ease-standard: cubic-bezier(0.2, 0, 0, 1);

  /* ─── Layout — inherited 1280px content cap; Steward is a workspace,
   * not a marketplace — there is no ultra-wide grid mode. */
  --container-max: 1280px;
  --container-gutter-desktop: 40px;
  --container-gutter-tablet: 24px;
  --container-gutter-phone: 16px;
}


* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--fg);
  font-family: var(--font-body); font-weight: 500;
  font-size: var(--text-base); line-height: var(--leading-body); }
main { padding: var(--space-6); }
h1 { font-size: var(--text-xl); font-weight: 600; margin: 0 0 var(--space-4);
  line-height: var(--leading-tight); letter-spacing: var(--tracking-display); }
h2 { font-size: var(--text-sm); font-weight: 600; color: var(--muted);
  margin: var(--space-6) 0 var(--space-3); }
.note { color: var(--muted); font-size: var(--text-sm); }
.row { display: flex; gap: var(--space-3); align-items: center; flex-wrap: wrap; }
.stack { display: flex; flex-direction: column; gap: var(--space-3); }

.btn { display: inline-flex; align-items: center; justify-content: center;
  gap: var(--space-2); font: inherit; font-weight: 500; border: none;
  cursor: pointer; background: none;
  transition: background var(--motion-fast) var(--ease-standard),
              transform var(--motion-fast) var(--ease-standard); }
.btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }
.btn-primary { background: var(--accent); color: var(--accent-on);
  padding: 14px 24px; border-radius: var(--radius-sm); }
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:active { background: var(--accent-active); transform: scale(0.96); }
.btn-secondary { background: var(--surface); color: var(--fg);
  border: 1px solid var(--border); padding: 10px 16px;
  border-radius: var(--radius-pill); font-size: var(--text-sm); }
.btn-quiet { color: var(--muted); padding: 10px 12px; font-size: var(--text-sm);
  border-radius: var(--radius-sm); }
.btn-quiet:hover { color: var(--fg); background: var(--surface-warm); }
.btn-danger { background: var(--surface); color: var(--danger);
  border: 1px solid var(--danger); padding: 10px 16px;
  border-radius: var(--radius-sm); font-size: var(--text-sm); }
.btn[disabled] { background: var(--surface-warm); color: var(--meta); cursor: default; }

.reason { display: flex; gap: var(--space-2); color: var(--muted);
  font-size: var(--text-sm); align-items: baseline; }
.reason::before { content: "\21B3"; color: var(--meta); }

.fit { display: inline-flex; gap: 6px; align-items: center;
  font-size: var(--text-xs); font-weight: 600; padding: 4px 10px;
  border-radius: var(--radius-pill); border: 1px solid var(--border);
  color: var(--fg-2); background: var(--surface); }
.fit.ok { color: var(--success);
  border-color: color-mix(in srgb, var(--success) 35%, var(--border));
  background: color-mix(in srgb, var(--success) 6%, var(--surface)); }
.fit.skip { color: var(--muted); background: var(--surface-warm);
  text-decoration: line-through; }

.assumed { display: inline-flex; gap: var(--space-2); align-items: baseline;
  font-size: var(--text-sm); padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  border: 1px solid color-mix(in srgb, var(--warn) 30%, var(--border));
  background: color-mix(in srgb, var(--warn) 6%, var(--surface)); }
.assumed .tag { font-size: var(--text-xs); font-weight: 600; color: var(--warn);
  text-transform: lowercase; }
.assumed a { color: var(--fg); }

.avatar { width: 36px; height: 36px; border-radius: var(--radius-pill);
  background: var(--fg); color: var(--bg); display: inline-flex;
  align-items: center; justify-content: center; font-weight: 600;
  font-size: var(--text-sm); flex: none; }

.card { background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-md); }


</style>

<main>
<h1>AssumedNote</h1>
<div class="stack">
  <div class="assumed"><span class="tag">assumed</span><span>Your service area is Travis County — I read it off your website. <a href="#">Not right?</a></span></div>
  <div class="assumed"><span class="tag">assumed</span><span>I'm treating "the shelter" and "Hope & Paws" as the same place. <a href="#">Fix</a></span></div>
